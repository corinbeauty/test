                                        <div className="flex items-end">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs ml-2 text-center w-28" value={(fData.phase3 && fData.phase3.date) || ''} onChange={e=>chg('form2.phase3.date',e.target.value)}/></div>
                                    </div>
                                    <div className="space-y-3 pl-4 border-l-2 border-blue-100 ml-2 py-1">
                                        <div className="flex items-center"><i className="fa-solid fa-thumbs-up text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">對目前工作是否有信心？</span> <div className="flex">{renderCbx('phase3.conf','A','非常有信心')}{renderCbx('phase3.conf','B','普通')}{renderCbx('phase3.conf','C','沒信心')}</div></div>
                                        <div className="flex items-center"><i className="fa-regular fa-heart text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">對主管關懷是否滿意？</span> <div className="flex">{renderCbx('phase3.mgr','A','滿意')}{renderCbx('phase3.mgr','B','普通')}{renderCbx('phase3.mgr','C','不滿意')}</div></div>
                                        <div className="flex items-center"><i className="fa-solid fa-handshake-angle text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">對同事相處是否滿意？</span> <div className="flex">{renderCbx('phase3.col','A','滿意')}{renderCbx('phase3.col','B','普通')}{renderCbx('phase3.col','C','不滿意')}</div></div>
                                        <div className="flex items-center"><i className="fa-solid fa-briefcase text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">是否會考慮離職？</span> <div className="flex">{renderCbx('phase3.quit','A','沒有')}{renderCbx('phase3.quit','B','偶爾')}{renderCbx('phase3.quit','C','有')}</div></div>
                                        <div className="flex items-center"><i className="fa-solid fa-triangle-exclamation text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">若有離職念頭，主要原因？</span> <input type="text" className="border-b border-gray-300 outline-none flex-1 font-normal" value={(fData.phase3 && fData.phase3.q1) || ''} onChange={e=>chg('form2.phase3.q1',e.target.value)}/></div>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="bg-[#1e40af] text-white px-3 py-1 rounded-full text-xs font-bold flex items-center tracking-wider"><span className="bg-white text-[#1e40af] rounded-full w-4 h-4 flex items-center justify-center mr-2">4</span> 第四階段 | 到職第30天關懷</div>
                                        <div className="flex items-end">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs ml-2 text-center w-28" value={(fData.phase4 && fData.phase4.date) || ''} onChange={e=>chg('form2.phase4.date',e.target.value)}/></div>
                                    </div>
                                    <div className="space-y-3 pl-4 border-l-2 border-blue-100 ml-2 py-1">
                                        <div className="flex items-center"><i className="fa-solid fa-bullseye text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">工作適應程度</span> <div className="flex">{renderCbx('phase4.adapt','A','非常適應')}{renderCbx('phase4.adapt','B','普通')}{renderCbx('phase4.adapt','C','不適應')}</div></div>
                                        <div className="flex items-center"><i className="fa-regular fa-face-smile-beam text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">對公司滿意度</span> <div className="flex">{renderCbx('phase4.satis','A','非常滿意')}{renderCbx('phase4.satis','B','滿意')}{renderCbx('phase4.satis','C','普通')}{renderCbx('phase4.satis','D','不滿意')}</div></div>
                                        <div className="flex items-center"><i className="fa-solid fa-plant-wilt text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">未來是否願意持續留任？</span> <div className="flex">{renderCbx('phase4.stay','A','願意')}{renderCbx('phase4.stay','B','觀察中')}{renderCbx('phase4.stay','C','不願意')}</div></div>
                                        <div className="flex items-center"><i className="fa-solid fa-calendar-check text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">未來三個月最需要協助事項？</span> <input type="text" className="border-b border-gray-300 outline-none flex-1 font-normal" value={(fData.phase4 && fData.phase4.q1) || ''} onChange={e=>chg('form2.phase4.q1',e.target.value)}/></div>
                                        <div className="flex items-center"><i className="fa-solid fa-bullhorn text-blue-500 w-6 text-center text-sm"></i> <span className="w-40">對公司建議事項？</span> <input type="text" className="border-b border-gray-300 outline-none flex-1 font-normal" value={(fData.phase4 && fData.phase4.q2) || ''} onChange={e=>chg('form2.phase4.q2',e.target.value)}/></div>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-6 mb-4 items-stretch">
                                    <div className="flex-1 bg-[#eef2ff] border border-blue-200 rounded p-3">
                                        <div className="text-center font-bold text-[#1e3a8a] mb-2">店長綜合評語</div>
                                        <table className="w-full text-center hr-table bg-white">
                                            <thead><tr className="bg-blue-50 text-blue-900"><th></th><th className="py-2">上班<br/>精神</th><th className="py-2">學習<br/>意願</th><th className="py-2">團隊<br/>互動</th><th className="py-2">出勤<br/>狀況</th><th className="py-2">情緒<br/>穩定</th><th className="py-2">抱怨<br/>頻率</th></tr></thead>
                                            <tbody>
                                                {['正常', '注意', '危險'].map((level) => (
                                                    <tr key={level}>
                                                        <td className="font-bold py-1 bg-gray-50">{level}</td>
                                                        {['s1','s2','s3','s4','s5','s6'].map((col) => (
                                                            <td key={col}><input type="checkbox" checked={fData.eval && fData.eval[col]===level} onChange={()=>chg(`form2.eval.${col}`, fData.eval?.[col] === level ? '' : level)} className="scale-100" /></td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="w-full md:w-72 border rounded p-4 flex flex-col justify-center bg-white shadow-sm gap-4">
                                        <div className="flex items-end justify-between">
                                            <div className="font-bold text-gray-700 w-24 flex items-center"><i className="fa-solid fa-pen text-[#1e40af] mr-2"></i>新人簽名:</div>
                                            <div className="flex-1 border-b border-gray-400 h-10">{renderSignBox('', 'form2.empSign', emp, "border-none !min-h-0")}</div>
                                        </div>
                                        <div className="flex items-end justify-between">
                                            <div className="font-bold text-gray-700 w-24 flex items-center"><i className="fa-solid fa-user-tie text-[#1e40af] mr-2"></i>店長簽名:</div>
                                            <div className="flex-1 border-b border-gray-400 h-10">{renderSignBox('', 'form2.mgrSign', emp, "border-none !min-h-0")}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-[10px] text-gray-600 font-bold text-center bg-[#eef2ff] p-2 rounded">★ 備註：本表作為新人關懷追蹤紀錄，請妥善保存並持續追蹤，協助新人順利適應與成長。</div>
                                <div className="text-right text-gray-400 text-[9px] mt-1 pr-2">HR-2026-07-15</div>
                            </div>
                        </div>
                    );
                };

                const renderHrForm3 = (emp) => {
                    const fData = emp.form3 || { basic:{}, interview:{}, fact:'', emp:'', guide:{}, improve:[{},{},{}], track:{}, concl:{} };
                    const chg = (path, val) => handleHrFieldChange(emp.id, 'form3', path, val);

                    // 確保綁定 form3 的深層資料並支援取消
                    const ckbx = (path, val) => {
                        const keys = path.split('.');
                        const current = fData[keys[0]] && fData[keys[0]][val];
                        return <input type="checkbox" checked={!!current} onChange={(e) => chg(`form3.${path}.${val}`, e.target.checked)} className="scale-125 mr-2" />;
                    };

                    return (
                        <div className="hr-form-container text-gray-800 relative">
                            <div className="flex items-center justify-center py-5 border-b-2 border-emerald-700 mx-4 mb-4 gap-4">
                                <span className="text-emerald-700 opacity-50 tracking-[0.2em] font-black italic">--</span>
                                <h2 className="text-2xl font-black text-slate-800 tracking-[0.1em]">員工關懷暨績效改善面談紀錄表</h2>
                                <span className="text-emerald-700 opacity-50 tracking-[0.2em] font-black italic">--</span>
                            </div>
                            <div className="px-6 text-xs space-y-3 pb-6">
                                <div>
                                    <div className="form-section-title bg-emerald-700">一、基本資料</div>
                                    <table className="w-full hr-table text-left border-2 border-emerald-700">
                                        <tbody>
                                            <tr>
                                                <th className="w-24 bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-user mr-1"></i> 姓名</th>
                                                <td className="w-32 font-bold text-blue-700 px-2 border-emerald-700 text-center">{emp.name}</td>
                                                <th className="w-24 bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-id-card mr-1"></i> 員工編號</th>
                                                <td className="w-32 font-bold text-center border-emerald-700">{emp.id}</td>
                                                <th className="w-24 bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-building mr-1"></i> 部門/店別</th>
                                                <td className="border-emerald-700"><input type="text" className="w-full bg-transparent px-1 outline-none text-center" value={(fData.basic && fData.basic.dept) || emp.storeName || ''} onChange={e=>chg('form3.basic.dept',e.target.value)}/></td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-briefcase mr-1"></i> 職務</th>
                                                <td className="border-emerald-700"><input type="text" className="w-full bg-transparent px-1 outline-none text-center" value={(fData.basic && fData.basic.job) || ''} onChange={e=>chg('form3.basic.job',e.target.value)}/></td>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-calendar-day mr-1"></i> 到職日</th>
                                                <td className="border-emerald-700"><input type="date" className="w-full bg-transparent px-1 outline-none text-center" value={(fData.basic && fData.basic.joinDate) || ''} onChange={e=>chg('form3.basic.joinDate',e.target.value)}/></td>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-user-tie mr-1"></i> 直屬主管</th>
                                                <td className="border-emerald-700"><input type="text" className="w-full bg-transparent px-1 outline-none text-center" value={(fData.basic && fData.basic.mgr) || ''} onChange={e=>chg('form3.basic.mgr',e.target.value)}/></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">二、面談內容</div>
                                    <table className="w-full hr-table text-left border-2 border-emerald-700">
                                        <tbody>
                                            <tr>
                                                <th className="w-[15%] bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-calendar-days mr-1"></i> 面談日期</th><td className="w-[35%] border-emerald-700"><input type="date" className="w-full outline-none px-2 text-center bg-transparent" value={(fData.interview && fData.interview.date) || ''} onChange={e=>chg('form3.interview.date',e.target.value)}/></td>
                                                <th className="w-[15%] bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-location-dot mr-1"></i> 面談地點</th><td className="w-[35%] border-emerald-700"><input type="text" className="w-full outline-none px-2 bg-transparent" value={(fData.interview && fData.interview.loc) || ''} onChange={e=>chg('form3.interview.loc',e.target.value)}/></td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-comments mr-1"></i> 面談類型<br/><span className="text-[9px] font-normal text-gray-500">(可複選)</span></th>
                                                <td colSpan="3" className="text-left p-3 border-emerald-700">
                                                    <div className="flex flex-wrap gap-x-6 gap-y-3 font-bold text-gray-800">
                                                        <label className="checkbox-group">{ckbx('interview', 'type1')} 關懷面談</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'type2')} 績效改善</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'type3')} 客訴事件</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'type4')} 出勤異常</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'type5')} 工作態度</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'type6')} 其他 <input type="text" className="border-b border-gray-400 w-32 outline-none ml-1 bg-transparent font-normal text-blue-700" value={(fData.interview && fData.interview.typeOther) || ''} onChange={e=>chg('form3.interview.typeOther',e.target.value)}/></label>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-clipboard-list mr-1"></i> 面談原因<br/><span className="text-[9px] font-normal text-gray-500">(可複選)</span></th>
                                                <td colSpan="3" className="text-left p-3 border-emerald-700">
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-3 font-bold text-gray-800 pl-2">
                                                        <label className="checkbox-group">{ckbx('interview', 'r1')} 工作績效未達標準</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r2')} 團隊合作問題</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r3')} 顧客反應或客訴事件</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r4')} 情緒管理問題</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r5')} 出勤異常 (遲到、請假)</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r6')} 違反公司規範</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r7')} 工作態度需改善</label>
                                                        <label className="checkbox-group">{ckbx('interview', 'r8')} 主動關懷面談</label>
                                                        <label className="checkbox-group col-span-1 sm:col-span-2">{ckbx('interview', 'r9')} 其他：<input type="text" className="border-b border-gray-400 flex-1 outline-none ml-1 font-normal bg-transparent text-blue-700" value={(fData.interview && fData.interview.rOther) || ''} onChange={e=>chg('form3.interview.rOther',e.target.value)}/></label>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-pen-to-square mr-1"></i> 具體事實說明</th>
                                                <td colSpan="3" className="border-emerald-700 p-0"><textarea className="w-full h-16 outline-none p-2 resize-none text-left align-top bg-transparent text-blue-800 font-bold" value={fData.fact||''} onChange={e=>chg('form3.fact',e.target.value)}></textarea></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">三、員工說明</div>
                                    <div className="border-2 border-emerald-700 rounded-sm">
                                        <div className="text-xs text-gray-700 bg-emerald-50 px-2 py-1 font-bold border-b border-emerald-700">請員工說明事件經過及個人想法：</div>
                                        <textarea className="w-full h-20 outline-none p-2 resize-none text-left bg-transparent text-blue-800 font-bold" value={fData.emp||''} onChange={e=>chg('form3.emp',e.target.value)}></textarea>
                                    </div>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">四、主管輔導內容</div>
                                    <table className="w-full hr-table text-left border-2 border-emerald-700">
                                        <tbody>
                                            <tr>
                                                <th className="w-1/5 bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-list-check mr-1"></i> 面談溝通重點<br/><span className="text-[9px] font-normal text-gray-500">(可複選)</span></th>
                                                <td className="w-4/5 text-left p-3 border-emerald-700">
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-3 font-bold text-gray-800 pl-2">
                                                        <label className="checkbox-group">{ckbx('guide', 'g1')} 工作標準說明</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g2')} 情緒管理建議</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g3')} 顧客服務要求</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g4')} 教育訓練安排</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g5')} 團隊合作要求</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g6')} 公司制度說明</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g7')} 出勤管理提醒</label>
                                                        <label className="checkbox-group">{ckbx('guide', 'g8')} 其他：<input type="text" className="border-b border-gray-400 flex-1 outline-none ml-1 font-normal bg-transparent text-blue-700" value={(fData.guide && fData.guide.gOther) || ''} onChange={e=>chg('form3.guide.gOther',e.target.value)}/></label>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-comment-dots mr-1"></i> 主管輔導內容</th>
                                                <td className="border-emerald-700 p-0"><textarea className="w-full h-20 outline-none p-2 resize-none text-left bg-transparent text-blue-800 font-bold" value={(fData.guide && fData.guide.content) || ''} onChange={e=>chg('form3.guide.content',e.target.value)}></textarea></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">五、改善計畫</div>
                                    <table className="w-full hr-table border-2 border-emerald-700">
                                        <thead><tr className="bg-emerald-50 text-emerald-800 border-emerald-700">
                                            <th className="border-emerald-700 w-[10%] font-bold">No</th>
                                            <th className="border-emerald-700 w-[30%] font-bold">改善項目</th>
                                            <th className="border-emerald-700 w-[40%] font-bold">改善目標</th>
                                            <th className="border-emerald-700 w-[20%] font-bold">完成期限</th>
                                        </tr></thead>
                                        <tbody>
                                            {[0,1,2].map(idx => (
                                                <tr key={`imp_${idx}`}>
                                                    <td className="border-emerald-700 font-bold bg-gray-50">{idx+1}</td>
                                                    <td className="border-emerald-700 p-0 h-8"><input type="text" className="w-full h-full outline-none px-2 text-left bg-transparent text-blue-800 font-bold" value={(fData.improve && fData.improve[idx] && fData.improve[idx].item) || ''} onChange={e=>chg(`form3.improve.${idx}.item`,e.target.value)}/></td>
                                                    <td className="border-emerald-700 p-0"><input type="text" className="w-full h-full outline-none px-2 text-left bg-transparent text-blue-800 font-bold" value={(fData.improve && fData.improve[idx] && fData.improve[idx].goal) || ''} onChange={e=>chg(`form3.improve.${idx}.goal`,e.target.value)}/></td>
                                                    <td className="border-emerald-700 p-0"><input type="date" className="w-full h-full outline-none px-2 text-center bg-transparent text-blue-800 font-bold" value={(fData.improve && fData.improve[idx] && fData.improve[idx].deadline) || ''} onChange={e=>chg(`form3.improve.${idx}.deadline`,e.target.value)}/></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">六、追蹤評估</div>
                                    <table className="w-full hr-table text-left border-2 border-emerald-700">
                                        <tbody>
                                            <tr>
                                                <th className="w-1/6 bg-emerald-50 text-emerald-800 text-center border-emerald-700">改善期間</th>
                                                <td className="w-5/6 flex items-center justify-center gap-4 px-2 py-1 font-bold border-none text-blue-800">
                                                    自 <input type="date" className="border-b border-gray-400 outline-none text-xs text-center font-normal bg-transparent" value={(fData.track && fData.track.start) || ''} onChange={e=>chg('form3.track.start',e.target.value)}/>
                                                    至 <input type="date" className="border-b border-gray-400 outline-none text-xs text-center font-normal bg-transparent" value={(fData.track && fData.track.end) || ''} onChange={e=>chg('form3.track.end',e.target.value)}/>
                                                </td>
                                            </tr>
                                            <tr>
                                                <th className="bg-emerald-50 text-emerald-800 text-center border-emerald-700">追蹤方式 <br/><span className="text-[9px] font-normal text-gray-500">(可複選)</span></th>
                                                <td className="flex justify-around p-3 border-emerald-700 font-bold text-gray-800">
                                                    <label className="checkbox-group">{ckbx('track', 't1')} 主任追蹤</label>
                                                    <label className="checkbox-group">{ckbx('track', 't2')} 店長追蹤</label>
                                                    <label className="checkbox-group">{ckbx('track', 't3')} 總監追蹤</label>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700">七、面談結論</div>
                                    <div className="border-2 border-emerald-700 p-4 grid grid-cols-1 sm:grid-cols-3 gap-y-4 font-bold text-gray-800 pl-6">
                                        <label className="checkbox-group">{ckbx('concl', 'c1')} 已了解並願意改善</label>
                                        <label className="checkbox-group">{ckbx('concl', 'c2')} 持續觀察追蹤</label>
                                        <label className="checkbox-group">{ckbx('concl', 'c3')} 安排教育訓練</label>
                                        <label className="checkbox-group">{ckbx('concl', 'c4')} 調整工作內容</label>
                                        <label className="checkbox-group">{ckbx('concl', 'c5')} 調整排班</label>
                                        <label className="checkbox-group">{ckbx('concl', 'c6')} 再次面談</label>
                                        <label className="checkbox-group col-span-1 sm:col-span-3">{ckbx('concl', 'c7')} 其他處理方式：<input type="text" className="border-b border-gray-400 flex-1 outline-none ml-2 font-normal bg-transparent text-blue-700" value={(fData.concl && fData.concl.cOther) || ''} onChange={e=>chg('form3.concl.cOther',e.target.value)}/></label>
                                    </div>
                                </div>

                                <div>
                                    <div className="form-section-title bg-emerald-700 mb-1">八、雙方確認</div>
                                    <div className="border-2 border-emerald-700 p-2 bg-emerald-50/30">
                                        <div className="text-[10px] text-gray-700 mb-6 font-bold px-2">本人已了解本次面談內容及改善方向，並願意配合後續改善計畫。</div>
                                        <div className="flex justify-between items-end mb-2 gap-4 px-4 font-bold text-gray-700">
                                            <div className="flex-1 flex flex-col items-center">
                                                <div className="border-b border-gray-400 w-full mb-1 h-12 relative">
                                                    <div className="absolute inset-0 flex items-end justify-center">{renderSignBox('', 'form3.sign.emp', emp, "border-none !min-h-0")}</div>
                                                </div>
                                                <span>員工簽名</span>
                                            </div>
                                            <div className="flex-1 flex flex-col items-center">
                                                <div className="border-b border-gray-400 w-full mb-1 h-12 relative">
                                                    <div className="absolute inset-0 flex items-end justify-center">{renderSignBox('', 'form3.sign.mgr', emp, "border-none !min-h-0")}</div>
                                                </div>
                                                <span>主管簽名</span>
                                            </div>
                                            <div className="flex-1 flex flex-col items-center">
                                                <div className="border-b border-gray-400 w-full mb-1 h-12 relative">
                                                    <div className="absolute inset-0 flex items-end justify-center">{renderSignBox('', 'form3.sign.storeMgr', emp, "border-none !min-h-0")}</div>
                                                </div>
                                                <span>店長簽名</span>
                                            </div>
                                        </div>
                                        <div className="text-left text-xs font-bold text-gray-700 pl-4 mt-4 mb-2">日期: <input type="date" className="border-b border-gray-400 bg-transparent outline-none font-normal text-blue-800" value={(fData.sign && fData.sign.date) || ''} onChange={e=>chg('form3.sign.date',e.target.value)}/></div>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center mt-2">
                                    <div className="text-[10px] text-emerald-800 font-bold bg-emerald-100 py-1 px-4 rounded-full flex items-center">
                                        <i className="fa-regular fa-bell text-lg mr-2"></i> 備註：本表僅作為面談紀錄及改善依據，將作為後續追蹤與評估之參考，並依公司相關規定辦理。
                                    </div>
                                    <div className="text-right text-gray-400 text-[9px] pr-2 font-bold">HR-2026-07-15</div>
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full bg-gray-50 overflow-hidden relative">
                        <div className="bg-white border-b px-4 py-2 flex flex-col md:flex-row justify-between items-center shrink-0 shadow-sm hide-in-fullscreen relative z-20 gap-2">
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <h2 className="text-blue-800 font-bold flex items-center whitespace-nowrap">
                                    <i className="fa-solid fa-user-shield mr-2"></i>人事系統
                                </h2>
                                
                                <div className="flex items-center gap-2">
                                    <select 
                                        className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold bg-blue-50 text-blue-800"
                                        value={selectedStore}
                                        onChange={(e) => {
                                            setSelectedStore(e.target.value);
                                            setSelectedEmpId(''); 
                                        }}
                                    >
                                        <option value="">-- 選擇店別 --</option>
                                        {availableStores.map(store => (
                                            <option key={store} value={store}>{store}</option>
                                        ))}
                                    </select>

                                    <select 
                                        className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold"
                                        value={selectedEmpId}
                                        onChange={(e) => setSelectedEmpId(e.target.value)}
                                        disabled={!selectedStore}
                                    >
                                        <option value="">-- 選擇員工 --</option>
                                        {empsInStore.map(emp => (
                                            <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div className="flex gap-2 w-full md:w-auto justify-end">
                                {currentEmp && (
                                    <>
                                        <button onClick={() => {
                                            setEditEmpData({ id: currentEmp.id, name: currentEmp.name, storeName: currentEmp.storeName });
                                            setIsEditMode(true);
                                            setShowEmpModal(true);
                                        }} className="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700 transition">
                                            <i className="fa-solid fa-pen mr-1"></i>編輯
                                        </button>
                                        <button onClick={handleDeleteHrEmployee} className="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700 transition">
                                            <i className="fa-solid fa-trash-can mr-1"></i>刪除
                                        </button>
                                    </>
                                )}
                                <button onClick={() => {
                                    setEditEmpData({ id: '', name: '', storeName: selectedStore || '' });
                                    setIsEditMode(false);
                                    setShowEmpModal(true);
                                }} className="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition whitespace-nowrap">
                                    <i className="fa-solid fa-plus mr-1"></i>新增員工
                                </button>
                            </div>
                        </div>

                        {currentEmp ? (
                            <div className="flex-1 flex flex-col overflow-hidden">
                                <div className="flex bg-white border-b shrink-0 overflow-x-auto hide-scroll hide-in-fullscreen relative z-20">
                                    <button onClick={() => setHrFormTab('form1')} className={`px-4 py-2 text-sm font-bold whitespace-nowrap ${hrFormTab === 'form1' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}>領航員輔導紀錄表</button>
                                    <button onClick={() => setHrFormTab('form2')} className={`px-4 py-2 text-sm font-bold whitespace-nowrap ${hrFormTab === 'form2' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}>新人培育領航計畫</button>
                                    <button onClick={() => setHrFormTab('form3')} className={`px-4 py-2 text-sm font-bold whitespace-nowrap ${hrFormTab === 'form3' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}>績效改善面談表</button>
                                    
                                    <div className="ml-auto flex items-center pr-2">
                                        <button onClick={() => setFullScreenMode(true)} className="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow hover:bg-gray-700 transition font-bold">
                                            <i className="fa-regular fa-file-pdf mr-1"></i> 整頁截圖模式 (PDF)
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 relative z-10 hide-scroll">
                                    <div className="w-full max-w-4xl mx-auto pb-20">
                                        {hrFormTab === 'form1' && renderHrForm1(currentEmp)}
                                        {hrFormTab === 'form2' && renderHrForm2(currentEmp)}
                                        {hrFormTab === 'form3' && renderHrForm3(currentEmp)}
                                        
                                        {fullScreenMode && (
                                            <div className="text-center mt-6 no-print">
                                                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold hover:bg-blue-700 text-lg">
                                                    <i className="fa-solid fa-print mr-2"></i>直接列印 / 另存為 PDF
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-400 flex-col gap-4 hide-in-fullscreen">
                                <i className="fa-solid fa-users text-6xl opacity-20"></i>
                                <p className="font-bold">請先選擇「店別」再選擇「員工」，或點擊新增員工開始管理。</p>
                            </div>
                        )}

                        {/* 新增/編輯員工 Modal */}
                        {showEmpModal && (
                            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
                                    <div className="bg-blue-600 text-white p-4 font-bold flex justify-between">
                                        <span>{isEditMode ? '編輯員工資料' : '新增系統員工'}</span>
                                        <button onClick={() => setShowEmpModal(false)}><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <form onSubmit={handleSaveHrEmployee} className="p-6 space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">所屬店別</label>
                                            <input required value={editEmpData.storeName} onChange={e => setEditEmpData({...editEmpData, storeName: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 中清店" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">員工編號</label>
                                            <input required value={editEmpData.id} onChange={e => setEditEmpData({...editEmpData, id: e.target.value})} disabled={isEditMode} className="w-full border p-2 rounded outline-none focus:border-blue-500 disabled:bg-gray-100" placeholder="例: E001" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">員工姓名</label>
                                            <input required value={editEmpData.name} onChange={e => setEditEmpData({...editEmpData, name: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 王小明" />
                                        </div>
                                        <div className="pt-4 flex justify-end gap-3 border-t">
                                            <button type="button" onClick={() => setShowEmpModal(false)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                            <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認儲存</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Signature Modal */}
                        {sigModal.isOpen && (
                            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[400px]">
                                    <div className="bg-blue-800 text-white p-4 font-bold flex justify-between items-center">
                                        <span><i className="fa-solid fa-pen-nib mr-2"></i>電子簽名板</span>
                                        <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="text-white/80 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <div className="flex-1 bg-gray-50 relative m-4 border-2 border-dashed border-gray-300 rounded-lg overflow-hidden cursor-crosshair">
                                        <canvas 
                                            ref={canvasRef}
                                            onMouseDown={startDrawing}
                                            onMouseMove={draw}
                                            onMouseUp={stopDrawing}
                                            onMouseOut={stopDrawing}
                                            onTouchStart={startDrawing}
                                            onTouchMove={draw}
                                            onTouchEnd={stopDrawing}
                                            style={{ touchAction: 'none' }} // 強制禁止滑動，確保手機流暢簽名
                                            className="w-full h-full"
                                        />
                                    </div>
                                    <div className="p-4 border-t bg-gray-50 flex justify-between gap-3">
                                        <button onClick={clearCanvas} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition border border-gray-300">清除重簽</button>
                                        <div className="flex gap-2">
                                            <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                            <button onClick={saveSignature} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認存檔</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`flex flex-col max-w-7xl mx-auto bg-gray-100 relative ${fullScreenMode ? 'pdf-mode' : 'h-full'}`}>
                    
                    {/* 結束截圖模式懸浮按鈕 */}
                    {fullScreenMode && (
                        <button onClick={() => setFullScreenMode(false)} className="fixed bottom-6 right-6 bg-red-600 text-white px-5 py-3 rounded-full shadow-2xl font-bold z-[100] hover:bg-red-700 border-2 border-white flex items-center no-print">
                            <i className="fa-solid fa-compress mr-2"></i>結束整頁模式
                        </button>
                    )}

                    <header className="px-4 py-2 border-b bg-white flex justify-between items-center shrink-0 shadow-sm relative z-10 hide-in-fullscreen">
                        <h1 className="text-xl font-black text-gray-800 tracking-tight">
                            <span className="text-blue-600 mr-1">{loggedInGroup}</span>12生肖戰報
                        </h1>
                        <button onClick={() => setShowSuperAuthModal(true)} className="bg-gray-900 text-yellow-500 px-3 py-1 rounded text-xs font-bold shadow hover:bg-gray-800 transition">
                            <i className="fa-solid fa-key mr-1"></i>權限登入
                        </button>
                    </header>

                    <nav className="flex overflow-x-auto border-b bg-white shrink-0 hide-scroll text-sm relative z-10 hide-in-fullscreen">
                        <button onClick={() => switchTab('night')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'night' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-moon mr-1 text-gray-700"></i>夜班</button>
                        <button onClick={() => switchTab('morning')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'morning' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-sun mr-1 text-orange-500"></i>早班</button>
                        <button onClick={() => switchTab('evening')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'evening' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-cloud-sun mr-1 text-indigo-500"></i>晚班</button>
                        <button onClick={() => switchTab('summary')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'summary' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-layer-group mr-1 text-green-600"></i>三班累加</button>
                        <button onClick={() => switchTab('audit')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'audit' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-clipboard-check mr-1 text-red-600"></i>稽核</button>
                        <button onClick={() => switchTab('trend')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'trend' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-chart-line mr-1 text-purple-600"></i>趨勢圖表</button>
                        <button onClick={() => switchTab('settings')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'settings' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-gear mr-1 text-gray-500"></i>店長設定</button>
                        <button onClick={() => setShowPwdModal(true)} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-blue-200 ${activeTab === 'hr' ? 'tab-active !border-b-blue-600 !text-blue-800' : 'text-blue-600 hover:bg-blue-50'}`}><i className="fa-solid fa-user-shield mr-1"></i>領航員/績效改善</button>
                        {isSuperAdmin && (
                            <button onClick={() => switchTab('admin')} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-red-200 ${activeTab === 'admin' ? 'tab-active !border-b-red-600 !text-red-700 bg-red-50' : 'text-red-500 hover:bg-red-50'}`}><i className="fa-solid fa-crown mr-1"></i>權限管理</button>
                        )}
                    </nav>

                    <main className={`flex-1 ${fullScreenMode ? 'print-mode' : 'overflow-hidden'}`}>
                        {activeTab === 'night' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('night', '夜班', 'fa-moon', 'text-gray-800', 'bg-gray-800')}</div>}
                        {activeTab === 'morning' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('morning', '早班', 'fa-sun', 'text-orange-600', 'bg-orange-500')}</div>}
                        {activeTab === 'evening' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('evening', '晚班', 'fa-cloud-sun', 'text-indigo-600', 'bg-indigo-500')}</div>}
                        {activeTab === 'summary' && <div className="p-2 h-full overflow-hidden">{renderSummary()}</div>}
                        {activeTab === 'audit' && <div className="p-2 h-full overflow-hidden">{renderAudit()}</div>}
                        {activeTab === 'trend' && <div className="p-2 h-full overflow-hidden">{renderTrendTab()}</div>}
                        {activeTab === 'settings' && <div className="p-2 h-full overflow-hidden">{renderSettings()}</div>}
                        {activeTab === 'hr' && renderHrTab()}
                        {activeTab === 'admin' && renderAdminTab()}
                    </main>

                    {/* HR 專區密碼驗證對話框 */}
                    {showPwdModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
                                <div className="bg-blue-800 text-white p-4 font-bold text-lg flex items-center gap-2">
                                    <i className="fa-solid fa-lock"></i> 系統安全驗證
                                </div>
                                <div className="p-6">
                                    <p className="text-gray-600 text-sm mb-4 font-bold">請輸入授權密碼以解鎖畫面。</p>
                                    <input type="password" 
                                        className="w-full border-2 border-gray-300 rounded-lg p-3 text-center text-2xl tracking-[0.5em] focus:border-blue-500 outline-none transition-colors font-sans" 
                                        value={pwdInput} 
                                        onChange={(e) => setPwdInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handlePwdSubmit()}
                                        placeholder="輸入密碼"
                                        autoFocus
                                    />
                                </div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t">
                                    <button onClick={() => {setShowPwdModal(false); setPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                    <button onClick={handlePwdSubmit} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">驗證解鎖</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 最高權限登入對話框 */}
                    {showSuperAuthModal && (
                        <div className="fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border-2 border-yellow-500">
                                <div className="bg-gray-900 text-yellow-500 p-4 font-bold text-lg flex items-center gap-2">
                                    <i className="fa-solid fa-crown"></i> 總部最高權限登入
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">管理員帳號</label>
                                        <input type="text" className="w-full border-2 border-gray-300 rounded-lg p-2 text-center text-lg font-bold focus:border-yellow-500 outline-none" value={superAccInput} onChange={e => setSuperAccInput(e.target.value)} placeholder="輸入帳號" autoFocus />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">管理員密碼</label>
                                        <input type="password" className="w-full border-2 border-gray-300 rounded-lg p-2 text-center text-xl tracking-[0.2em] font-sans focus:border-yellow-500 outline-none" value={superPwdInput} onChange={e => setSuperPwdInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSuperAuthSubmit()} placeholder="輸入密碼" />
                                    </div>
                                </div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t">
                                    <button onClick={() => {setShowSuperAuthModal(false); setSuperAccInput(''); setSuperPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                    <button onClick={handleSuperAuthSubmit} className="px-6 py-2 bg-yellow-500 text-gray-900 rounded font-bold shadow hover:bg-yellow-400 transition">驗證登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HR 專區密碼錯誤對話框 */}
                    {pwdErrorModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] p-4">
                            <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full transform transition-all border-l-4 border-red-500">
                                <div className="flex items-center text-red-500 mb-4">
                                    <i className="fa-solid fa-triangle-exclamation text-3xl mr-2"></i>
                                    <h3 className="font-bold text-lg">存取失敗</h3>
                                </div>
                                <p className="text-gray-600 mb-6 font-bold">密碼錯誤，請重新輸入以驗證您的身份。</p>
                                <button onClick={() => setPwdErrorModal(false)} className="w-full bg-gray-900 text-white py-2 rounded-lg font-bold hover:bg-gray-700 transition">
                                    我知道了
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 總部最高權限密碼錯誤對話框 */}
                    {superAuthErrorModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[130] p-4">
                            <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full transform transition-all border-l-4 border-red-600 border-t-2 border-r-2 border-b-2">
                                <div className="flex items-center text-red-600 mb-4">
                                    <i className="fa-solid fa-ban text-3xl mr-3"></i>
                                    <h3 className="font-black text-xl tracking-wider">權限驗證失敗</h3>
                                </div>
                                <p className="text-gray-700 mb-6 font-bold leading-relaxed">
                                    您輸入的最高權限帳號或密碼不正確。<br/>
                                    <span className="text-sm text-gray-500 font-normal mt-1 block">請重新確認後再試一次。</span>
                                </p>
                                <button onClick={() => setSuperAuthErrorModal(false)} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition shadow-md">
                                    返回重新輸入
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) {
                console.error("Caught unhandled exception:", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', fontFamily: 'sans-serif', background: '#fee2e2', color: '#991b1b', height: '100vh', overflow: 'auto' }}>
                            <h2 style={{ fontWeight: 'bold', fontSize: '20px' }}>系統發生未預期錯誤</h2>
                            <p>非常抱歉，畫面渲染失敗。請截圖以下代碼交給工程師，這能幫助我們徹底除錯：</p>
                            <pre style={{ background: '#fff', padding: '10px', marginTop: '10px', border: '1px solid #f87171', borderRadius: '4px', fontSize: '12px', whiteSpace: 'pre-wrap' }}>
                                {this.state.error && this.state.error.toString()}
                                {'\n'}
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '20px', padding: '10px 20px', background: '#dc2626', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}>
                                重新載入
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
