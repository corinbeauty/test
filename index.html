        /* HR Forms 100% Replica Styles */

        .sign-box { border: 1px dashed #94a3b8; border-radius: 4px; min-height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; color: #94a3b8; font-size: 0.75rem; overflow: hidden; width: 100%; }
        .sign-box:hover { background-color: #f1f5f9; border-color: #3b82f6; color: #3b82f6; }
        .sign-img { width: 100%; height: 100%; object-fit: contain; }

        /* PDF 預覽 / 列印模式 (A4 尺寸) */

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯+週邊商品', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 10, color: 'rgb(251, 146, 60)' },
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 10, color: '#8B4513' },
            { id: 'setMeal', name: '套餐', type: 'count', unit: '單數', defaultRate: 12, defaultScore: 10, color: 'rgb(74, 222, 128)' },
            { id: 'fascia', name: '筋膜刀', type: 'amount', unit: '金額', defaultRate: 7, defaultScore: 10, color: 'rgb(248, 113, 113)' },
            { id: 'review', name: '評論', type: 'count', unit: '則數', defaultRate: 10, defaultScore: 10, color: 'rgb(96, 165, 250)' },
            { id: 'app', name: '會員APP', type: 'count', unit: '單數', defaultRate: 6, defaultScore: 5, color: 'rgb(167, 139, 250)' }
        ];

        const DEFAULT_TIME_SLOTS = [
            { id: 'ts_00_08', label: '00-08 時段' },
            { id: 'ts_08_16', label: '08-16 時段' },
            { id: 'ts_12_21', label: '12-21 時段' },
            { id: 'ts_15_00', label: '15-00 時段' }
        ];

        const PILOT_ITEMS = [
            { phase: '配對階段\n(報到當週)', no: 1, item: '指定領航員', desc: '已指派合適領航員並告知雙方職責', std: '報到當日完成配對' },
            { phase: '配對階段\n(報到當週)', no: 2, item: '新人資料建檔', desc: '新人基本資料建立完整並上系統', std: '報到當日完成建檔' },
            { phase: '配對階段\n(報到當週)', no: 3, item: '領航員訓練', desc: '領航員已接受職責說明與輔導技巧訓練', std: '報到後3天內完成' },
            { phase: '配對階段\n(報到當週)', no: 4, item: '30天培育計畫', desc: '已與新人共同訂定30天學習計畫', std: '報到後7天內完成' },
            { phase: '30天階段\n(第1個月)', no: 5, item: '每週訪談紀錄', desc: '每週至少1次關懷訪談並填寫紀錄表', std: '每週完成' },
            { phase: '30天階段\n(第1個月)', no: 6, item: '技術訓練進度', desc: '技術項目依計畫完成練習與考核', std: '完成率達80%以上' },
            { phase: '30天階段\n(第1個月)', no: 7, item: '服務流程熟悉', desc: '熟悉門店服務流程與話術標準', std: '完成率達80%以上' },
            { phase: '30天階段\n(第1個月)', no: 8, item: '30天評估', desc: '完成30天學習評估並回饋改善建議', std: '第30天前完成評估' },
            { phase: '60天階段\n(第2個月)', no: 9, item: '持續關懷訪談', desc: '每週至少1次關懷訪談追蹤適應與狀況', std: '每週完成' },
            { phase: '60天階段\n(第2個月)', no: 10, item: '技術考核通過', desc: '通過第二階段技術考核', std: '考核分數80分以上' },
            { phase: '60天階段\n(第2個月)', no: 11, item: '60天評估', desc: '完成60天評估與下一階段目標設定', std: '第60天前完成評估' },
            { phase: '90天階段\n(第3個月)', no: 12, item: '進階技能培訓', desc: '進階手法與應對能力練習與考核', std: '完成率達80%以上' },
            { phase: '90天階段\n(第3個月)', no: 13, item: '服務品質達標', desc: '顧客滿意度與服務表現達標', std: '顧客回饋平均4.5分以上' },
            { phase: '90天階段\n(第3個月)', no: 14, item: '90天評估', desc: '完成90天評估與後續發展規劃', std: '第90天前完成評估' },
            { phase: '留任與發展', no: 15, item: '留任追蹤', desc: '追蹤新人留任狀況並關懷需求', std: '每月追蹤' },
            { phase: '留任與發展', no: 16, item: '領航員評核', desc: '評核領航員輔導成效與投入度', std: '每季評核1次' },
            { phase: '留任與發展', no: 17, item: '學習成長紀錄', desc: '新人學習歷程與成長紀錄完整保存', std: '持續更新' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('night');
            const getTodayStr = () => {
                const today = new Date();
                return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            };
            const todayStr = getTodayStr();
            const [selectedDate, setSelectedDate] = useState(todayStr); 
            const [inputDate, setInputDate] = useState(todayStr);       
            const [database, setDatabase] = useState({});
            const safeInputDate = inputDate || todayStr;

            const [summaryRange, setSummaryRange] = useState('currentMonth');
            const [summaryRangeStart, setSummaryRangeStart] = useState(todayStr.substring(0, 8) + '01');
            const [summaryRangeEnd, setSummaryRangeEnd] = useState(todayStr);
            const [summaryWeek, setSummaryWeek] = useState(() => {
                const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
            });

            const [trendFilter, setTrendFilter] = useState('all');
            const [visibleChart, setVisibleChart] = useState(ITEM_CONFIG[0].id);
            const chartRef = useRef(null);

            const [settings, setSettings] = useState(
                ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: { rate: item.defaultRate, score: item.defaultScore } }), {})
            );
            const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
            const [newSlotName, setNewSlotName] = useState('');

            // HR Module States
            const [hrAuthUnlocked, setHrAuthUnlocked] = useState(false);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [pwdErrorModal, setPwdErrorModal] = useState(false); 
            const [pwdInput, setPwdInput] = useState('');
            const [fullScreenMode, setFullScreenMode] = useState(false);

            const [hrEmployees, setHrEmployees] = useState({});
            const [newEmpStore, setNewEmpStore] = useState('');
            const [selectedStore, setSelectedStore] = useState(''); 
            const [selectedEmpId, setSelectedEmpId] = useState(''); 
            
            const [showEmpModal, setShowEmpModal] = useState(false);
            const [editEmpData, setEditEmpData] = useState({ id: '', name: '', storeName: '' });
            const [isEditMode, setIsEditMode] = useState(false);

            const [hrFormTab, setHrFormTab] = useState('form1');
            
            const [sigModal, setSigModal] = useState({ isOpen: false, fieldPath: '' });
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            // Admin States
            const [isSuperAdmin, setIsSuperAdmin] = useState(false);
            const [showSuperAuthModal, setShowSuperAuthModal] = useState(false);
            const [superAuthErrorModal, setSuperAuthErrorModal] = useState(false); 
            const [superAccInput, setSuperAccInput] = useState('');
            const [superPwdInput, setSuperPwdInput] = useState('');
            const [systemUsers, setSystemUsers] = useState([]);
            const [loggedInGroup, setLoggedInGroup] = useState('中清店');
            const [editUser, setEditUser] = useState(null);
            const [manageUserModal, setManageUserModal] = useState(false);

            useEffect(() => {
                if (fullScreenMode) document.body.classList.add('pdf-mode');
                else document.body.classList.remove('pdf-mode');
            }, [fullScreenMode]);

            const switchTab = (tabName) => {
                if (tabName !== 'hr') {
                    setHrAuthUnlocked(false);
                    setShowPwdModal(false);
                    setPwdInput('');
                    setPwdErrorModal(false);
                    setFullScreenMode(false); 
                }
                if (tabName !== 'admin') {
                    setIsSuperAdmin(false);
                    // Reset group name when leaving admin
                    if(tabName !== 'hr') setLoggedInGroup('中清店');
                }
                setActiveTab(tabName);
            };

            const handlePwdSubmit = () => {
                if (pwdInput === '8888') {
                    setHrAuthUnlocked(true);
                    setActiveTab('hr');
                    setShowPwdModal(false);
                    setPwdInput('');
                    setPwdErrorModal(false);
                } else {
                    setPwdErrorModal(true); 
                    setPwdInput('');
                }
            };

            const handleSuperAuthSubmit = () => {
                if (superAccInput === '信吉' && superPwdInput === '7310168888') {
                    setIsSuperAdmin(true);
                    setLoggedInGroup('總部最高權限');
                    setActiveTab('admin');
                    setShowSuperAuthModal(false);
                    setSuperAccInput('');
                    setSuperPwdInput('');
                    setSuperAuthErrorModal(false);
                } else {
                    setSuperAuthErrorModal(true);
                    setSuperPwdInput('');
                }
            };

            useEffect(() => {
                const initFb = async () => {
                    if (!window.fb) return;
                    const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, db, collection, onSnapshot } = window.fb;
                    
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error("Firebase Auth Exception:", err); }

                    const unsubAuth = onAuthStateChanged(auth, user => {
                        window.firebaseUser = user;
                        if (!user) return;

                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                        const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
                        const hrRef = collection(db, 'artifacts', appId, 'public', 'data', 'hr_employees');
                        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'system_users');

                        onSnapshot(recordsRef, snap => {
                            const newDb = {}; snap.forEach(d => newDb[d.id] = d.data()); setDatabase(newDb);
                        });
                        
                        onSnapshot(settingsRef, snap => {
                            snap.forEach(d => {
                                if (d.id === "global") {
                                    const data = d.data();
                                    if (data.rates) setSettings(prev => ({ ...prev, ...data.rates }));
                                    if (data.timeSlots && Array.isArray(data.timeSlots)) setTimeSlots(data.timeSlots);
                                }
                            });
                        });

                        onSnapshot(hrRef, snap => {
                            const newHr = {}; 
                            snap.forEach(d => {
                                const data = d.data();
                                if(!data.isDeleted) newHr[d.id] = data;
                            }); 
                            setHrEmployees(newHr);
                        });

                        onSnapshot(usersRef, snap => {
                            const users = []; snap.forEach(d => users.push({ id: d.id, ...d.data() })); setSystemUsers(users);
                        });
                    });
                };
                if (window.fb) initFb();
                else window.addEventListener('firebase-ready', initFb);
                return () => window.removeEventListener('firebase-ready', initFb);
            }, []);

            const saveToFirebase = (collectionName, docId, dataToMerge, isMerge = true) => {
                if (window.fb && window.firebaseUser) {
                    const { db, doc, setDoc } = window.fb;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
                    setDoc(docRef, dataToMerge, { merge: isMerge }).catch(e => console.error("DB Write Error:", e));
                }
            };

            const getCurrentShiftData = (date, shift) => {
                if (database[date] && database[date][shift]) return database[date][shift];
                const emptyData = { customers: '', revenue: '' };
                ITEM_CONFIG.forEach(item => emptyData[item.id] = '');
                if (shift === 'manager') emptyData.slots = {}; 
                return emptyData;
            };

            const handleShiftChange = (shift, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { morning: getCurrentShiftData(safeInputDate, 'morning'), evening: getCurrentShiftData(safeInputDate, 'evening'), night: getCurrentShiftData(safeInputDate, 'night'), manager: getCurrentShiftData(safeInputDate, 'manager') };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = getCurrentShiftData(safeInputDate, 'manager');
                    newDb[safeInputDate][shift] = { ...newDb[safeInputDate][shift], [field]: parsedValue };
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSlotChange = (slotId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { manager: getCurrentShiftData(safeInputDate, 'manager') };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = getCurrentShiftData(safeInputDate, 'manager');
                    if (!newDb[safeInputDate].manager.slots) newDb[safeInputDate].manager.slots = {};
                    if (!newDb[safeInputDate].manager.slots[slotId]) newDb[safeInputDate].manager.slots[slotId] = {};
                    newDb[safeInputDate].manager.slots[slotId][field] = parsedValue;
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSettingChange = (itemId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setSettings(prev => {
                    const newSettings = { ...prev, [itemId]: { ...prev[itemId], [field]: parsedValue } };
                    saveToFirebase('settings', 'global', { rates: newSettings });
                    return newSettings;
                });
            };

            const handleAddSlot = () => {
                if (!newSlotName.trim()) return;
                const newSlots = [...timeSlots, { id: 'ts_' + Date.now(), label: newSlotName.trim() }];
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots }); setNewSlotName('');
            };

            const handleDeleteSlot = (idToRemove) => {
                const newSlots = timeSlots.filter(s => s.id !== idToRemove);
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots });
            };

            const calculateTarget = (baseData, itemId) => {
                if (!baseData) return 0;
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
                const rate = settings[itemId] && settings[itemId].rate ? Number(settings[itemId].rate) : 0;
                return Math.ceil(baseValue * (rate / 100));
            };

            const calcMetrics = (target, actualValue) => {
                const actual = Number(actualValue) || 0;
                const gap = actual - target;
                const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
                return { gap, achieveRate, gapRate };
            };

            const handleSaveHrEmployee = (e) => {
                e.preventDefault();
                if (!editEmpData.id.trim() || !editEmpData.name.trim() || !editEmpData.storeName.trim()) { 
                    alert("請輸入完整的店別、員工編號與姓名！"); return; 
                }
                if (!isEditMode && hrEmployees[editEmpData.id]) { 
                    alert("此員工編號已存在！"); return; 
                }
                const newEmp = {
                    ...editEmpData,
                    form1: isEditMode ? (hrEmployees[editEmpData.id].form1 || { rows: {}, summary: {} }) : { rows: {}, summary: {} },
                    form2: isEditMode ? (hrEmployees[editEmpData.id].form2 || { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }) : { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} },
                    form3: isEditMode ? (hrEmployees[editEmpData.id].form3 || { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} }) : { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} }
                };
                saveToFirebase('hr_employees', editEmpData.id, newEmp);
                setSelectedStore(editEmpData.storeName);
                setSelectedEmpId(editEmpData.id);
                setShowEmpModal(false);
            };

            const handleDeleteHrEmployee = () => {
                const currentEmp = hrEmployees[selectedEmpId] || null;
                if(!currentEmp) return;
                if(confirm(`確定要永久刪除員工 ${currentEmp.name} 及其所有表單紀錄嗎？這無法復原！`)) {
                    saveToFirebase('hr_employees', currentEmp.id, { isDeleted: true }, false);
                    setSelectedEmpId('');
                }
            };

            const handleHrFieldChange = (empId, formType, fieldPath, value) => {
                setHrEmployees(prev => {
                    const empData = prev[empId];
                    if (!empData) return prev;
                    const updatedEmp = JSON.parse(JSON.stringify(empData));
                    const keys = fieldPath.split('.');
                    let current = updatedEmp;
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!current[keys[i]]) current[keys[i]] = {};
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                    saveToFirebase('hr_employees', empId, updatedEmp);

                        <div className="bg-blue-50/50 border border-blue-200 rounded p-3 mb-4">
                            <div className="flex justify-between items-end border-b border-blue-200 pb-2 mb-3">
                                <h3 className="font-bold text-blue-800 text-sm"><i className="fa-solid fa-users-gear mr-1"></i>各時段產值與人效獨立分析</h3>
                                <div className="text-[10px] text-gray-500 bg-white px-2 py-0.5 rounded border">時段業績加總: <span className="font-bold text-gray-700">${sumSlotRevenue.toLocaleString()}</span></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
                                {timeSlots.map(slot => {
                                    const hc = slotsData[slot.id] && slotsData[slot.id].hc ? Number(slotsData[slot.id].hc) : 0;
                                    const rev = slotsData[slot.id] && slotsData[slot.id].rev ? Number(slotsData[slot.id].rev) : 0;
                                    const eff = hc > 0 ? Math.round(rev / hc) : rev; 
                                    return (
                                        <div key={slot.id} className="bg-white p-2 rounded border border-blue-100 shadow-sm flex flex-col relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                            <div className="text-xs text-blue-800 font-bold mb-2 pl-2">{slot.label}</div>
                                            <div className="grid grid-cols-2 gap-2 mb-2 pl-2">
                                                <div>
                                                    <div className="text-[10px] text-gray-400 mb-0.5">人數 (HC)</div>
                                                    <input type="number" step="0.5" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-gray-700 bg-gray-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].hc !== undefined) ? slotsData[slot.id].hc : ''} onChange={(e) => handleSlotChange(slot.id, 'hc', e.target.value)} />
                                                </div>
                                                <div>
                                                    <div className="text-[10px] text-gray-400 mb-0.5">時段產值 ($)</div>
                                                    <input type="number" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-blue-700 bg-blue-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].rev !== undefined) ? slotsData[slot.id].rev : ''} onChange={(e) => handleSlotChange(slot.id, 'rev', e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="bg-emerald-50 rounded p-1.5 flex justify-between items-center pl-2 ml-2 border border-emerald-100">
                                                <span className="text-[10px] text-emerald-700">時段人效</span><span className="font-black text-emerald-600 text-sm">${eff.toLocaleString()}</span>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="flex items-center justify-between bg-blue-600 text-white p-2 rounded shadow-sm">
                                <div><span className="text-xs opacity-80 block">單日總出勤人力</span><span className="text-xl font-black">{totalHc} <span className="text-sm font-normal">人</span></span></div>
                                <div className="text-right border-l border-blue-400 pl-4"><span className="text-xs opacity-80 block">單日平均人效 (以日結總業績計)</span><span className="text-xl font-black">${dailyEfficiency.toLocaleString()}</span></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4 items-start">
                            <div className="bg-purple-50/50 border border-purple-200 rounded p-3 flex flex-col h-full">
                                <h3 className="font-bold text-purple-800 mb-2 text-sm border-b border-purple-200 pb-1"><i className="fa-solid fa-ranking-star mr-1"></i>今日綜合績效指標</h3>
                                <div className="flex-1 overflow-y-auto hide-scroll text-xs">
                                    {performanceScores.map(score => (
                                        <div key={`score-${score.id}`} className="flex justify-between items-center border-b border-purple-100 py-1">
                                            <span className="text-gray-700 w-1/3">{score.name}</span><span className="text-gray-400 w-1/3 text-center text-[10px]">達標: {score.actual}/{score.target}</span><span className="font-bold text-purple-700 w-1/3 text-right">{score.earned.toFixed(1)} <span className="text-gray-400 font-normal text-[10px]">/ {score.maxScore}</span></span>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-2 pt-2 border-t border-purple-300 flex justify-between items-end"><span className="font-bold text-purple-900">總項得分</span><span className="text-2xl font-black text-purple-700">{totalEarnedScore.toFixed(1)} <span className="text-sm font-normal text-gray-500">/ {maxPossibleScore} 分</span></span></div>
                            </div>
                            <div className="bg-white border rounded shadow-sm p-2 flex flex-col h-full">
                                <p className="text-[10px] text-gray-500 mb-2 bg-red-50 p-1.5 rounded border border-red-100"><i className="fa-solid fa-circle-info mr-1"></i>系統自動比對三班輸入總和，紅字代表異常或漏KEY。</p>
                                <div className="overflow-x-auto hide-scroll flex-1">
                                    <table className="w-full text-xs border-collapse">
                                        <thead><tr className="bg-gray-100 text-gray-700"><th className="p-1.5 border text-left">項目</th><th className="p-1.5 border text-right">系統加總</th><th className="p-1.5 border text-center bg-red-50 text-red-700">日結輸入</th><th className="p-1.5 border text-right">差異</th></tr></thead>
                                        <tbody>
                                            {auditItems.map(item => {
                                                const sysSum = getSystemSum(item.id);
                                                const managerVal = managerData[item.id];
                                                const hasInput = managerVal !== undefined && managerVal !== '';
                                                const diff = hasInput ? (Number(managerVal) || 0) - sysSum : null;
                                                let diffDisplay = '-'; let diffColor = 'text-gray-300';
                                                if (hasInput) { if (diff === 0) { diffDisplay = '相符'; diffColor = 'text-green-600 bg-green-50'; } else { diffDisplay = diff > 0 ? `+${diff}` : diff; diffColor = 'text-red-600 bg-red-50 font-bold'; } }
                                                return (
                                                    <tr key={item.id} className="border-b hover:bg-gray-50">
                                                        <td className="p-1.5 font-bold text-gray-700">{item.name}</td>
                                                        <td className="p-1.5 text-right text-gray-500">{item.isAmount ? '$' : ''}{sysSum.toLocaleString()}</td>
                                                        <td className="p-1 text-center bg-red-50/30 w-[80px]"><input type="number" className="w-full p-1 border border-red-300 rounded text-right text-xs text-red-800 font-bold outline-none" value={managerVal !== undefined ? managerVal : ''} onChange={(e) => handleShiftChange('manager', item.id, e.target.value)} /></td>
                                                        <td className={`p-1.5 text-right ${diffColor}`}>{diffDisplay}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // ---- Render Trend Tab ----
            const getMonthlyTrendData = () => {
                const monthPrefix = safeInputDate.substring(0, 7); 
                const year = parseInt(monthPrefix.split('-')[0]) || new Date().getFullYear();
                const month = parseInt(monthPrefix.split('-')[1]) || (new Date().getMonth() + 1);
                const daysInMonth = new Date(year, month, 0).getDate();
                const sortedDates = Array.from({length: daysInMonth}, (_, i) => `${monthPrefix}-${(i+1).toString().padStart(2, '0')}`);
                const trendData = { dates: sortedDates, dailyTotals: {}, cumulative: {}, shiftBreakdown: {}, chartDatasets: [] };
                const currentCumulative = { customers: 0, revenue: 0 };
                const currentShiftBreakdown = { morning: { customers: 0, revenue: 0 }, evening: { customers: 0, revenue: 0 }, night: { customers: 0, revenue: 0 } };
                
                ITEM_CONFIG.forEach(i => { currentCumulative[i.id] = 0; currentShiftBreakdown.morning[i.id] = 0; currentShiftBreakdown.evening[i.id] = 0; currentShiftBreakdown.night[i.id] = 0; });

                sortedDates.forEach(date => {
                    let hasData = false;
                    const dayData = { customers: 0, revenue: 0 };
                    ITEM_CONFIG.forEach(i => dayData[i.id] = 0);
                    
                    const shiftsToProcess = trendFilter === 'all' ? ['morning', 'evening', 'night'] : [trendFilter];
                    if (database[date]) {
                        shiftsToProcess.forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                const values = [sData.customers, sData.revenue, ...ITEM_CONFIG.map(i => sData[i.id])];
                                if (values.some(v => v !== '' && v !== undefined && v !== null)) hasData = true;
                                dayData.customers += Number(sData.customers) || 0;
                                dayData.revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => dayData[i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                        ['morning', 'evening', 'night'].forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                currentShiftBreakdown[shift].customers += Number(sData.customers) || 0;
                                currentShiftBreakdown[shift].revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => currentShiftBreakdown[shift][i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                    }

                    trendData.dailyTotals[date] = hasData ? dayData : null;
                    if (hasData) {
                        currentCumulative.customers += dayData.customers;
                        currentCumulative.revenue += dayData.revenue;
                        ITEM_CONFIG.forEach(i => currentCumulative[i.id] += dayData[i.id]);
                    }
                    trendData.cumulative[date] = JSON.parse(JSON.stringify(currentCumulative));
                    trendData.shiftBreakdown[date] = JSON.parse(JSON.stringify(currentShiftBreakdown));
                });

                ITEM_CONFIG.forEach(item => {
                    if(item.id === visibleChart) {
                        const dataPoints = sortedDates.map(date => trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : null);
                        trendData.chartDatasets.push({ label: item.name, data: dataPoints, borderColor: item.color, backgroundColor: item.color, tension: 0.3, fill: false, borderWidth: 2, pointRadius: 2, spanGaps: true });
                    }
                });
                return trendData;
            };

            useEffect(() => {
                if (activeTab !== 'trend' || typeof Chart === 'undefined') return;
                const trendData = getMonthlyTrendData();
                const ctx = document.getElementById('trendChart');
                if (ctx) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels: trendData.dates.map(d => parseInt(d.substring(8)).toString()), datasets: trendData.chartDatasets },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'top', labels: { boxWidth: 8, font: { size: 9 } } } },
                            scales: { 
                                y: { beginAtZero: true, ticks: { font: { size: 9 } } }, 
                                x: { ticks: { font: { size: 9 }, color: (ctx) => {
                                    if (ctx.tick && ctx.tick.label) {
                                        const d = new Date(`${safeInputDate.substring(0, 7)}-${ctx.tick.label.toString().padStart(2, '0')}`.replace(/-/g, '/'));
                                        if (d.getDay() === 0 || d.getDay() === 6) return '#ef4444';
                                    }
                                    return '#64748b';
                                }}} 
                            }
                        }
                    });
                }
                return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
            }, [activeTab, database, trendFilter, settings, visibleChart, safeInputDate]);

            const renderTrendTab = () => {
                const trendData = getMonthlyTrendData();
                const dates = trendData.dates;
                const todayData = dates.find(d => d === safeInputDate);
                const latestCumulative = todayData ? trendData.cumulative[safeInputDate] : null;
                const latestBreakdown = todayData ? trendData.shiftBreakdown[safeInputDate] : null;

                const renderRankings = (itemId) => {
                    if (!latestBreakdown || trendFilter !== 'all') return null; 
                    const getShiftMetrics = (shiftKey) => {
                        const actual = latestBreakdown[shiftKey][itemId] || 0;
                        const target = calculateTarget(latestBreakdown[shiftKey], itemId);
                        return target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                    };
                    const rankings = [
                        { shift: '早', rate: getShiftMetrics('morning'), actual: latestBreakdown.morning[itemId] || 0, color: 'text-orange-500' },
                        { shift: '晚', rate: getShiftMetrics('evening'), actual: latestBreakdown.evening[itemId] || 0, color: 'text-blue-500' },
                        { shift: '夜', rate: getShiftMetrics('night'), actual: latestBreakdown.night[itemId] || 0, color: 'text-gray-800' }
                    ];
                    rankings.sort((a, b) => b.rate - a.rate);
                    let currentRank = 1;
                    for (let i = 0; i < rankings.length; i++) {
                        if (i > 0 && rankings[i].rate < rankings[i-1].rate) currentRank = i + 1;
                        rankings[i].rank = rankings[i].rate === 0 && rankings[i].actual === 0 ? '-' : currentRank;
                    }
                    return (
                        <div className="mt-1 pt-1 border-t border-purple-200 flex flex-col gap-[2px]">
                            {rankings.map((d, i) => (
                                <div key={i} className="flex justify-between items-center text-[10px] leading-none">
                                    <span className={`${d.color} font-bold`}>{d.shift}</span>
                                    <div className="flex items-center gap-0.5">
                                        {d.rank === 1 ? <i className="fa-solid fa-crown text-yellow-500 text-[9px]"></i> : d.rank === 2 ? <i className="fa-solid fa-medal text-gray-400 text-[9px]"></i> : d.rank === 3 ? <i className="fa-solid fa-award text-amber-700 text-[9px]"></i> : <span className="w-[9px]"></span>}
                                        <span className="font-bold text-gray-700">{d.rate}% <span className="text-[8px] font-normal text-gray-400">({d.actual})</span></span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full gap-1.5 text-sm overflow-y-auto hide-scroll pb-2">
                        <div className="bg-white p-1.5 rounded shadow border border-purple-200 shrink-0">
                            <div className="flex justify-between items-center mb-1">
                                <h2 className="text-sm font-bold text-purple-800"><i className="fa-solid fa-calendar-check mr-1"></i>本月累計 (至 {(safeInputDate.split('-')[1]) || ''}/{(safeInputDate.split('-')[2]) || ''})</h2>
                                <div className="flex items-center gap-2">
                                    <input type="month" value={safeInputDate.substring(0,7)} onChange={(e) => setInputDate(`${e.target.value}-01`)} className="p-0.5 border rounded text-xs bg-gray-50 outline-none" />
                                    <div className="flex bg-gray-100 rounded overflow-hidden text-[10px]">
                                        {['all', 'morning', 'evening', 'night'].map(f => (
                                            <button key={f} onClick={() => setTrendFilter(f)} className={`px-2 py-0.5 ${trendFilter === f ? 'bg-purple-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>
                                                {f === 'all' ? '全部累計' : f === 'morning' ? '早班' : f === 'evening' ? '晚班' : '夜班'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            {latestCumulative && (
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-1">
                                    {ITEM_CONFIG.map(item => {
                                        const totalTarget = calculateTarget(latestCumulative, item.id);
                                        const totalActual = latestCumulative[item.id];
                                        const { gap, achieveRate, gapRate } = calcMetrics(totalTarget, totalActual);
                                        const isGood = gap >= 0;
                                        return (
                                            <div key={`cumul-${item.id}`} className="bg-purple-50 p-1 rounded border border-purple-100 text-center flex flex-col justify-between">
                                                <div className="font-bold text-gray-700 text-[10px]">{item.name}</div>
                                                <div className="text-[9px] text-gray-500">目標: {totalTarget}</div>
                                                <div className="text-sm font-black text-purple-700">{totalActual}</div>
                                                <div className={`text-[9px] font-bold ${isGood ? 'text-green-600' : 'text-red-500'} leading-tight scale-90`}>達:{achieveRate}% / 差:{gapRate > 0 ? `+${gapRate}%` : `${gapRate}%`}</div>
                                                {renderRankings(item.id)}
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="bg-white rounded shadow border border-gray-200 overflow-hidden flex flex-col shrink-0">
                            <h3 className="font-bold text-gray-700 p-1 bg-gray-50 border-b text-xs"><i className="fa-solid fa-table mr-1"></i>每日總計明細</h3>
                            <div className="overflow-x-auto hide-scroll p-1 w-full">
                                <table className="w-full text-center border-collapse text-[10px]">
                                    <thead>
                                        <tr>
                                            <th className="p-0.5 px-1 bg-gray-800 text-white border sticky left-0 z-10 min-w-[50px]">項目 \ 日期</th>
                                            {dates.map(date => {
                                                const d = new Date(date.replace(/-/g, '/'));
                                                return <th key={date} className={`p-0.5 border min-w-[22px] ${d.getDay() === 0 || d.getDay() === 6 ? 'text-red-500 bg-red-50' : 'bg-gray-100'}`}>{parseInt(date.substring(8))}</th>
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="p-0.5 bg-gray-50 font-bold border sticky left-0 z-10 text-left pl-1">來客數</td>
                                            {dates.map(date => <td key={`cust-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date].customers : ''}</td>)}
                                        </tr>
                                        {ITEM_CONFIG.map(item => (
                                            <tr key={`row-${item.id}`}>
                                                <td className="p-0.5 bg-white font-semibold border sticky left-0 z-10 text-left pl-1" style={{color: item.color}}>{item.name}</td>
                                                {dates.map(date => <td key={`${item.id}-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : ''}</td>)}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="bg-white p-1 rounded shadow border border-gray-200 flex flex-col min-h-[250px] shrink-0">
                            <div className="flex flex-wrap gap-2 mb-1 px-1 justify-center border-b pb-1">
                                {ITEM_CONFIG.map(item => (
                                    <label key={`rad-${item.id}`} className="flex items-center text-[10px] cursor-pointer">
                                        <input type="radio" checked={visibleChart === item.id} onChange={() => setVisibleChart(item.id)} className="mr-0.5" />
                                        <span style={{color: item.color}} className="font-bold">{item.name}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="relative flex-1 w-full"><canvas id="trendChart"></canvas></div>
                        </div>
                    </div>
                );
            };

            // ---- Render Settings Tab ----
            const renderSettings = () => {
                const totalScore = ITEM_CONFIG.reduce((sum, item) => sum + (Number(settings[item.id]?.score) || 0), 0);

                return (
                    <div className="flex flex-col md:flex-row h-full gap-4 text-sm overflow-hidden">
                        <div className="w-full md:w-1/2 bg-white p-4 rounded shadow border border-gray-200 overflow-y-auto hide-scroll">
                            <h2 className="text-lg font-bold text-gray-800 mb-2"><i className="fa-solid fa-gear mr-2 text-gray-500"></i>各項指標設定</h2>
                            <p className="text-xs text-gray-500 mb-4">設定各項目的目標轉換率(%)與配分。設定後連動全系統計算。</p>
                            <table className="w-full text-left border-collapse text-xs">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="p-2 border">指標項目</th>
                                        <th className="p-2 border">佔比 (%)</th>
                                        <th className="p-2 border">得分</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {ITEM_CONFIG.map(item => (
                                        <tr key={item.id} className="hover:bg-gray-50">
                                            <td className="p-2 border font-semibold">{item.name} <div className="text-[10px] text-gray-400">{item.type === 'amount' ? '當班業績' : '當班來客'}</div></td>
                                            <td className="p-2 border">
                                                <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                    value={(settings[item.id] && settings[item.id].rate !== undefined) ? settings[item.id].rate : ''} 
                                                    onChange={(e) => handleSettingChange(item.id, 'rate', e.target.value)} /> %
                                            </td>
                                            <td className="p-2 border">
                                                <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                    value={(settings[item.id] && settings[item.id].score !== undefined) ? settings[item.id].score : ''} 
                                                    onChange={(e) => handleSettingChange(item.id, 'score', e.target.value)} /> 分
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot>
                                    <tr className="bg-blue-50 font-bold">
                                        <td colSpan="2" className="p-2 border text-right">總分累計：</td>
                                        <td className="p-2 border text-center text-blue-700">{totalScore} 分</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <div className="w-full md:w-1/2 bg-blue-50/30 p-4 rounded shadow border border-blue-200 overflow-y-auto hide-scroll">
                            <h2 className="text-lg font-bold text-blue-800 mb-2"><i className="fa-solid fa-clock mr-2"></i>排班時段管理</h2>
                            <p className="text-xs text-gray-500 mb-4">在此新增或刪除稽核用的排班時段。這些時段將顯示於「店長稽核」分頁，供輸入各時段產值與人數。</p>
                            
                            <div className="flex gap-2 mb-4">
                                <input type="text" placeholder="輸入新時段名稱 (例: 10-14 時段)" 
                                    className="flex-1 p-2 border border-blue-300 rounded outline-none focus:ring-1 focus:ring-blue-500 text-sm"
                                    value={newSlotName} onChange={(e) => setNewSlotName(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleAddSlot()} />
                                <button onClick={handleAddSlot} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"><i className="fa-solid fa-plus mr-1"></i>新增</button>
                            </div>

                            <div className="space-y-2">
                                {timeSlots.map((slot, idx) => (
                                    <div key={slot.id} className="flex justify-between items-center bg-white p-2.5 rounded border shadow-sm">
                                        <div className="font-bold text-gray-700"><span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-xs mr-2">{idx + 1}</span>{slot.label}</div>
                                        <button onClick={() => handleDeleteSlot(slot.id)} className="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded transition text-xs">
                                            <i className="fa-solid fa-trash-can mr-1"></i>刪除
                                        </button>
                                    </div>
                                ))}
                                {timeSlots.length === 0 && <div className="text-center text-gray-400 py-4">目前沒有設定任何時段</div>}
                            </div>
                        </div>
                    </div>
                );
            };

            // ---- Render HR Forms (Forms 1, 2, 3 nested logic) ----
            const renderHrTab = () => {
                if (!hrAuthUnlocked) return <div className="p-4 text-center text-red-500 mt-10 font-bold">拒絕存取：請由導覽列重新驗證密碼。</div>;
                
                const availableStores = [...new Set(Object.values(hrEmployees).map(emp => emp.storeName).filter(Boolean))];
                const empsInStore = Object.values(hrEmployees).filter(emp => emp.storeName === selectedStore);
