    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6XN-DEpUi4L9jETKpZWZhVrQw7tV4M5E",
            authDomain: "akpi-e0698.firebaseapp.com",
            projectId: "akpi-e0698",
            storageBucket: "akpi-e0698.firebasestorage.app",
            messagingSenderId: "446898815193",
            appId: "1:446898815193:web:f8e38b569ed64f4f0b3ec8",
            measurementId: "G-DKGZD88XER"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fb = { app, db, auth, doc, setDoc, onSnapshot, collection, signInAnonymously, onAuthStateChanged };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { height: 100%; }
        
        .tab-active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; font-weight: bold; background-color: #eff6ff;}
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { background-color: #e2e8f0; color: #334155; }
        input[type="number"], input[type="date"], input[type="month"] { text-align: right; }
        input[type="radio"], input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .screenshot-area { background: white; }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* HR Forms Specific Styles */
        .hr-table th, .hr-table td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        .hr-table th { background-color: #f1f5f9; font-weight: bold; }
        .form-title-bar { background-color: #1e3a8a; color: white; padding: 6px; text-align: center; font-weight: bold; }
        .form-section-title { background-color: #0d9488; color: white; padding: 4px 12px; border-radius: 999px; display: inline-block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px;}
        .sign-box { border: 1px dashed #94a3b8; border-radius: 4px; min-height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; color: #94a3b8; font-size: 0.75rem; overflow: hidden; }
        .sign-box:hover { background-color: #f1f5f9; border-color: #3b82f6; color: #3b82f6; }
        .sign-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯+週邊商品', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 10, color: 'rgb(251, 146, 60)' },
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 10, color: '#8B4513' },
            { id: 'setMeal', name: '套餐', type: 'count', unit: '單數', defaultRate: 12, defaultScore: 10, color: 'rgb(74, 222, 128)' },
            { id: 'fascia', name: '筋膜刀', type: 'amount', unit: '金額', defaultRate: 7, defaultScore: 10, color: 'rgb(248, 113, 113)' },
            { id: 'review', name: '評論', type: 'count', unit: '則數', defaultRate: 10, defaultScore: 10, color: 'rgb(96, 165, 250)' },
            { id: 'app', name: '會員APP', type: 'count', unit: '單數', defaultRate: 6, defaultScore: 5, color: 'rgb(167, 139, 250)' }
        ];

        const DEFAULT_TIME_SLOTS = [
            { id: 'ts_00_08', label: '00-08 時段' },
            { id: 'ts_08_16', label: '08-16 時段' },
            { id: 'ts_12_21', label: '12-21 時段' },
            { id: 'ts_15_00', label: '15-00 時段' }
        ];

        // 表單 1 領航員考核項目
        const PILOT_ITEMS = [
            { phase: '配對階段(報到當週)', no: 1, item: '指定領航員', desc: '已指派合適領航員並告知雙方職責', std: '報到當日完成配對' },
            { phase: '配對階段(報到當週)', no: 2, item: '新人資料建檔', desc: '新人基本資料建立完整並上系統', std: '報到當日完成建檔' },
            { phase: '配對階段(報到當週)', no: 3, item: '領航員訓練', desc: '領航員已接受職責說明與輔導技巧訓練', std: '報到後3天內完成' },
            { phase: '配對階段(報到當週)', no: 4, item: '30天培育計畫', desc: '已與新人共同訂定30天學習計畫', std: '報到後7天內完成' },
            { phase: '30天階段(第1個月)', no: 5, item: '每週訪談紀錄', desc: '每週至少1次關懷訪談並填寫紀錄表', std: '每週完成' },
            { phase: '30天階段(第1個月)', no: 6, item: '技術訓練進度', desc: '技術項目依計畫完成練習與考核', std: '完成率達80%以上' },
            { phase: '30天階段(第1個月)', no: 7, item: '服務流程熟悉', desc: '熟悉門店服務流程與話術標準', std: '完成率達80%以上' },
            { phase: '30天階段(第1個月)', no: 8, item: '30天評估', desc: '完成30天學習評估並回饋改善建議', std: '第30天前完成評估' },
            { phase: '60天階段(第2個月)', no: 9, item: '持續關懷訪談', desc: '每週至少1次訪談追蹤適應與狀況', std: '每週完成' },
            { phase: '60天階段(第2個月)', no: 10, item: '技術考核通過', desc: '通過第二階段技術考核', std: '考核分數80分以上' },
            { phase: '60天階段(第2個月)', no: 11, item: '60天評估', desc: '完成60天評估與下一階段目標設定', std: '第60天前完成評估' },
            { phase: '90天階段(第3個月)', no: 12, item: '進階技能培訓', desc: '進階手法與應對能力練習與考核', std: '完成率達80%以上' },
            { phase: '90天階段(第3個月)', no: 13, item: '服務品質達標', desc: '顧客滿意度與服務表現達標', std: '顧客回饋平均4.5分以上' },
            { phase: '90天階段(第3個月)', no: 14, item: '90天評估', desc: '完成90天評估與後續發展規劃', std: '第90天前完成評估' },
            { phase: '留任與發展', no: 15, item: '留任追蹤', desc: '追蹤新人留任狀況並關懷需求', std: '每月追蹤' },
            { phase: '留任與發展', no: 16, item: '領航員評核', desc: '評核領航員輔導成效與投入度', std: '每季評核1次' },
            { phase: '留任與發展', no: 17, item: '學習成長紀錄', desc: '新人學習歷程與成長紀錄完整保存', std: '持續更新' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('night');
            const getTodayStr = () => {
                const today = new Date();
                return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            };
            const todayStr = getTodayStr();
            const [selectedDate, setSelectedDate] = useState(todayStr); 
            const [inputDate, setInputDate] = useState(todayStr);       
            const [database, setDatabase] = useState({});
            
            const [trendFilter, setTrendFilter] = useState('all');
            const [visibleChart, setVisibleChart] = useState(ITEM_CONFIG[0].id);
            const chartRef = useRef(null);

            const [settings, setSettings] = useState(
                ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: { rate: item.defaultRate, score: item.defaultScore } }), {})
            );
            const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
            const [newSlotName, setNewSlotName] = useState('');

            // HR Module States
            const [hrAuthUnlocked, setHrAuthUnlocked] = useState(false);
            const [hrEmployees, setHrEmployees] = useState({});
            const [selectedEmpId, setSelectedEmpId] = useState('');
            const [newEmpId, setNewEmpId] = useState('');
            const [newEmpName, setNewEmpName] = useState('');
            const [hrFormTab, setHrFormTab] = useState('form1');
            
            // Signature Modal State
            const [sigModal, setSigModal] = useState({ isOpen: false, fieldPath: '' });
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            // Firebase 狀態同步
            useEffect(() => {
                const initFb = () => {
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.fb;
                    
                    signInAnonymously(auth).catch(e => console.error("Firebase auth error:", e));

                    const unsubAuth = onAuthStateChanged(auth, user => {
                        window.firebaseUser = user;
                        if (user) {
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                            const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                            const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
                            const hrRef = collection(db, 'artifacts', appId, 'public', 'data', 'hr_employees'); // V4 HR資料庫

                            onSnapshot(recordsRef, snap => {
                                const newDb = {};
                                snap.forEach(d => newDb[d.id] = d.data());
                                setDatabase(newDb);
                            });
                            
                            onSnapshot(settingsRef, snap => {
                                snap.forEach(d => {
                                    if (d.id === "global") {
                                        const data = d.data();
                                        if (data.rates) setSettings(prev => ({ ...prev, ...data.rates }));
                                        if (data.timeSlots) setTimeSlots(data.timeSlots);
                                    }
                                });
                            });

                            // 監聽人事表單
                            onSnapshot(hrRef, snap => {
                                const newHr = {};
                                snap.forEach(d => newHr[d.id] = d.data());
                                setHrEmployees(newHr);
                            });
                        }
                    });
                };

                if (window.fb) initFb();
                else window.addEventListener('firebase-ready', initFb);
                
                return () => window.removeEventListener('firebase-ready', initFb);
            }, []);

            // 存取 Firebase 共用函數
            const saveToFirebase = (collectionName, docId, dataToMerge) => {
                if (window.fb && window.firebaseUser) {
                    const { db, doc, setDoc } = window.fb;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
                    setDoc(docRef, dataToMerge, { merge: true }).catch(e => console.error("DB Write Error:", e));
                }
            };

            // 原有營運表單事件處理
            const getCurrentShiftData = (date, shift) => {
                if (database[date] && database[date][shift]) return database[date][shift];
                const emptyData = { customers: '', revenue: '' };
                ITEM_CONFIG.forEach(item => emptyData[item.id] = '');
                if (shift === 'manager') emptyData.slots = {}; 
                return emptyData;
            };

            const handleShiftChange = (shift, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[inputDate]) {
                        newDb[inputDate] = { morning: getCurrentShiftData(inputDate, 'morning'), evening: getCurrentShiftData(inputDate, 'evening'), night: getCurrentShiftData(inputDate, 'night'), manager: getCurrentShiftData(inputDate, 'manager') };
                    }
                    if (!newDb[inputDate].manager) newDb[inputDate].manager = getCurrentShiftData(inputDate, 'manager');
                    newDb[inputDate][shift] = { ...newDb[inputDate][shift], [field]: parsedValue };
                    saveToFirebase('records', inputDate, newDb[inputDate]);
                    return newDb;
                });
            };

            const handleSlotChange = (slotId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[inputDate]) newDb[inputDate] = { manager: getCurrentShiftData(inputDate, 'manager') };
                    if (!newDb[inputDate].manager) newDb[inputDate].manager = getCurrentShiftData(inputDate, 'manager');
                    if (!newDb[inputDate].manager.slots) newDb[inputDate].manager.slots = {};
                    if (!newDb[inputDate].manager.slots[slotId]) newDb[inputDate].manager.slots[slotId] = {};
                    newDb[inputDate].manager.slots[slotId][field] = parsedValue;
                    saveToFirebase('records', inputDate, newDb[inputDate]);
                    return newDb;
                });
            };

            const handleSettingChange = (itemId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setSettings(prev => {
                    const newSettings = { ...prev, [itemId]: { ...prev[itemId], [field]: parsedValue } };
                    saveToFirebase('settings', 'global', { rates: newSettings });
                    return newSettings;
                });
            };

            const handleAddSlot = () => {
                if (!newSlotName.trim()) return;
                const newSlots = [...timeSlots, { id: 'ts_' + Date.now(), label: newSlotName.trim() }];
                setTimeSlots(newSlots);
                saveToFirebase('settings', 'global', { timeSlots: newSlots });
                setNewSlotName('');
            };

            const handleDeleteSlot = (idToRemove) => {
                const newSlots = timeSlots.filter(s => s.id !== idToRemove);
                setTimeSlots(newSlots);
                saveToFirebase('settings', 'global', { timeSlots: newSlots });
            };

            const calculateTarget = (baseData, itemId) => {
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
                const rate = Number(settings[itemId]?.rate) || 0;
                return Math.ceil(baseValue * (rate / 100));
            };

            const calcMetrics = (target, actualValue) => {
                const actual = Number(actualValue) || 0;
                const gap = actual - target;
                const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
                return { gap, achieveRate, gapRate };
            };

            // ==========================================
            // V4.0 HR 模組相關邏輯與渲染函數
            // ==========================================

            const handleHrAuthRequest = () => {
                if (hrAuthUnlocked) {
                    setActiveTab('hr');
                    return;
                }
                const pwd = prompt("此為人事機密區域，請輸入授權密碼 (提示: 8888)");
                if (pwd === '8888') {
                    setHrAuthUnlocked(true);
                    setActiveTab('hr');
                } else if (pwd !== null) {
                    alert("密碼錯誤，拒絕存取。");
                }
            };

            const handleAddHrEmployee = () => {
                if (!newEmpId.trim() || !newEmpName.trim()) {
                    alert("請輸入完整的員工編號與姓名！");
                    return;
                }
                if (hrEmployees[newEmpId]) {
                    alert("此員工編號已存在！");
                    return;
                }
                const newEmp = {
                    id: newEmpId,
                    name: newEmpName,
                    form1: { rows: {}, summary: {} }, // 領航員檢核表
                    form2: { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }, // 關懷追蹤表
                    form3: { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} } // 績效面談表
                };
                saveToFirebase('hr_employees', newEmpId, newEmp);
                setNewEmpId(''); setNewEmpName('');
                setSelectedEmpId(newEmpId);
            };

            // 處理人事表單的資料變更 (深層更新)
            const handleHrFieldChange = (empId, formType, fieldPath, value) => {
                const empData = hrEmployees[empId];
                if (!empData) return;

                // 使用路徑字串更新深層物件 (例: 'form1.rows.1.status')
                const keys = fieldPath.split('.');
                let current = { ...empData };
                const updatedData = current; // 根參照

                for (let i = 0; i < keys.length - 1; i++) {
                    if (!current[keys[i]]) current[keys[i]] = {};
                    current = current[keys[i]];
                }
                current[keys[keys.length - 1]] = value;

                // 為了 React 畫面即時更新，先改本地 state 再寫入 firebase
                setHrEmployees(prev => ({ ...prev, [empId]: updatedData }));
                saveToFirebase('hr_employees', empId, updatedData);
            };

            // 簽名畫布邏輯
            const startDrawing = (e) => {
                isDrawing = true;
                draw(e);
            };
            const stopDrawing = () => {
                isDrawing = false;
                if (canvasRef.current) {
                    canvasRef.current.getContext('2d').beginPath();
                }
            };
            const draw = (e) => {
                if (!isDrawing || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // 處理滑鼠與觸控座標
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (!clientX || !clientY) return;

                const x = clientX - rect.left;
                const y = clientY - rect.top;

                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };
            const clearCanvas = () => {
                if (canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                }
            };
            const saveSignature = () => {
                if (canvasRef.current && sigModal.fieldPath && selectedEmpId) {
                    const dataUrl = canvasRef.current.toDataURL('image/png');
                    // 將 base64 寫入指定的表單路徑
                    handleHrFieldChange(selectedEmpId, null, sigModal.fieldPath, dataUrl);
                    setSigModal({ isOpen: false, fieldPath: '' });
                }
            };
            const openSignature = (fieldPath) => {
                setSigModal({ isOpen: true, fieldPath });
                // 延遲一點等 modal render 後設定 canvas 尺寸
                setTimeout(() => {
                    if (canvasRef.current) {
                        const canvas = canvasRef.current;
                        const parent = canvas.parentElement;
                        canvas.width = parent.clientWidth;
                        canvas.height = parent.clientHeight;
                    }
                }, 100);
            };

            // 渲染簽名框元件
            const renderSignBox = (label, fieldPath, empData) => {
                // 取得深層資料
                const keys = fieldPath.split('.');
                let val = empData;
                for (let k of keys) { val = val?.[k]; }

                return (
                    <div className="flex flex-col items-center">
                        <div className="text-[10px] text-gray-500 mb-1">{label}</div>
                        <div className="sign-box w-24 h-12" onClick={() => openSignature(fieldPath)}>
                            {val ? <img src={val} className="sign-img" alt="簽名" /> : <span>點擊簽名</span>}
                        </div>
                    </div>
                );
            };

            // ---- HR 模組主畫面渲染 ----
            const renderHrTab = () => {
                if (!hrAuthUnlocked) return <div className="p-4 text-center text-red-500">拒絕存取：請由導覽列重新驗證密碼。</div>;

                const currentEmp = hrEmployees[selectedEmpId] || null;

                return (
                    <div className="flex flex-col h-full bg-white relative">
                        {/* 簽名板 Modal */}
                        {sigModal.isOpen && (
                            <div className="absolute inset-0 bg-black/60 z-50 flex flex-col p-4">
                                <div className="bg-white flex-1 rounded-t-xl overflow-hidden flex flex-col">
                                    <div className="bg-blue-800 text-white p-3 text-center font-bold flex justify-between">
                                        <span>請在下方空白處簽名</span>
                                        <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="text-white hover:text-gray-200"><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <div className="flex-1 bg-gray-50 relative cursor-crosshair touch-none">
                                        <canvas ref={canvasRef} 
                                            onMouseDown={startDrawing} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onMouseMove={draw}
                                            onTouchStart={startDrawing} onTouchEnd={stopDrawing} onTouchCancel={stopDrawing} onTouchMove={draw}
                                            className="absolute top-0 left-0 w-full h-full" />
                                    </div>
                                </div>
                                <div className="bg-white p-3 rounded-b-xl flex justify-between border-t shadow-lg gap-2">
                                    <button onClick={clearCanvas} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded font-bold text-lg">清除重簽</button>
                                    <button onClick={saveSignature} className="flex-1 bg-green-600 text-white py-3 rounded font-bold text-lg">確認儲存</button>
                                </div>
                            </div>
                        )}

                        {/* 員工索引區 */}
                        <div className="border-b bg-gray-50 p-2 flex flex-col md:flex-row gap-2 items-center shrink-0">
                            <div className="flex items-center gap-1 w-full md:w-auto bg-white p-1 rounded border shadow-sm">
                                <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold">新增員工</span>
                                <input type="text" placeholder="員工編號" className="w-20 p-1 border-b outline-none text-xs" value={newEmpId} onChange={e => setNewEmpId(e.target.value)} />
                                <input type="text" placeholder="姓名" className="w-20 p-1 border-b outline-none text-xs" value={newEmpName} onChange={e => setNewEmpName(e.target.value)} />
                                <button onClick={handleAddHrEmployee} className="bg-blue-600 text-white px-2 py-1 rounded text-xs"><i className="fa-solid fa-plus"></i></button>
                            </div>
                            
                            <div className="flex items-center gap-2 flex-1 overflow-x-auto hide-scroll w-full">
                                <span className="text-xs text-gray-500 font-bold whitespace-nowrap"><i className="fa-solid fa-address-book mr-1"></i>員工清單:</span>
                                {Object.values(hrEmployees).map(emp => (
                                    <button key={emp.id} onClick={() => setSelectedEmpId(emp.id)} 
                                        className={`px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap border transition ${selectedEmpId === emp.id ? 'bg-blue-600 text-white border-blue-700 shadow' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                        {emp.id} - {emp.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 表單切換 */}
                        {currentEmp ? (
                            <div className="flex flex-col h-full overflow-hidden">
                                <div className="flex bg-gray-100 border-b shrink-0 text-xs font-bold">
                                    <button onClick={() => setHrFormTab('form1')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form1' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>領航員執行檢核</button>
                                    <button onClick={() => setHrFormTab('form2')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form2' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>新人關懷追蹤</button>
                                    <button onClick={() => setHrFormTab('form3')} className={`flex-1 py-2 px-1 ${hrFormTab === 'form3' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>績效改善面談</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 hide-scroll bg-gray-50">
                                    {hrFormTab === 'form1' && renderHrForm1(currentEmp)}
                                    {hrFormTab === 'form2' && renderHrForm2(currentEmp)}
                                    {hrFormTab === 'form3' && renderHrForm3(currentEmp)}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-400 flex-col">
                                <i className="fa-solid fa-folder-open text-4xl mb-2"></i>
                                <p>請從上方選擇或新增一位員工以檢視人事表單</p>
                            </div>
                        )}
                    </div>
                );
            };

            // 表單1：領航員執行檢核表 (1000035989.png)
            const renderHrForm1 = (emp) => {
                const fData = emp.form1 || { rows: {}, summary: {} };
                const chg = (path, val) => handleHrFieldChange(emp.id, 'form1', path, val);

                return (
                    <div className="bg-white max-w-[800px] mx-auto border shadow-sm pb-4">
                        <div className="bg-blue-900 text-white text-center py-3">
                            <h2 className="text-xl font-bold tracking-widest">領航員執行檢核表 ( 新人培育管理 )</h2>
                            <p className="text-xs text-blue-200 mt-1">落實領航員制度，陪伴關懷，提升新人留任率與專業力</p>
                        </div>
                        <div className="p-3 text-xs">
                            <div className="flex justify-between mb-2">
                                <div>店名: <input type="text" className="border-b border-gray-400 outline-none w-20 px-1" value={fData.store||''} onChange={e=>chg('form1.store', e.target.value)}/></div>
                                <div>店長: <input type="text" className="border-b border-gray-400 outline-none w-16 px-1" value={fData.manager||''} onChange={e=>chg('form1.manager', e.target.value)}/></div>
                                <div>總監: <input type="text" className="border-b border-gray-400 outline-none w-16 px-1" value={fData.director||''} onChange={e=>chg('form1.director', e.target.value)}/></div>
                                <div>檢核日期: <input type="date" className="border-b border-gray-400 outline-none" value={fData.date||''} onChange={e=>chg('form1.date', e.target.value)}/></div>
                            </div>
                            <div className="bg-blue-900 text-white p-1 text-center mb-2">檢核說明：本表由店長每月填寫，總監巡店時覆核，確保領航員制度確實執行。</div>

                            <div className="overflow-x-auto">
                                <table className="w-full hr-table text-[10px] mb-4 border-collapse">
                                    <thead>
                                        <tr className="bg-gray-200">
                                            <th className="w-[8%]">階段</th>
                                            <th className="w-[3%]"></th>
                                            <th className="w-[12%]">檢核項目</th>
                                            <th className="w-[18%]">檢核內容說明</th>
                                            <th className="w-[15%]">應完成標準</th>
                                            <th className="w-[12%] text-[9px] p-0">完成狀況(請勾選)<br/><span className="text-gray-500">已完成/部分/未完成</span></th>
                                            <th className="w-[8%]">完成日期</th>
                                            <th className="w-[8%]">領航員<br/>簽名</th>
                                            <th className="w-[6%]">店長覆核</th>
                                            <th className="w-[6%]">總監覆核</th>
                                            <th className="w-[4%]">備註</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {PILOT_ITEMS.map((item, idx) => {
                                            const row = fData.rows[item.no] || {};
                                            const rChg = (f, v) => chg(`form1.rows.${item.no}.${f}`, v);
                                            // 處理階段合併儲存格的視覺 (簡化版：僅文字呈現)
                                            return (
                                                <tr key={item.no}>
                                                    {/* 若要求完美合併需複雜邏輯，此處使用 Tailwind 樣式區分群組 */}
                                                    <td className={`font-bold ${item.no<=4?'bg-orange-50':item.no<=8?'bg-yellow-50':item.no<=11?'bg-green-50':item.no<=14?'bg-blue-50':'bg-purple-50'}`}>{idx===0||item.phase!==PILOT_ITEMS[idx-1].phase?item.phase:''}</td>
                                                    <td>{item.no}</td>
                                                    <td className="font-bold text-gray-700">{item.item}</td>
                                                    <td className="text-left text-[9px]">{item.desc}</td>
                                                    <td className="text-[9px]">{item.std}</td>
                                                    <td className="flex justify-center gap-1">
                                                        <input type="radio" name={`st_${item.no}`} checked={row.status==='done'} onChange={()=>rChg('status','done')} title="已完成" />
                                                        <input type="radio" name={`st_${item.no}`} checked={row.status==='part'} onChange={()=>rChg('status','part')} title="部分完成" />
                                                        <input type="radio" name={`st_${item.no}`} checked={row.status==='none'} onChange={()=>rChg('status','none')} title="未完成" />
                                                    </td>
                                                    <td className="p-0"><input type="date" className="w-full text-[9px] outline-none" value={row.date||''} onChange={e=>rChg('date', e.target.value)}/></td>
                                                    <td className="p-0 cursor-pointer" onClick={() => openSignature(`form1.rows.${item.no}.sig1`)}>{row.sig1?<img src={row.sig1} className="h-6 mx-auto"/>:'✍'}</td>
                                                    <td className="p-0 cursor-pointer" onClick={() => openSignature(`form1.rows.${item.no}.sig2`)}>{row.sig2?<img src={row.sig2} className="h-6 mx-auto"/>:'✍'}</td>
                                                    <td className="p-0 cursor-pointer" onClick={() => openSignature(`form1.rows.${item.no}.sig3`)}>{row.sig3?<img src={row.sig3} className="h-6 mx-auto"/>:'✍'}</td>
                                                    <td className="p-0"><input type="text" className="w-full outline-none px-1" value={row.note||''} onChange={e=>rChg('note', e.target.value)}/></td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>

                            <table className="w-full hr-table text-xs border-collapse">
                                <tbody>
                                    <tr className="bg-gray-100 font-bold"><td colSpan="2">本月新人培育總結</td><td colSpan="2">店長檢核</td><td colSpan="2">總監覆核意見</td></tr>
                                    <tr>
                                        <td className="w-1/6">本月新增<br/>新人數</td><td className="w-1/6"><input type="number" className="w-10 border-b outline-none" value={fData.summary.newNum||''} onChange={e=>chg('form1.summary.newNum',e.target.value)}/> 人</td>
                                        <td colSpan="2" className="text-left align-top">
                                            檢核結果: <label><input type="radio" name="mgrRes" checked={fData.summary.mgrRes==='good'} onChange={()=>chg('form1.summary.mgrRes','good')}/> 良好</label>
                                            <label className="ml-2"><input type="radio" name="mgrRes" checked={fData.summary.mgrRes==='bad'} onChange={()=>chg('form1.summary.mgrRes','bad')}/> 需加強</label><br/>
                                            需加強項目:<br/><textarea className="w-full border mt-1 outline-none text-[10px]" rows="2" value={fData.summary.mgrNote||''} onChange={e=>chg('form1.summary.mgrNote',e.target.value)}></textarea>
                                        </td>
                                        <td colSpan="2" className="text-left align-top">
                                            覆核結果: <label><input type="radio" name="dirRes" checked={fData.summary.dirRes==='good'} onChange={()=>chg('form1.summary.dirRes','good')}/> 良好</label>
                                            <label className="ml-2"><input type="radio" name="dirRes" checked={fData.summary.dirRes==='bad'} onChange={()=>chg('form1.summary.dirRes','bad')}/> 需加強</label><br/>
                                            改善建議:<br/><textarea className="w-full border mt-1 outline-none text-[10px]" rows="2" value={fData.summary.dirNote||''} onChange={e=>chg('form1.summary.dirNote',e.target.value)}></textarea>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>30天留任</td><td><input type="number" className="w-10 border-b outline-none" value={fData.summary.r30||''} onChange={e=>chg('form1.summary.r30',e.target.value)}/> 人</td>
                                        <td rowSpan="3" colSpan="2" className="text-left align-top">1. <input type="text" className="border-b w-full" value={fData.summary.mgrN1||''} onChange={e=>chg('form1.summary.mgrN1',e.target.value)}/><br/>2. <input type="text" className="border-b w-full" value={fData.summary.mgrN2||''} onChange={e=>chg('form1.summary.mgrN2',e.target.value)}/><br/>3. <input type="text" className="border-b w-full" value={fData.summary.mgrN3||''} onChange={e=>chg('form1.summary.mgrN3',e.target.value)}/></td>
                                        <td rowSpan="3" colSpan="2" className="text-left align-top">1. <input type="text" className="border-b w-full" value={fData.summary.dirN1||''} onChange={e=>chg('form1.summary.dirN1',e.target.value)}/><br/>2. <input type="text" className="border-b w-full" value={fData.summary.dirN2||''} onChange={e=>chg('form1.summary.dirN2',e.target.value)}/><br/>3. <input type="text" className="border-b w-full" value={fData.summary.dirN3||''} onChange={e=>chg('form1.summary.dirN3',e.target.value)}/></td>
                                    </tr>
                                    <tr><td>60天留任</td><td><input type="number" className="w-10 border-b outline-none" value={fData.summary.r60||''} onChange={e=>chg('form1.summary.r60',e.target.value)}/> 人</td></tr>
                                    <tr><td>90天留任</td><td><input type="number" className="w-10 border-b outline-none" value={fData.summary.r90||''} onChange={e=>chg('form1.summary.r90',e.target.value)}/> 人</td></tr>
                                    <tr className="bg-gray-50">
                                        <td>整體留任率</td><td><input type="number" className="w-10 border-b outline-none" value={fData.summary.rate||''} onChange={e=>chg('form1.summary.rate',e.target.value)}/> %</td>
                                        <td colSpan="2" className="text-left p-2">
                                            店長簽名: {renderSignBox('', 'form1.summary.mgrSign', fData)}
                                        </td>
                                        <td colSpan="2" className="text-left p-2">
                                            總監簽名: {renderSignBox('', 'form1.summary.dirSign', fData)}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div className="text-[9px] text-gray-500 mt-2 text-center">★ 註: 本表每月5日前完成填寫，總監每月至少巡店覆核1次，並追蹤改善進度，確保領航員制度有效執行。</div>
                        </div>
                    </div>
                );
            };

            // 表單2：新人關懷追蹤紀錄表 (1000035987.png)
            const renderHrForm2 = (emp) => {
                const fData = emp.form2 || { phase1:{}, phase2:{}, phase3:{}, phase4:{}, eval:{} };
                const chg = (path, val) => handleHrFieldChange(emp.id, 'form2', path, val);

                const renderRadio = (path, val, label) => {
                    // path: phase1.env, val: 'ok', label: '非常了解'
                    const keys = path.split('.');
                    const currentVal = fData[keys[0]]?.[keys[1]];
                    return <label className="mr-3 text-gray-700 cursor-pointer"><input type="radio" checked={currentVal===val} onChange={()=>chg(`form2.${path}`, val)} className="mr-1"/>{label}</label>
                };

                return (
                    <div className="bg-white max-w-[800px] mx-auto border shadow-sm pb-4">
                        <div className="flex items-center justify-center py-4 border-b-4 border-blue-900 mb-2 gap-2">
                            <i className="fa-solid fa-users text-blue-600 text-3xl"></i>
                            <h2 className="text-2xl font-black text-blue-900 tracking-wider">新人關懷追蹤紀錄表</h2>
                        </div>
                        <div className="px-4 text-xs">
                            <div className="grid grid-cols-2 gap-x-4 gap-y-2 mb-4 font-bold text-gray-700 text-sm">
                                <div>店別：<input type="text" className="border-b border-gray-400 outline-none w-32" value={fData.store||''} onChange={e=>chg('form2.store',e.target.value)}/></div>
                                <div>新人姓名：<span className="border-b border-gray-400 px-2 min-w-[100px] inline-block text-blue-700">{emp.name}</span></div>
                                <div>職務：<input type="text" className="border-b border-gray-400 outline-none w-32" value={fData.job||'領航員'} onChange={e=>chg('form2.job',e.target.value)}/></div>
                                <div>到職日期：<input type="date" className="border-b border-gray-400 outline-none" value={fData.joinDate||''} onChange={e=>chg('form2.joinDate',e.target.value)}/></div>
                            </div>

                            {/* Phase 1 */}
                            <div className="mb-4">
                                <div className="flex justify-between items-center bg-blue-100 p-1 rounded-t mb-2">
                                    <div className="form-section-title mb-0 bg-blue-700"><span className="bg-white text-blue-700 rounded-full px-1.5 mr-1">1</span> 第一階段 | 到職第1天關懷</div>
                                    <div className="text-gray-600 font-bold mr-2">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs" value={fData.phase1.date||''} onChange={e=>chg('form2.phase1.date',e.target.value)}/></div>
                                </div>
                                <div className="space-y-2 pl-2">
                                    <div className="flex items-center"><i className="fa-solid fa-building text-blue-400 w-5"></i> 是否了解公司環境？ <div className="ml-4">{renderRadio('phase1.env','A','非常了解')}{renderRadio('phase1.env','B','大致了解')}{renderRadio('phase1.env','C','尚未了解')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-clipboard-list text-blue-400 w-5"></i> 是否了解工作內容？ <div className="ml-4">{renderRadio('phase1.job','A','非常了解')}{renderRadio('phase1.job','B','大致了解')}{renderRadio('phase1.job','C','尚未了解')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-location-dot text-blue-400 w-5"></i> 今天最不適應的地方？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase1.q1||''} onChange={e=>chg('form2.phase1.q1',e.target.value)}/></div>
                                    <div className="flex items-center"><i className="fa-solid fa-face-smile text-blue-400 w-5"></i> 今天最開心的事情？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase1.q2||''} onChange={e=>chg('form2.phase1.q2',e.target.value)}/></div>
                                    <div className="flex items-center"><i className="fa-solid fa-user-tie text-blue-400 w-5"></i> 需要主管協助事項？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase1.q3||''} onChange={e=>chg('form2.phase1.q3',e.target.value)}/></div>
                                </div>
                            </div>

                            {/* Phase 2 */}
                            <div className="mb-4">
                                <div className="flex justify-between items-center bg-blue-100 p-1 rounded-t mb-2">
                                    <div className="form-section-title mb-0 bg-blue-700"><span className="bg-white text-blue-700 rounded-full px-1.5 mr-1">2</span> 第二階段 | 到職第7天關懷</div>
                                    <div className="text-gray-600 font-bold mr-2">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs" value={fData.phase2.date||''} onChange={e=>chg('form2.phase2.date',e.target.value)}/></div>
                                </div>
                                <div className="space-y-2 pl-2">
                                    <div className="flex items-center"><i className="fa-solid fa-users text-blue-400 w-5"></i> 是否已認識同仁？ <div className="ml-4">{renderRadio('phase2.colleague','Y','是')}{renderRadio('phase2.colleague','N','否')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-people-group text-blue-400 w-5"></i> 是否能融入團隊？ <div className="ml-4">{renderRadio('phase2.team','A','很好')}{renderRadio('phase2.team','B','普通')}{renderRadio('phase2.team','C','困難')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-chart-bar text-blue-400 w-5"></i> 工作上最大的困難？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase2.q1||''} onChange={e=>chg('form2.phase2.q1',e.target.value)}/></div>
                                    <div className="flex items-center"><i className="fa-solid fa-comment text-blue-400 w-5"></i> 是否有想放棄的念頭？ <div className="ml-4">{renderRadio('phase2.giveup','A','無')}{renderRadio('phase2.giveup','B','偶爾')}{renderRadio('phase2.giveup','C','經常')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-hand-holding-heart text-blue-400 w-5"></i> 如果有困難,希望公司如何協助？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase2.q2||''} onChange={e=>chg('form2.phase2.q2',e.target.value)}/></div>
                                </div>
                            </div>

                            {/* Phase 3 */}
                            <div className="mb-4">
                                <div className="flex justify-between items-center bg-blue-100 p-1 rounded-t mb-2">
                                    <div className="form-section-title mb-0 bg-blue-700"><span className="bg-white text-blue-700 rounded-full px-1.5 mr-1">3</span> 第三階段 | 到職第15天關懷</div>
                                    <div className="text-gray-600 font-bold mr-2">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs" value={fData.phase3.date||''} onChange={e=>chg('form2.phase3.date',e.target.value)}/></div>
                                </div>
                                <div className="space-y-2 pl-2">
                                    <div className="flex items-center"><i className="fa-solid fa-thumbs-up text-blue-400 w-5"></i> 對目前工作是否有信心？ <div className="ml-4">{renderRadio('phase3.conf','A','非常有信心')}{renderRadio('phase3.conf','B','普通')}{renderRadio('phase3.conf','C','沒信心')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-heart text-blue-400 w-5"></i> 對主管關懷是否滿意？ <div className="ml-4">{renderRadio('phase3.mgr','A','滿意')}{renderRadio('phase3.mgr','B','普通')}{renderRadio('phase3.mgr','C','不滿意')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-handshake text-blue-400 w-5"></i> 對同事相處是否滿意？ <div className="ml-4">{renderRadio('phase3.col','A','滿意')}{renderRadio('phase3.col','B','普通')}{renderRadio('phase3.col','C','不滿意')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-briefcase text-blue-400 w-5"></i> 是否會考慮離職？ <div className="ml-4">{renderRadio('phase3.quit','A','沒有')}{renderRadio('phase3.quit','B','偶爾')}{renderRadio('phase3.quit','C','有')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-triangle-exclamation text-blue-400 w-5"></i> 若有離職念頭，主要原因？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase3.q1||''} onChange={e=>chg('form2.phase3.q1',e.target.value)}/></div>
                                </div>
                            </div>

                            {/* Phase 4 */}
                            <div className="mb-4">
                                <div className="flex justify-between items-center bg-blue-100 p-1 rounded-t mb-2">
                                    <div className="form-section-title mb-0 bg-blue-700"><span className="bg-white text-blue-700 rounded-full px-1.5 mr-1">4</span> 第四階段 | 到職第30天關懷</div>
                                    <div className="text-gray-600 font-bold mr-2">訪談日期: <input type="date" className="border-b bg-transparent outline-none text-xs" value={fData.phase4.date||''} onChange={e=>chg('form2.phase4.date',e.target.value)}/></div>
                                </div>
                                <div className="space-y-2 pl-2">
                                    <div className="flex items-center"><i className="fa-solid fa-bullseye text-blue-400 w-5"></i> 工作適應程度 <div className="ml-4">{renderRadio('phase4.adapt','A','非常適應')}{renderRadio('phase4.adapt','B','普通')}{renderRadio('phase4.adapt','C','不適應')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-face-laugh text-blue-400 w-5"></i> 對公司滿意度 <div className="ml-4">{renderRadio('phase4.satis','A','非常滿意')}{renderRadio('phase4.satis','B','滿意')}{renderRadio('phase4.satis','C','普通')}{renderRadio('phase4.satis','D','不滿意')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-seedling text-blue-400 w-5"></i> 未來是否願意持續留任？ <div className="ml-4">{renderRadio('phase4.stay','A','願意')}{renderRadio('phase4.stay','B','觀察中')}{renderRadio('phase4.stay','C','不願意')}</div></div>
                                    <div className="flex items-center"><i className="fa-solid fa-calendar-days text-blue-400 w-5"></i> 未來三個月最需要協助事項？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase4.q1||''} onChange={e=>chg('form2.phase4.q1',e.target.value)}/></div>
                                    <div className="flex items-center"><i className="fa-solid fa-bullhorn text-blue-400 w-5"></i> 對公司建議事項？ <input type="text" className="border-b border-gray-300 outline-none flex-1 ml-2" value={fData.phase4.q2||''} onChange={e=>chg('form2.phase4.q2',e.target.value)}/></div>
                                </div>
                            </div>

                            {/* Evaluation & Signatures */}
                            <div className="flex flex-col md:flex-row gap-4">
                                <div className="flex-1 bg-blue-50 border border-blue-200 rounded p-2">
                                    <div className="text-center font-bold text-gray-700 mb-2 bg-white rounded border py-1 shadow-sm">店長綜合評語</div>
                                    <table className="w-full text-center hr-table bg-white">
                                        <thead><tr><th></th><th>上班<br/>精神</th><th>學習<br/>意願</th><th>團隊<br/>互動</th><th>出勤<br/>狀況</th><th>情緒<br/>穩定</th><th>抱怨<br/>頻率</th></tr></thead>
                                        <tbody>
                                            {['正常', '注意', '危險'].map((level, rowIdx) => (
                                                <tr key={level}>
                                                    <td className="font-bold">{level}</td>
                                                    {['s1','s2','s3','s4','s5','s6'].map((col, cIdx) => (
                                                        <td key={col}><input type="radio" name={`eval_${col}`} checked={fData.eval[col]===level} onChange={()=>chg(`form2.eval.${col}`, level)} /></td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="w-full md:w-64 border rounded p-3 flex flex-col justify-around bg-gray-50">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="font-bold text-gray-700 w-24"><i className="fa-solid fa-pen mr-1 text-blue-500"></i>新人簽名:</div>
                                        <div className="flex-1">{renderSignBox('', 'form2.empSign', fData)}</div>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <div className="font-bold text-gray-700 w-24"><i className="fa-solid fa-user-tie mr-1 text-blue-500"></i>店長簽名:</div>
                                        <div className="flex-1">{renderSignBox('', 'form2.mgrSign', fData)}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="text-[10px] text-gray-500 mt-4 text-center bg-blue-100 p-1 rounded">★ 備註：本表作為新人關懷追蹤紀錄，請妥善保存並持續追蹤，協助新人順利適應與成長。</div>
                        </div>
                    </div>
                );
            };

            // 表單3：員工關懷暨績效改善面談紀錄表 (1000035985.png)
            const renderHrForm3 = (emp) => {
                const fData = emp.form3 || { basic:{}, interview:{}, fact:'', emp:'', guide:{}, improve:[{},{},{}], track:{}, concl:{} };
                const chg = (path, val) => handleHrFieldChange(emp.id, 'form3', path, val);

                const ckbx = (path, val) => {
                    const keys = path.split('.');
                    const obj = fData[keys[0]];
                    const checked = obj ? !!obj[val] : false;
                    return <input type="checkbox" checked={checked} onChange={(e)=>chg(`form3.${path}.${val}`, e.target.checked)} className="mr-1"/>;
                };

                return (
                    <div className="bg-white max-w-[800px] mx-auto border shadow-sm pb-4">
                        <div className="flex items-center justify-center py-4 mb-2">
                            <h2 className="text-2xl font-black text-emerald-900 tracking-wider">員工關懷暨績效改善面談紀錄表</h2>
                        </div>
                        <div className="px-4 text-xs space-y-3">
                            
                            {/* Section 1 */}
                            <div>
                                <div className="form-section-title">一、基本資料</div>
                                <table className="w-full hr-table text-left">
                                    <tbody>
                                        <tr>
                                            <th className="w-1/6 bg-emerald-50"><i className="fa-solid fa-user text-emerald-600 mr-1"></i> 姓名</th><td className="w-2/6 font-bold text-blue-700">{emp.name}</td>
                                            <th className="w-1/6 bg-emerald-50"><i className="fa-solid fa-id-card text-emerald-600 mr-1"></i> 員工編號</th><td className="w-2/6 font-bold text-blue-700">{emp.id}</td>
                                            <th className="w-1/6 bg-emerald-50"><i className="fa-solid fa-building text-emerald-600 mr-1"></i> 部門/店別</th><td className="w-1/6"><input type="text" className="w-full border-b outline-none" value={fData.basic.dept||''} onChange={e=>chg('form3.basic.dept',e.target.value)}/></td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-briefcase text-emerald-600 mr-1"></i> 職務</th><td><input type="text" className="w-full border-b outline-none" value={fData.basic.job||''} onChange={e=>chg('form3.basic.job',e.target.value)}/></td>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-calendar-day text-emerald-600 mr-1"></i> 到職日</th><td><input type="date" className="w-full border-b outline-none" value={fData.basic.joinDate||''} onChange={e=>chg('form3.basic.joinDate',e.target.value)}/></td>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-user-tie text-emerald-600 mr-1"></i> 直屬主管</th><td><input type="text" className="w-full border-b outline-none" value={fData.basic.mgr||''} onChange={e=>chg('form3.basic.mgr',e.target.value)}/></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 2 */}
                            <div>
                                <div className="form-section-title">二、面談內容</div>
                                <table className="w-full hr-table text-left">
                                    <tbody>
                                        <tr>
                                            <th className="w-1/6 bg-emerald-50"><i className="fa-solid fa-calendar text-emerald-600 mr-1"></i> 面談日期</th><td className="w-2/6"><input type="date" className="w-full outline-none" value={fData.interview.date||''} onChange={e=>chg('form3.interview.date',e.target.value)}/></td>
                                            <th className="w-1/6 bg-emerald-50"><i className="fa-solid fa-location-dot text-emerald-600 mr-1"></i> 面談地點</th><td className="w-2/6"><input type="text" className="w-full outline-none" value={fData.interview.loc||''} onChange={e=>chg('form3.interview.loc',e.target.value)}/></td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-comments text-emerald-600 mr-1"></i> 面談類型<br/><span className="text-[9px] font-normal">(可複選)</span></th>
                                            <td colSpan="3" className="flex flex-wrap gap-4 py-2 px-1">
                                                <label>{ckbx('interview', 'type1')} 關懷面談</label>
                                                <label>{ckbx('interview', 'type2')} 績效改善</label>
                                                <label>{ckbx('interview', 'type3')} 客訴事件</label>
                                                <label>{ckbx('interview', 'type4')} 出勤異常</label>
                                                <label>{ckbx('interview', 'type5')} 工作態度</label>
                                                <label>{ckbx('interview', 'type6')} 其他 <input type="text" className="border-b w-20 outline-none" value={fData.interview.typeOther||''} onChange={e=>chg('form3.interview.typeOther',e.target.value)}/></label>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-file-lines text-emerald-600 mr-1"></i> 面談原因<br/><span className="text-[9px] font-normal">(可複選)</span></th>
                                            <td colSpan="3">
                                                <div className="grid grid-cols-2 gap-2 p-1">
                                                    <label>{ckbx('interview', 'r1')} 工作績效未達標準</label>
                                                    <label>{ckbx('interview', 'r2')} 團隊合作問題</label>
                                                    <label>{ckbx('interview', 'r3')} 顧客反應或客訴事件</label>
                                                    <label>{ckbx('interview', 'r4')} 情緒管理問題</label>
                                                    <label>{ckbx('interview', 'r5')} 出勤異常 (遲到、請假)</label>
                                                    <label>{ckbx('interview', 'r6')} 違反公司規範</label>
                                                    <label>{ckbx('interview', 'r7')} 工作態度需改善</label>
                                                    <label>{ckbx('interview', 'r8')} 主動關懷面談</label>
                                                    <label className="col-span-2">{ckbx('interview', 'r9')} 其他：<input type="text" className="border-b w-64 outline-none" value={fData.interview.rOther||''} onChange={e=>chg('form3.interview.rOther',e.target.value)}/></label>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-pen-to-square text-emerald-600 mr-1"></i> 具體事實說明</th>
                                            <td colSpan="3"><textarea className="w-full h-16 outline-none p-1 resize-none" value={fData.fact||''} onChange={e=>chg('form3.fact',e.target.value)}></textarea></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 3 */}
                            <div>
                                <div className="form-section-title">三、員工說明</div>
                                <div className="border border-emerald-200 rounded p-1">
                                    <div className="text-[10px] text-gray-500 bg-gray-50 p-1 mb-1">請員工說明事件經過及個人想法：</div>
                                    <textarea className="w-full h-16 outline-none p-1 resize-none" value={fData.emp||''} onChange={e=>chg('form3.emp',e.target.value)}></textarea>
                                </div>
                            </div>

                            {/* Section 4 */}
                            <div>
                                <div className="form-section-title">四、主管輔導內容</div>
                                <table className="w-full hr-table text-left">
                                    <tbody>
                                        <tr>
                                            <th className="w-1/5 bg-emerald-50"><i className="fa-solid fa-list-check text-emerald-600 mr-1"></i> 面談溝通重點<br/><span className="text-[9px] font-normal">(可複選)</span></th>
                                            <td className="w-4/5">
                                                <div className="grid grid-cols-2 gap-2 p-1">
                                                    <label>{ckbx('guide', 'g1')} 工作標準說明</label>
                                                    <label>{ckbx('guide', 'g2')} 情緒管理建議</label>
                                                    <label>{ckbx('guide', 'g3')} 顧客服務要求</label>
                                                    <label>{ckbx('guide', 'g4')} 教育訓練安排</label>
                                                    <label>{ckbx('guide', 'g5')} 團隊合作要求</label>
                                                    <label>{ckbx('guide', 'g6')} 公司制度說明</label>
                                                    <label>{ckbx('guide', 'g7')} 出勤管理提醒</label>
                                                    <label>{ckbx('guide', 'g8')} 其他：<input type="text" className="border-b w-32 outline-none" value={fData.guide.gOther||''} onChange={e=>chg('form3.guide.gOther',e.target.value)}/></label>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50"><i className="fa-solid fa-comment-dots text-emerald-600 mr-1"></i> 主管輔導內容</th>
                                            <td><textarea className="w-full h-16 outline-none p-1 resize-none" value={fData.guide.content||''} onChange={e=>chg('form3.guide.content',e.target.value)}></textarea></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 5 */}
                            <div>
                                <div className="form-section-title">五、改善計畫</div>
                                <table className="w-full hr-table">
                                    <thead><tr className="bg-emerald-50 text-emerald-800"><th className="w-[10%]"></th><th className="w-[30%]">改善項目</th><th className="w-[45%]">改善目標</th><th className="w-[15%]">完成期限</th></tr></thead>
                                    <tbody>
                                        {[0,1,2].map(idx => (
                                            <tr key={`imp_${idx}`}>
                                                <td className="font-bold text-gray-400">{idx+1}</td>
                                                <td><input type="text" className="w-full outline-none px-1 text-left" value={fData.improve[idx]?.item||''} onChange={e=>chg(`form3.improve.${idx}.item`,e.target.value)}/></td>
                                                <td><input type="text" className="w-full outline-none px-1 text-left" value={fData.improve[idx]?.goal||''} onChange={e=>chg(`form3.improve.${idx}.goal`,e.target.value)}/></td>
                                                <td><input type="date" className="w-full outline-none px-1" value={fData.improve[idx]?.deadline||''} onChange={e=>chg(`form3.improve.${idx}.deadline`,e.target.value)}/></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 6 */}
                            <div>
                                <div className="form-section-title">六、追蹤評估</div>
                                <table className="w-full hr-table text-left">
                                    <tbody>
                                        <tr>
                                            <th className="w-1/6 bg-emerald-50 text-center">改善期間</th>
                                            <td className="w-5/6 flex items-center gap-2">
                                                自 <input type="date" className="border-b outline-none text-xs" value={fData.track.start||''} onChange={e=>chg('form3.track.start',e.target.value)}/>
                                                至 <input type="date" className="border-b outline-none text-xs" value={fData.track.end||''} onChange={e=>chg('form3.track.end',e.target.value)}/>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th className="bg-emerald-50 text-center">追蹤方式 <span className="text-[9px] font-normal">(可複選)</span></th>
                                            <td className="flex gap-6 p-1">
                                                <label>{ckbx('track', 't1')} 主任追蹤</label>
                                                <label>{ckbx('track', 't2')} 店長追蹤</label>
                                                <label>{ckbx('track', 't3')} 總監追蹤</label>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 7 */}
                            <div>
                                <div className="form-section-title">七、面談結論</div>
                                <div className="border border-emerald-200 rounded p-2 grid grid-cols-3 gap-2">
                                    <label>{ckbx('concl', 'c1')} 已了解並願意改善</label>
                                    <label>{ckbx('concl', 'c2')} 持續觀察追蹤</label>
                                    <label>{ckbx('concl', 'c3')} 安排教育訓練</label>
                                    <label>{ckbx('concl', 'c4')} 調整工作內容</label>
                                    <label>{ckbx('concl', 'c5')} 調整排班</label>
                                    <label>{ckbx('concl', 'c6')} 再次面談</label>
                                    <label className="col-span-3">{ckbx('concl', 'c7')} 其他處理方式：<input type="text" className="border-b w-64 outline-none" value={fData.concl.cOther||''} onChange={e=>chg('form3.concl.cOther',e.target.value)}/></label>
                                </div>
                            </div>

                            {/* Section 8 */}
                            <div>
                                <div className="form-section-title mb-1">八、雙方確認</div>
                                <div className="border border-emerald-200 rounded p-2 bg-emerald-50/30">
                                    <div className="text-[10px] text-gray-700 mb-4 font-bold">本人已了解本次面談內容及改善方向，並願意配合後續改善計畫。</div>
                                    <div className="flex justify-around items-end mb-2">
                                        {renderSignBox('員工簽名', 'form3.sign.emp', fData)}
                                        {renderSignBox('主管簽名', 'form3.sign.mgr', fData)}
                                        {renderSignBox('店長簽名', 'form3.sign.storeMgr', fData)}
                                    </div>
                                    <div className="text-right text-[10px] text-gray-500 pr-4 mt-2">日期: <input type="date" className="border-b bg-transparent outline-none" value={fData.sign?.date||''} onChange={e=>chg('form3.sign.date',e.target.value)}/></div>
                                </div>
                            </div>

                            <div className="text-[10px] text-gray-500 mt-2 text-center bg-emerald-100 p-1 rounded">備註：本表僅作為面談紀錄及改善依據，將作為後續追蹤與評估之參考，並依公司相關規定辦理。</div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full max-w-7xl mx-auto bg-gray-100 relative">
                    <header className="px-4 py-2 border-b bg-white flex justify-between items-center shrink-0 shadow-sm relative z-10">
                        <h1 className="text-xl font-black text-gray-800 tracking-tight">中清店12生肖戰報</h1>
                    </header>

                    <nav className="flex overflow-x-auto border-b bg-white shrink-0 hide-scroll text-sm relative z-10">
                        <button onClick={() => setActiveTab('night')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'night' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-moon mr-1 text-gray-700"></i>夜班</button>
                        <button onClick={() => setActiveTab('morning')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'morning' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-sun mr-1 text-orange-500"></i>早班</button>
                        <button onClick={() => setActiveTab('evening')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'evening' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-cloud-sun mr-1 text-indigo-500"></i>晚班</button>
                        <button onClick={() => setActiveTab('summary')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'summary' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-layer-group mr-1 text-green-600"></i>三班累加</button>
                        <button onClick={() => setActiveTab('audit')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'audit' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-clipboard-check mr-1 text-red-600"></i>稽核</button>
                        <button onClick={() => setActiveTab('trend')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'trend' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-chart-line mr-1 text-purple-600"></i>趨勢圖表</button>
                        <button onClick={() => setActiveTab('settings')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'settings' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-gear mr-1 text-gray-500"></i>店長設定</button>
                        <button onClick={handleHrAuthRequest} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-red-200 ${activeTab === 'hr' ? 'tab-active !border-b-red-500 !text-red-700' : 'text-red-500 hover:bg-red-50'}`}><i className="fa-solid fa-user-shield mr-1"></i>HR/人事管理</button>
                    </nav>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'night' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('night', '夜班', 'fa-moon', 'text-gray-800', 'bg-gray-800')}</div>}
                        {activeTab === 'morning' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('morning', '早班', 'fa-sun', 'text-orange-600', 'bg-orange-500')}</div>}
                        {activeTab === 'evening' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('evening', '晚班', 'fa-cloud-sun', 'text-indigo-600', 'bg-indigo-500')}</div>}
                        {activeTab === 'summary' && <div className="p-2 h-full overflow-hidden">{renderSummary()}</div>}
                        {activeTab === 'audit' && <div className="p-2 h-full overflow-hidden">{renderAudit()}</div>}
                        {activeTab === 'trend' && <div className="p-2 h-full overflow-hidden">{renderTrendTab()}</div>}
                        {activeTab === 'settings' && <div className="p-2 h-full overflow-hidden">{renderSettings()}</div>}
                        {activeTab === 'hr' && renderHrTab()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
