        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6XN-DEpUi4L9jETKpZWZhVrQw7tV4M5E",
            authDomain: "akpi-e0698.firebaseapp.com",
            projectId: "akpi-e0698",
            storageBucket: "akpi-e0698.firebasestorage.app",
            messagingSenderId: "446898815193",
            appId: "1:446898815193:web:f8e38b569ed64f4f0b3ec8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fb = { app, db, auth, doc, setDoc, onSnapshot, collection, signInAnonymously, signInWithCustomToken, onAuthStateChanged };

    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { height: 100%; }
        
        .tab-active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; font-weight: bold; background-color: #eff6ff;}
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { background-color: #e2e8f0; color: #334155; }
        input[type="number"], input[type="date"], input[type="month"] { text-align: right; }
        input[type="radio"], input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* HR Forms Styles */
        .hr-form-container { width: 100%; max-width: 1000px; margin: 0 auto; background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hr-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; } 
        .hr-table th, .hr-table td { border: 1px solid #94a3b8; padding: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; text-align: left; }
        
        /* 簽名版樣式優化 */
        .sign-box { border: 1px dashed #94a3b8; border-radius: 4px; min-height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; color: #94a3b8; overflow: hidden; width: 100%; position: relative; }
        .sign-box:hover { background-color: #f1f5f9; border-color: #3b82f6; color: #3b82f6; }
        .sign-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; z-index: 10; }
        
        .form-section-title { padding: 4px 10px !important; margin-bottom: 4px !important; font-size: 0.85rem !important; font-weight: bold; color: white;}
        textarea.auto-expand { width: 100%; height: 100%; min-height: 60px; resize: none; background: transparent; border: none; outline: none; white-space: pre-wrap; word-break: break-all; font-size: 0.75rem; }

        /* PDF 預覽 / 列印模式 */
        body.pdf-mode { background-color: #525659 !important; overflow: auto !important; height: auto !important; }
        body.pdf-mode #root { height: auto !important; overflow: visible !important; }
        body.pdf-mode .fullscreen-container { height: auto !important; overflow: visible !important; display: block !important; padding: 20px 0; }
        body.pdf-mode .hide-in-fullscreen { display: none !important; }
        body.pdf-mode .hr-form-container { max-width: 210mm; min-height: 297mm; margin: 0 auto; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: none; }

        @media print {
            .sign-placeholder { display: none !important; color: transparent !important; }
            .sign-box { border: none !important; background-color: transparent !important; }
            body, body.pdf-mode { background: white !important; padding: 0 !important; }
            .fullscreen-container { padding: 0 !important; }
            .hr-form-container, body.pdf-mode .hr-form-container { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; min-height: auto; }
            .no-print { display: none !important; }
            textarea { overflow: visible !important; }
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯+週邊商品', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 10, color: 'rgb(251, 146, 60)' },
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 10, color: '#8B4513' },
            { id: 'setMeal', name: '套餐', type: 'count', unit: '單數', defaultRate: 12, defaultScore: 10, color: 'rgb(74, 222, 128)' },
            { id: 'fascia', name: '筋膜刀', type: 'amount', unit: '金額', defaultRate: 7, defaultScore: 10, color: 'rgb(248, 113, 113)' },
            { id: 'review', name: '評論', type: 'count', unit: '則數', defaultRate: 10, defaultScore: 10, color: 'rgb(96, 165, 250)' },
            { id: 'app', name: '會員APP', type: 'count', unit: '單數', defaultRate: 6, defaultScore: 5, color: 'rgb(167, 139, 250)' }
        ];

        const DEFAULT_TIME_SLOTS = [
            { id: 'ts_00_08', label: '00-08 時段' },
            { id: 'ts_08_16', label: '08-16 時段' },
            { id: 'ts_12_21', label: '12-21 時段' },
            { id: 'ts_15_00', label: '15-00 時段' }
        ];

        const PILOT_ITEMS = [ { phase: '配對階段', no: 1, item: '指定領航員', desc: '已指派合適領航員並告知雙方職責', std: '報到當日完成配對' } ];

        // 12生肖戰報固定設定
        const ZODIAC_ITEMS = [
            { id: 1, name: '業績管理', weight: 10, icon: 'fa-chart-line', color: 'text-orange-600', points: '• 每日業績目標設定與追蹤\n• 業績達成檢討與改善行動\n• 業績報表準確與回報' },
            { id: 2, name: '商品銷售', weight: 15, icon: 'fa-cart-shopping', color: 'text-blue-500', points: '• 主推商品積極銷售\n• 滴雞精/湯品銷售推廣\n• 商品庫存與銷售分析' },
            { id: 3, name: '筋膜推廣', weight: 10, icon: 'fa-person-running', color: 'text-blue-700', points: '• 筋膜主動介紹\n• 成交率提升與追蹤\n• 師傅話術落實與檢核' },
            { id: 4, name: '套餐銷售', weight: 10, icon: 'fa-gift', color: 'text-blue-400', points: '• 套餐話術落實\n• 套餐銷售數量提升\n• 顧客回購與滿意度' },
            { id: 5, name: '人力管理', weight: 10, icon: 'fa-users', color: 'text-orange-500', points: '• 新人關懷與輔導\n• 員工出勤與排班管理\n• 離職預警與留人措施' },
            { id: 6, name: '粉專/社群', weight: 5, icon: 'fa-thumbs-up', color: 'text-orange-400', points: '• 每週發文3篇以上\n• 互動回應與粉絲增加\n• 短影音/活動分享' },
            { id: 7, name: '訪談與輔導', weight: 5, icon: 'fa-comments', color: 'text-gray-500', points: '• 員工與師傅訪談\n• 新人/績效輔導紀錄\n• 訪談表完整填寫' },
            { id: 8, name: 'Google評論', weight: 10, icon: 'fa-google', color: 'text-red-500', points: '• 五星評論增加\n• 負評即時回覆處理\n• 評論內容改善追蹤' },
            { id: 9, name: 'APP會員', weight: 5, icon: 'fa-mobile-screen', color: 'text-blue-600', points: '• 新會員招募\n• 會員回訪與互動\n• 會員成長數追蹤' },
            { id: 10, name: '客訴管理', weight: 10, icon: 'fa-headset', color: 'text-indigo-800', points: '• 客訴即時處理\n• 處理流程符合SOP\n• 改善措施與追蹤' },
            { id: 11, name: '銷貨管理', weight: 5, icon: 'fa-clipboard-check', color: 'text-teal-600', points: '• 銷貨成本管控\n• 銷貨與使用差異管控\n• 現金/刷卡帳款一致' },
            { id: 12, name: '庫存管理', weight: 5, icon: 'fa-box', color: 'text-yellow-700', points: '• 定期盤點執行\n• 庫存數量管控\n• 效期商品管理' }
        ];

        function App() {
            // === 統一把所有狀態放在最頂層，絕不寫在條件判斷內 ===
            const [activeTab, setActiveTab] = useState('night');
            const getTodayStr = () => { const today = new Date(); return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`; };
            const todayStr = getTodayStr();
            const [inputDate, setInputDate] = useState(todayStr);       
            const [database, setDatabase] = useState({});
            const safeInputDate = inputDate || todayStr;

            // 趨勢與累加狀態
            const [summaryRange, setSummaryRange] = useState('currentMonth');
            const [summaryRangeStart, setSummaryRangeStart] = useState(todayStr.substring(0, 8) + '01');
            const [summaryRangeEnd, setSummaryRangeEnd] = useState(todayStr);
            const [summaryWeek, setSummaryWeek] = useState(() => {
                const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
            });
            const [trendFilter, setTrendFilter] = useState('all');
            const [trendPeriodType, setTrendPeriodType] = useState('month'); // 新增: 趨勢圖表週/月切換
            const [visibleChart, setVisibleChart] = useState(ITEM_CONFIG[0].id);
            const chartRef = useRef(null);

            // 設定與時段
            const [settings, setSettings] = useState(ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: { rate: item.defaultRate, score: item.defaultScore } }), {}));
            const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
            const [newSlotName, setNewSlotName] = useState('');

            // HR & 安全驗證狀態
            const [hrAuthUnlocked, setHrAuthUnlocked] = useState(false);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [pwdErrorModal, setPwdErrorModal] = useState(false); 
            const [pwdInput, setPwdInput] = useState('');
            const [fullScreenMode, setFullScreenMode] = useState(false);
            const [hrEmployees, setHrEmployees] = useState({});
            
            // 員工管理 States
            const [selectedStore, setSelectedStore] = useState(''); 
            const [selectedEmpId, setSelectedEmpId] = useState(''); 
            const [newEmpId, setNewEmpId] = useState('');
            const [newEmpName, setNewEmpName] = useState('');
            const [hrFormTab, setHrFormTab] = useState('form4'); // 預設跳到生肖戰報
            const [zodiacPeriodType, setZodiacPeriodType] = useState('week'); // 生肖表週/月切換
            const [zodiacPeriodValue, setZodiacPeriodValue] = useState(summaryWeek); // 儲存選擇的週/月字串
            
            // Modal States
            const [showEmpModal, setShowEmpModal] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [editEmpData, setEditEmpData] = useState({ id: '', name: '', storeName: '' });
            const [sigModal, setSigModal] = useState({ isOpen: false, fieldPath: '' });
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            // Admin States
            const [isSuperAdmin, setIsSuperAdmin] = useState(false);
            const [showSuperAuthModal, setShowSuperAuthModal] = useState(false);
            const [superAuthErrorModal, setSuperAuthErrorModal] = useState(false); 
            const [superAccInput, setSuperAccInput] = useState('');
            const [superPwdInput, setSuperPwdInput] = useState('');
            const [systemUsers, setSystemUsers] = useState([]);
            const [loggedInGroup, setLoggedInGroup] = useState('中清店');
            const [editUser, setEditUser] = useState(null);
            const [manageUserModal, setManageUserModal] = useState(false);

            // PDF 模式綁定
            useEffect(() => {
                if (fullScreenMode) document.body.classList.add('pdf-mode');
                else document.body.classList.remove('pdf-mode');
            }, [fullScreenMode]);

            const switchTab = (tabName) => {
                if (tabName !== 'hr') { setHrAuthUnlocked(false); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); setFullScreenMode(false); }
                if (tabName !== 'admin') setIsSuperAdmin(false);
                setActiveTab(tabName);
            };

            const handlePwdSubmit = () => {
                if (pwdInput === '8888') { setHrAuthUnlocked(true); setActiveTab('hr'); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); } 
                else { setPwdErrorModal(true); setPwdInput(''); }
            };

            const handleSuperAuthSubmit = () => {
                if (superAccInput === '信吉' && superPwdInput === '7310168888') {
                    setIsSuperAdmin(true); setLoggedInGroup('總部最高權限'); setActiveTab('admin'); setShowSuperAuthModal(false); setSuperAccInput(''); setSuperPwdInput(''); setSuperAuthErrorModal(false);
                } else { setSuperAuthErrorModal(true); setSuperPwdInput(''); }
            };

            useEffect(() => {
                const initFb = async () => {
                    if (!window.fb) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.fb;
                    try { await signInAnonymously(auth); } catch (err) {}

                    onAuthStateChanged(auth, user => {
                        window.firebaseUser = user;
                        if (!user) return;
                        const appId = 'akpi-e0698';
                        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                        const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
                        const hrRef = collection(db, 'artifacts', appId, 'public', 'data', 'hr_employees');
                        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'system_users');

                        onSnapshot(recordsRef, snap => { const newDb = {}; snap.forEach(d => newDb[d.id] = d.data()); setDatabase(newDb); });
                        onSnapshot(settingsRef, snap => {
                            snap.forEach(d => {
                                if (d.id === "global") {
                                    const data = d.data();
                                    if (data.rates) setSettings(prev => ({ ...prev, ...data.rates }));
                                    if (data.timeSlots && Array.isArray(data.timeSlots)) setTimeSlots(data.timeSlots);
                                }
                            });
                        });
                        onSnapshot(hrRef, snap => {
                            const newHr = {}; 
                            snap.forEach(d => { const data = d.data(); if(!data.isDeleted) newHr[d.id] = data; }); 
                            setHrEmployees(newHr);
                        });
                        onSnapshot(usersRef, snap => {
                            const users = []; snap.forEach(d => users.push({ id: d.id, ...d.data() })); setSystemUsers(users);
                        });
                    });
                };
                if (window.fb) initFb();
                else window.addEventListener('firebase-ready', initFb);
                return () => window.removeEventListener('firebase-ready', initFb);
            }, []);

            const saveToFirebase = (collectionName, docId, dataToMerge, isMerge = true) => {
                if (window.fb && window.firebaseUser) {
                    const { db, doc, setDoc } = window.fb;
                    const docRef = doc(db, 'artifacts', 'akpi-e0698', 'public', 'data', collectionName, docId);
                    setDoc(docRef, dataToMerge, { merge: isMerge }).catch(e => console.error("DB Write Error:", e));
                }
            };

            // === 日期與輔助邏輯 ===
            const getDatesFromPeriod = (type, value) => {
                if (!value) return [];
                const dates = [];
                if (type === 'week') {
                    const parts = value.split('-W');
                    if (parts.length === 2) {
                        const year = parseInt(parts[0], 10); const week = parseInt(parts[1], 10);
                        const jan4 = new Date(year, 0, 4); const dayOffset = jan4.getDay() || 7;
                        const mon = new Date(year, 0, 4 - dayOffset + 1 + (week - 1) * 7);
                        for(let i=0; i<7; i++) {
                            const d = new Date(mon); d.setDate(mon.getDate() + i);
                            dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                        }
                    }
                } else if (type === 'month') {
                    const parts = value.split('-');
                    if(parts.length === 2) {
                        const y = parseInt(parts[0]); const m = parseInt(parts[1]);
                        const days = new Date(y, m, 0).getDate();
                        for(let i=1; i<=days; i++) { dates.push(`${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`); }
                    }
                }
                return dates;
            };

            const calculateTarget = (baseData, itemId) => {
                if (!baseData) return 0;
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
                const rate = settings[itemId] && settings[itemId].rate ? Number(settings[itemId].rate) : 0;
                return Math.ceil(baseValue * (rate / 100));
            };

            const calcMetrics = (target, actualValue) => {
                const actual = Number(actualValue) || 0;
                const gap = actual - target;
                const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
                return { gap, achieveRate, gapRate };
            };

            const handleHrFieldChange = (empId, formType, fieldPath, value) => {
                setHrEmployees(prev => {
                    const empData = prev[empId];
                    if (!empData) return prev;
                    const updatedEmp = JSON.parse(JSON.stringify(empData));
                    const keys = fieldPath.split('.');
                    let current = updatedEmp;
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!current[keys[i]]) current[keys[i]] = {};
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                    saveToFirebase('hr_employees', empId, updatedEmp);
                    return { ...prev, [empId]: updatedEmp };
                });
            };

            // === 簽名版邏輯 ===
            const startDrawing = (e) => { isDrawingRef.current = true; draw(e); };
            const stopDrawing = () => { isDrawingRef.current = false; if (canvasRef.current) canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawingRef.current || !canvasRef.current) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (!clientX || !clientY) return;
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                ctx.lineTo(x, y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y);
            };
            const clearCanvas = () => { if (canvasRef.current) { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); } };
            const saveSignature = () => {
                if (canvasRef.current && sigModal.fieldPath && selectedEmpId) {
                    const dataUrl = canvasRef.current.toDataURL('image/png');
                    // 修正簽名路徑，不傳 null，直接利用動態 keys 賦值
                    handleHrFieldChange(selectedEmpId, null, sigModal.fieldPath, dataUrl);
                    setSigModal({ isOpen: false, fieldPath: '' });
                }
            };
            const openSignature = (fieldPath) => {
                setSigModal({ isOpen: true, fieldPath });
                setTimeout(() => {
                    if (canvasRef.current) {
                        const canvas = canvasRef.current;
                        const parent = canvas.parentElement;
                        canvas.width = parent.clientWidth;
                        canvas.height = parent.clientHeight;
                    }
                }, 100);
            };

            const renderSignBox = (label, fieldPath, empData, customClass="") => {
                const keys = fieldPath.split('.');
                let val = empData;
                for (let k of keys) { val = val && val[k]; }
                return (
                    <div className="flex flex-col items-center justify-center h-full w-full relative">
                        {label && <div className="text-[10px] text-gray-500 mb-1 z-20">{label}</div>}
                        <div className={`sign-box w-full ${customClass}`} onClick={() => openSignature(fieldPath)}>
                            {val ? <img src={val} className="sign-img" alt="簽名" /> : <span className="sign-placeholder text-[10px]">點擊簽名</span>}
                        </div>
                    </div>
                );
            };

            // === 渲染函式 ===
            const renderHrTab = () => {
                if (!hrAuthUnlocked) return <div className="p-4 text-center text-red-500 mt-10 font-bold">拒絕存取：請由導覽列重新驗證密碼。</div>;
                const availableStores = [...new Set(Object.values(hrEmployees).map(emp => emp.storeName).filter(Boolean))];
                const empsInStore = Object.values(hrEmployees).filter(emp => emp.storeName === selectedStore);
                const currentEmp = hrEmployees[selectedEmpId] || null;

                const renderHrForm4 = (emp) => {
                    const fData = emp.form4 || {};
                    const periodKey = zodiacPeriodValue || 'default';
                    const periodData = fData[periodKey] || { items: {}, summary: {}, sign: {} };
                    const dates = getDatesFromPeriod(zodiacPeriodType, zodiacPeriodValue);
                    const dStart = dates[0] ? dates[0].replace(/-/g,'/') : '';
                    const dEnd = dates[dates.length-1] ? dates[dates.length-1].replace(/-/g,'/') : '';

                    const chg = (path, val) => handleHrFieldChange(emp.id, 'form4', `${periodKey}.${path}`, val);

                    // 自動帶入營運數據 & 計算邏輯
                    const autoSyncData = () => {
                        let sumRev = 0, sumCust = 0, sumProducts = 0, sumFascia = 0, sumSet = 0, sumReview = 0, sumApp = 0;
                        dates.forEach(d => {
                            if(database[d]) {
                                ['morning', 'evening', 'night'].forEach(shift => {
                                    if(database[d][shift]) {
                                        const s = database[d][shift];
                                        sumRev += Number(s.revenue)||0;
                                        sumCust += Number(s.customers)||0;
                                        sumProducts += (Number(s.chickenSoup)||0) + (Number(s.essence)||0) + (Number(s.setMeal)||0);
                                        sumFascia += Number(s.fascia)||0;
                                        sumSet += Number(s.setMeal)||0;
                                        sumReview += Number(s.review)||0;
                                        sumApp += Number(s.app)||0;
                                    }
                                });
                            }
                        });
                        
                        const updates = {
                            1: { text: `實際業績: $${sumRev.toLocaleString()}`, rate: sumRev > 0 ? 100 : 0 },
                            2: { text: `實際商品銷售: ${sumProducts}`, rate: sumProducts > 0 ? 100 : 0 },
                            3: { text: `筋膜實績: ${sumFascia}`, rate: sumFascia > 0 ? 100 : 0 },
                            4: { text: `套餐實績: ${sumSet}`, rate: sumSet > 0 ? 100 : 0 },
                            8: { text: `Google評論實績: ${sumReview}`, rate: sumReview > 0 ? 100 : 0 },
                            9: { text: `APP會員實績: ${sumApp}`, rate: sumApp > 0 ? 100 : 0 },
                        };

                        Object.keys(updates).forEach(itemId => {
                            chg(`items.${itemId}.actualText`, updates[itemId].text);
                            updateRateAndScore(itemId, updates[itemId].rate);
                        });
                        alert('已成功將該區間的營運數據帶入對應欄位，請手動檢視/調整達成率！');
                    };

                    const updateRateAndScore = (itemId, newRate) => {
                        const rateNum = Number(newRate) || 0;
                        const weight = ZODIAC_ITEMS.find(i => i.id === Number(itemId)).weight;
                        const score = Number(((rateNum / 100) * weight).toFixed(2));
                        const maxScore = Math.min(score, weight); // 最高不超過配分
                        chg(`items.${itemId}.rate`, rateNum);
                        chg(`items.${itemId}.score`, maxScore);
                    };

                    // 自動計算總結
                    let totalScore = 0;
                    ZODIAC_ITEMS.forEach(i => {
                        const itemScore = Number(periodData.items?.[i.id]?.score) || 0;
                        totalScore += itemScore;
                    });
                    const achieveRate = totalScore; // 總分100，所以分數即達成率%
                    const level = totalScore >= 90 ? '優秀' : totalScore >= 80 ? '良好' : totalScore >= 60 ? '合格' : '待改善';

                    return (
                        <div className="hr-form-container text-gray-800 bg-white">
                            <div className="text-center py-4 border-b-2 border-red-600 mb-2">
                                <h1 className="text-3xl font-bold text-blue-900 tracking-[0.2em]">12生肖績效檢討表</h1>
                                <p className="text-red-600 font-bold mt-2 tracking-widest text-sm">落實執行 ． 追蹤管理 ． 持續改善 ． 提升營運績效</p>
                            </div>

                            <div className="flex justify-between items-end px-4 mb-2 text-sm font-bold border-b border-gray-300 pb-2 hide-in-fullscreen">
                                <div className="flex items-center gap-4">
                                    <span>店名: <span className="text-blue-700 ml-1 border-b px-2">{emp.storeName}</span></span>
                                    <span>店長: <span className="text-blue-700 ml-1 border-b px-2">{emp.name}</span></span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={autoSyncData} className="bg-yellow-500 text-yellow-900 px-3 py-1 rounded text-xs hover:bg-yellow-400 transition shadow-sm border border-yellow-600">
                                        <i className="fa-solid fa-bolt mr-1"></i>自動帶入營運數據
                                    </button>
                                    <div className="flex items-center bg-gray-100 p-1 rounded">
                                        <label className="mr-2 cursor-pointer flex items-center text-xs"><input type="radio" checked={zodiacPeriodType==='week'} onChange={()=>setZodiacPeriodType('week')} className="mr-1"/>週</label>
                                        <label className="mr-2 cursor-pointer flex items-center text-xs"><input type="radio" checked={zodiacPeriodType==='month'} onChange={()=>setZodiacPeriodType('month')} className="mr-1"/>月</label>
                                        {zodiacPeriodType === 'week' ? 
                                            <input type="week" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/> : 
                                            <input type="month" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/>
                                        }
                                    </div>
                                    <span className="text-xs text-blue-800 bg-blue-50 px-2 py-1 rounded border border-blue-200">
                                        期間：{dStart} ~ {dEnd}
                                    </span>
                                </div>
                            </div>
                            
                            {/* 列印專用 Header */}
                            <div className="hidden print:flex justify-between items-end px-4 mb-2 text-sm font-bold border-b-2 border-red-600 pb-2">
                                <div className="flex gap-8">
                                    <span>店名： <span className="text-blue-900 border-b border-gray-400 inline-block w-24 text-center">{emp.storeName}</span></span>
                                    <span>店長： <span className="text-blue-900 border-b border-gray-400 inline-block w-24 text-center">{emp.name}</span></span>
                                </div>
                                <div>
                                    檢討期間：<span className="mx-1">{zodiacPeriodType==='week' ? '☑ 週  ☐ 月' : '☐ 週  ☑ 月'}</span> 
                                    <span className="text-blue-900 ml-2">({dStart} ~ {dEnd})</span>
                                </div>
                            </div>

                            <div className="px-2">
                                <table className="w-full text-center border-collapse border-2 border-blue-900 text-xs shadow-sm">
                                    <thead>
                                        <tr className="bg-blue-900 text-white font-bold tracking-widest">
                                            <th className="p-2 border border-blue-800 w-[5%]">項次</th>
                                            <th className="p-2 border border-blue-800 w-[12%]">檢核項目</th>
                                            <th className="p-2 border border-blue-800 w-[20%] text-left pl-4">檢核重點內容</th>
                                            <th className="p-2 border border-blue-800 w-[23%] text-left pl-4">執行標準<br/><span className="text-[10px] font-normal opacity-80">(達成實績)</span></th>
                                            <th className="p-2 border border-blue-800 w-[5%]">配分</th>
                                            <th className="p-2 border border-blue-800 w-[6%] leading-tight">店長<br/>自評</th>
                                            <th className="p-2 border border-blue-800 w-[6%] leading-tight">總監<br/>覆評</th>
                                            <th className="p-2 border border-blue-800 w-[23%]">建議改善事項</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white">
                                        {ZODIAC_ITEMS.map((item, index) => {
                                            const iData = periodData.items?.[item.id] || {};
                                            return (
                                                <tr key={item.id} className="border-b border-gray-300 hover:bg-gray-50 transition-colors group">
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-700">{item.id}</td>
                                                    <td className="p-2 border-r border-gray-300 font-bold">
                                                        <div className={`flex items-center justify-center gap-2 ${item.color}`}>
                                                            <i className={`fa-solid ${item.icon} text-lg w-5`}></i>
                                                            <span className="text-sm tracking-widest">{item.name}</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 border-r border-gray-300 text-left text-[11px] font-semibold text-gray-700 whitespace-pre-wrap leading-relaxed tracking-wide align-middle">
                                                        {item.points}
                                                    </td>
                                                    <td className="p-1 border-r border-gray-300 relative align-top h-[75px]">
                                                        <textarea 
                                                            className="auto-expand" 
                                                            placeholder="填寫實績或文字說明..." 
                                                            value={iData.actualText||''} 
                                                            onChange={e=>chg(`items.${item.id}.actualText`, e.target.value)}
                                                        ></textarea>
                                                        <div className="absolute bottom-1 right-1 flex items-center text-[10px] bg-white/90 px-1 py-0.5 rounded border border-gray-200 shadow-sm opacity-50 group-hover:opacity-100 transition-opacity">
                                                            <span className="font-bold text-blue-800 mr-1">達成率:</span>
                                                            <input type="number" className="w-10 text-center font-bold text-blue-600 bg-transparent outline-none border-b border-blue-300 mr-0.5" value={iData.rate!==undefined?iData.rate:''} onChange={e=>updateRateAndScore(item.id, e.target.value)} placeholder="0"/>%
                                                        </div>
                                                    </td>
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-800 text-sm">{item.weight}</td>
                                                    <td className="p-1 border-r border-gray-300 align-middle">
                                                        <input type="number" className="w-full text-center font-black text-blue-700 bg-transparent outline-none text-sm" value={iData.score!==undefined?iData.score:''} onChange={e=>chg(`items.${item.id}.score`, e.target.value)} placeholder="0"/>
                                                    </td>
                                                    <td className="p-1 border-r border-gray-300 align-middle">
                                                        <input type="number" className="w-full text-center font-bold text-gray-700 bg-transparent outline-none text-sm" value={iData.dirScore!==undefined?iData.dirScore:''} onChange={e=>chg(`items.${item.id}.dirScore`, e.target.value)}/>
                                                    </td>
                                                    <td className="p-1 border-gray-300 align-top h-[75px]">
                                                        <textarea className="auto-expand" placeholder="輸入建議改善事項..." value={iData.note||''} onChange={e=>chg(`items.${item.id}.note`, e.target.value)}></textarea>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        
                                        {/* 總結區塊 */}
                                        <tr className="bg-[#eef2ff] border-t-2 border-blue-900">
                                            <td colSpan="4" className="text-right p-2 font-bold text-gray-700 border-r border-gray-300">
                                                <div className="mb-2">平均分數：</div>
                                                <div>達成率：</div>
                                            </td>
                                            <td colSpan="2" className="p-2 text-center border-r border-gray-300 font-black text-lg text-blue-800 tracking-wider">
                                                <div className="mb-1 border-b border-blue-200 pb-1">{totalScore.toFixed(2)} <span className="text-xs font-normal">/ 100 分</span></div>
                                                <div className="text-red-600">{achieveRate.toFixed(2)}%</div>
                                            </td>
                                            <td colSpan="2" className="p-2 text-left font-bold text-gray-700 align-top relative">
                                                <div className="bg-white px-2 py-1 rounded shadow-sm border border-blue-100 h-full flex flex-col">
                                                    <div className="border-b border-blue-100 pb-1 mb-1 text-center text-[#1e3a8a]">本月亮點與改善重點</div>
                                                    <div className="flex-1 flex flex-col gap-1">
                                                        <div className="flex items-start">
                                                            <span className="w-12 text-[#1e3a8a] shrink-0 mt-0.5">亮點:</span>
                                                            <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[30px]" value={periodData.summary?.highlight||''} onChange={e=>chg('summary.highlight', e.target.value)}></textarea>
                                                        </div>
                                                        <div className="flex items-start border-t border-dashed border-gray-200 pt-1">
                                                            <span className="w-16 text-red-700 shrink-0 mt-0.5">改善重點:</span>
                                                            <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[30px]" value={periodData.summary?.improve||''} onChange={e=>chg('summary.improve', e.target.value)}></textarea>
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr className="bg-[#eef2ff] border-t border-blue-200">
                                            <td colSpan="2" className="text-center font-bold text-gray-700 border-r border-gray-300 py-3">
                                                總分計算
                                            </td>
                                            <td colSpan="2" className="text-left font-bold text-gray-700 border-r border-gray-300 py-3 pl-4 flex flex-col justify-center h-full">
                                                <div className="flex items-center gap-2">等級評估：</div>
                                            </td>
                                            <td colSpan="4" className="text-left p-3 border-none flex items-center justify-around h-full font-bold">
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='優秀'} readOnly/><span className={level==='優秀'?'text-blue-700':''}>優秀(90分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='良好'} readOnly/><span className={level==='良好'?'text-green-700':''}>良好(80-89分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='合格'} readOnly/><span className={level==='合格'?'text-amber-600':''}>合格(60-79分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='待改善'} readOnly/><span className={level==='待改善'?'text-red-600':''}>待改善(未達60分)</span></label>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                {/* 簽名區塊 */}
                                <div className="mt-4 flex justify-between items-end pb-4 font-bold text-gray-800 text-sm">
                                    <div className="flex-1 flex items-end">
                                        <span className="w-20 tracking-widest shrink-0">店長簽名:</span>
                                        <div className="w-48 border-b border-gray-400 mx-2 pb-1 relative h-12">
                                            {renderSignBox('', 'form4.'+periodKey+'.sign.mgr', emp, "border-none bg-transparent !min-h-0")}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex items-end justify-center">
                                        <span className="w-20 tracking-widest shrink-0">總監簽名:</span>
                                        <div className="w-48 border-b border-gray-400 mx-2 pb-1 relative h-12">
                                            {renderSignBox('', 'form4.'+periodKey+'.sign.dir', emp, "border-none bg-transparent !min-h-0")}
                                        </div>
                                    </div>
                                    <div className="flex items-end">
                                        <span className="shrink-0 tracking-widest">評核日期:</span>
                                        <input type="date" className="border-b border-gray-400 ml-2 outline-none text-center bg-transparent font-bold w-32" value={periodData.sign?.date||''} onChange={e=>chg('sign.date', e.target.value)}/>
                                    </div>
                                </div>
                                <div className="text-center text-[10px] text-gray-500 font-bold mb-4">
                                    ★ 說明：請<span className="text-red-600">店長每週或每月自評後由總監覆評</span>，針對未達成項目擬定改善計畫並持續追蹤，確保各項管理目標落實執行。
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full bg-gray-50 overflow-hidden relative">
                        <div className="bg-white border-b px-4 py-2 flex justify-between items-center shrink-0 shadow-sm hide-in-fullscreen relative z-20">
                            <div className="flex items-center gap-4">
                                <h2 className="text-blue-800 font-bold flex items-center whitespace-nowrap"><i className="fa-solid fa-user-shield mr-2"></i>人事管理系統</h2>
                                <div className="flex items-center gap-2">
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold bg-blue-50 text-blue-800" value={selectedStore} onChange={(e) => { setSelectedStore(e.target.value); setSelectedEmpId(''); }}>
                                        <option value="">-- 選擇店別 --</option>
                                        {availableStores.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} disabled={!selectedStore}>
                                        <option value="">-- 選擇員工 --</option>
                                        {empsInStore.map(emp => <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {currentEmp ? (
                            <div className="flex-1 flex flex-col overflow-hidden fullscreen-container">
                                <div className="flex bg-gray-100 border-b shrink-0 text-xs font-bold hide-in-fullscreen">
                                    <button onClick={() => setHrFormTab('form4')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form4' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>12生肖戰報</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 relative z-10 hide-scroll bg-gray-50 fullscreen-container">
                                    <div className="flex justify-end mb-2 hide-in-fullscreen max-w-[1000px] mx-auto">
                                        <button onClick={() => setFullScreenMode(true)} className="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow hover:bg-gray-700 transition font-bold"><i className="fa-regular fa-file-pdf mr-1"></i> 列印預覽 / 截圖模式</button>
                                    </div>
                                    <div className="w-full max-w-[1000px] mx-auto pb-20">
                                        {hrFormTab === 'form4' && renderHrForm4(currentEmp)}
                                        {fullScreenMode && (
                                            <div className="text-center mt-6 no-print">
                                                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold hover:bg-blue-700 text-lg"><i className="fa-solid fa-print mr-2"></i>直接列印 / 存為 PDF</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-400 flex-col gap-4 hide-in-fullscreen">
                                <i className="fa-solid fa-users text-6xl opacity-20"></i><p className="font-bold">請先選擇「店別」再選擇「員工」，開始進行管理。</p>
                            </div>
                        )}
                        
                        {/* 簽名版 Modal */}
                        {sigModal.isOpen && (
                            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[400px]">
                                    <div className="bg-blue-800 text-white p-4 font-bold flex justify-between items-center">
                                        <span><i className="fa-solid fa-pen-nib mr-2"></i>電子簽名板</span>
                                        <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="text-white/80 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <div className="flex-1 bg-white relative m-4 border-2 border-dashed border-blue-300 rounded-lg overflow-hidden cursor-crosshair">
                                        <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} style={{ touchAction: 'none' }} className="w-full h-full bg-white"/>
                                    </div>
                                    <div className="p-4 border-t bg-gray-50 flex justify-between gap-3">
                                        <button onClick={clearCanvas} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition border border-gray-300">清除重簽</button>
                                        <div className="flex gap-2">
                                            <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                            <button onClick={saveSignature} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認存檔</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`flex flex-col max-w-[1400px] mx-auto bg-gray-100 relative ${fullScreenMode ? 'pdf-mode' : 'h-full'}`}>
                    {showPwdModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
                                <div className="bg-blue-800 text-white p-4 font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-lock"></i> 系統安全驗證</div>
                                <div className="p-6">
                                    <p className="text-gray-600 text-sm mb-4 font-bold">請輸入授權密碼以解鎖畫面。</p>
                                    <input type="password" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handlePwdSubmit()} className="w-full border-2 border-gray-300 rounded-lg p-3 text-center text-2xl tracking-[0.5em] focus:border-blue-500 outline-none font-sans" placeholder="輸入密碼" autoFocus/>
                                </div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t">
                                    <button onClick={() => {setShowPwdModal(false); setPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                    <button onClick={handlePwdSubmit} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">驗證解鎖</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {fullScreenMode && (
                        <button onClick={() => setFullScreenMode(false)} className="fixed bottom-6 right-6 bg-red-600 text-white px-5 py-3 rounded-full shadow-2xl font-bold z-[100] hover:bg-red-700 border-2 border-white flex items-center no-print">
                            <i className="fa-solid fa-compress mr-2"></i>結束預覽模式
                        </button>
                    )}
                    <header className="px-4 py-2 border-b bg-white flex justify-between items-center shrink-0 shadow-sm relative z-10 hide-in-fullscreen">
                        <h1 className="text-xl font-black text-gray-800 tracking-tight"><span className="text-blue-600 mr-1">{loggedInGroup}</span>12生肖戰報</h1>
                    </header>
                    <nav className="flex overflow-x-auto border-b bg-white shrink-0 hide-scroll text-sm relative z-10 hide-in-fullscreen">
                        <button onClick={() => setShowPwdModal(true)} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-blue-200 tab-active !border-b-blue-600 !text-blue-800`}><i className="fa-solid fa-user-shield mr-1"></i>人事績效管理</button>
                    </nav>
                    <main className={`flex-1 ${fullScreenMode ? 'print-mode' : 'overflow-hidden'}`}>
                        {renderHrTab()}
                    </main>
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Caught exception:", error, errorInfo); this.setState({ errorInfo }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', background: '#fee2e2', color: '#991b1b', height: '100vh', overflow: 'auto' }}>
                            <h2>系統發生未預期錯誤</h2><p>請截圖交給工程師：</p>
                            <pre>{this.state.error && this.state.error.toString()}{'\n'}{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                            <button onClick={() => window.location.reload()}>重新載入</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
