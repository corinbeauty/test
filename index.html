<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能排班數位化與檢核系統 V1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei'; background-color: #f3f4f6; }
        .grid-cell { cursor: pointer; user-select: none; transition: all 0.2s; }
        .grid-cell:hover { background-color: #e5e7eb; }
        .status-休 { color: #16a34a; font-weight: bold; }
        .status-例 { color: #dc2626; font-weight: bold; }
        .status-特 { color: #2563eb; font-weight: bold; }
        .error-cell { animation: pulse-red 2s infinite; border: 2px solid #ef4444 !important; background-color: #fef2f2 !important; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 產生日期序列 (06/29 - 08/02)
        const generateDates = () => {
            const dates = [];
            const startDate = new Date(2026, 5, 29); // 6月是 5
            const endDate = new Date(2026, 7, 2);   // 8月是 7
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            
            let currentDate = new Date(startDate);
            let weekCount = 1;
            
            while (currentDate <= endDate) {
                const month = String(currentDate.getMonth() + 1).padStart(2, '0');
                const day = String(currentDate.getDate()).padStart(2, '0');
                const dayOfWeek = currentDate.getDay();
                
                dates.push({
                    dateString: `${month}/${day}`,
                    dayName: dayNames[dayOfWeek],
                    weekNumber: weekCount,
                    isWeekend: dayOfWeek === 0 || dayOfWeek === 6
                });

                if (dayOfWeek === 0) weekCount++; // 星期日結束換週
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return dates;
        };

        const DATES = generateDates();

        const REALISTIC_MOCK_DATA = [
            { id: '190008', dept: '中清', name: '李宗蓁', schedule: { '06/29': '休', '07/04': '特', '07/05': '休', '07/09': '例', '07/13': '例', '07/14': '休', '07/24': '例', '07/26': '休', '07/29': '休', '08/01': '例' }, hasExhaustedRestDays: true },
            { id: '210039', dept: '中清', name: '陳秀如', schedule: { '06/29': '休', '07/03': '例', '07/05': '休', '07/06': '休', '07/09': '例', '07/10': '休', '07/16': '例', '07/17': '休', '07/22': '休', '07/26': '例', '07/31': '休', '08/02': '休' }, hasExhaustedRestDays: false },
            { id: '220492', dept: '中清', name: '陳素珍', schedule: { '06/29': '休', '06/30': '特', '07/01': '休', '07/02': '特', '07/05': '例', '07/06': '休', '07/12': '例', '07/20': '休', '07/21': '特', '07/29': '休', '08/02': '休' }, hasExhaustedRestDays: false },
            { id: '230027', dept: '中清', name: '劉慧波', schedule: { '07/01': '例', '07/06': '休', '07/10': '特', '07/11': '例', '07/17': '休', '07/18': '例', '07/23': '例', '07/25': '休', '08/01': '休', '08/02': '例' }, hasExhaustedRestDays: false },
            { id: '230386', dept: '中清', name: '賴信吉', schedule: { '06/30': '休', '07/03': '例', '07/08': '例', '07/09': '休', '07/14': '休', '07/15': '例', '07/21': '例', '07/24': '休', '07/29': '例', '08/02': '休' }, hasExhaustedRestDays: false },
            { id: '999991', dept: '中清', name: '違規測試(連7)', schedule: { '07/05': '休', '07/13': '例' }, hasExhaustedRestDays: false },
            { id: '999992', dept: '中清', name: '違規測試(缺例)', schedule: { '06/29': '休', '07/01': '休', '07/05': '休' }, hasExhaustedRestDays: false }
        ];

        const App = () => {
            const [data, setData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isUploaded, setIsUploaded] = useState(false);
            const [fileName, setFileName] = useState('');
            const [validationResults, setValidationResults] = useState({ errors: [], cellErrors: {} });

            const toggleSchedule = (empId, dateString) => {
                const nextStatus = {
                    '': '休',
                    '休': '例',
                    '例': '特',
                    '特': ''
                };

                setData(prevData => prevData.map(emp => {
                    if (emp.id === empId) {
                        const currentStatus = emp.schedule[dateString] || '';
                        return {
                            ...emp,
                            schedule: {
                                ...emp.schedule,
                                [dateString]: nextStatus[currentStatus]
                            }
                        };
                    }
                    return emp;
                }));
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setFileName(file.name);
                setIsProcessing(true);
                
                // 模擬讀取圖片與 OCR 處理時間，然後載入我們準備好的真實範例資料
                setTimeout(() => {
                    setData(REALISTIC_MOCK_DATA);
                    setIsUploaded(true);
                    setIsProcessing(false);
                }, 2000);
            };

            const triggerFileInput = () => {
                const fileInput = document.getElementById('file-upload');
                if (fileInput) fileInput.click();
            };

            useEffect(() => {
                if (!data || data.length === 0) return;

                const errors = [];
                const cellErrors = {};

                data.forEach(emp => {
                    let consecutiveWorkDays = 0;
                    const weeklyRecord = {};
                    const biWeeklyRecord = {};

                    DATES.forEach((dateInfo) => {
                        const status = emp.schedule[dateInfo.dateString] || '';
                        
                        // 初始化每週記錄
                        if (!weeklyRecord[dateInfo.weekNumber]) {
                            weeklyRecord[dateInfo.weekNumber] = { rest: 0, reg: 0, dates: [] };
                        }
                        weeklyRecord[dateInfo.weekNumber].dates.push(dateInfo.dateString);

                        // 初始化雙週記錄
                        const biWeekNumber = Math.ceil(dateInfo.weekNumber / 2);
                        if (!biWeeklyRecord[biWeekNumber]) {
                            biWeeklyRecord[biWeekNumber] = { rest: 0, reg: 0, dates: [], isExceptionAllowed: emp.hasExhaustedRestDays };
                        }

                        if (status === '休') {
                            weeklyRecord[dateInfo.weekNumber].rest++;
                            biWeeklyRecord[biWeekNumber].rest++;
                        }
                        if (status === '例') {
                            weeklyRecord[dateInfo.weekNumber].reg++;
                            biWeeklyRecord[biWeekNumber].reg++;
                        }

                        // 規則: 連續工作不得超過 6 天
                        if (status === '') {
                            consecutiveWorkDays++;
                            if (consecutiveWorkDays > 6) {
                                const errorMsg = `${emp.name} 於 ${dateInfo.dateString} 連續工作達 ${consecutiveWorkDays} 天！`;
                                errors.push({ type: 'danger', msg: errorMsg });
                                cellErrors[`${emp.id}-${dateInfo.dateString}`] = true;
                            }
                        } else {
                            consecutiveWorkDays = 0;
                        }
                    });

                    // 規則: 每週須有1天例假
                    Object.keys(weeklyRecord).forEach(week => {
                        const record = weeklyRecord[week];
                        if (record.reg === 0) {
                            if (emp.hasExhaustedRestDays && record.rest === 0) {
                                // 符合例外
                            } else {
                                const errorMsg = `${emp.name} 在第 ${week} 週缺少「例」假！`;
                                errors.push({ type: 'danger', msg: errorMsg });
                                record.dates.forEach(d => cellErrors[`${emp.id}-${d}`] = true);
                            }
                        }
                    });

                    // 規則: 兩週內須有2天例假 + 2天休息日
                    Object.keys(biWeeklyRecord).forEach(biWeek => {
                         const record = biWeeklyRecord[biWeek];
                         if (record.dates.length >= 10) { 
                             if (record.reg < 2) {
                                 errors.push({ type: 'danger', msg: `${emp.name} 在第 ${biWeek} 雙週週期內，例假不足2天！` });
                             }
                             if (record.rest < 2 && !record.isExceptionAllowed) {
                                 errors.push({ type: 'danger', msg: `${emp.name} 在第 ${biWeek} 雙週週期內，休息日不足2天！` });
                             }
                         }
                    });
                });

                setValidationResults({ errors, cellErrors });
            }, [data]);

            return (
                <div className="min-h-screen flex flex-col h-screen">
                    <header className="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                            <i data-lucide="calendar-check" className="w-6 h-6 text-blue-400"></i>
                            <h1 className="text-xl font-bold tracking-wider">智能排班數位化與檢核系統 <span className="text-sm font-normal text-slate-400">V1</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {!isUploaded && (
                                <div>
                                    <input 
                                        type="file" 
                                        id="file-upload" 
                                        accept="image/*" 
                                        className="hidden" 
                                        onChange={handleFileUpload}
                                    />
                                    <button 
                                        onClick={triggerFileInput}
                                        disabled={isProcessing}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md shadow flex items-center gap-2 transition disabled:opacity-50"
                                    >
                                        {isProcessing ? (
                                            <><i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i> 解析影像中...</>
                                        ) : (
                                            <><i data-lucide="upload" className="w-4 h-4"></i> 選擇排班表圖片並轉換</>
                                        )}
                                    </button>
                                </div>
                            )}
                            {isUploaded && (
                                <span className="text-sm text-green-400 flex items-center gap-2">
                                    <i data-lucide="check-circle" className="w-4 h-4"></i> 
                                    轉換完成 {fileName && `(${fileName})`}
                                </span>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden flex flex-col p-4 gap-4">
                        {}
                        <div className="bg-white rounded-lg p-3 shadow-sm flex items-center justify-between shrink-0 border-l-4 border-blue-500">
                            <div className="flex gap-4 text-sm">
                                <span className="font-semibold text-gray-700">操作提示：</span>
                                <span>1. 點擊表格內儲存格可快速切換狀態 ( <span className="font-bold">空白</span> ➔ <span className="text-green-600 font-bold">休</span> ➔ <span className="text-red-600 font-bold">例</span> ➔ <span className="text-blue-600 font-bold">特</span> )</span>
                                <span>2. 紅色閃爍外框代表違反排班規則。</span>
                            </div>
                            <div className="text-xs text-gray-500">
                                法規依據：二週變形工時、連續工作禁超6日
                            </div>
                        </div>

                        {}
                        <div className="flex-1 bg-white rounded-lg shadow border border-gray-200 overflow-hidden flex flex-col">
                            {!isUploaded ? (
                                <div className="flex-1 flex flex-col items-center justify-center text-gray-400">
                                    <i data-lucide="image" className="w-16 h-16 mb-4 opacity-50"></i>
                                    <p className="text-lg">請點擊上方按鈕選擇排班表圖片上傳</p>
                                    <p className="text-sm mt-2">支援上傳圖片格式，系統將進行 OCR 辨識轉換。</p>
                                </div>
                            ) : (
                                <div className="overflow-auto flex-1 relative">
                                    <table className="w-full text-sm text-center border-collapse">
                                        <thead className="bg-slate-100 text-slate-700 sticky top-0 z-20 shadow-sm">
                                            <tr>
                                                <th className="border p-2 min-w-[60px] sticky left-0 bg-slate-100 z-30">部門</th>
                                                <th className="border p-2 min-w-[80px] sticky left-[60px] bg-slate-100 z-30">員編</th>
                                                <th className="border p-2 min-w-[100px] sticky left-[140px] bg-slate-100 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">姓名</th>
                                                {DATES.map((d, i) => (
                                                    <th key={`th-${i}`} className={`border p-1 min-w-[40px] ${d.isWeekend ? 'bg-orange-50' : ''}`}>
                                                        <div className="text-xs text-gray-500">{d.dateString}</div>
                                                        <div className={d.dayName === '日' ? 'text-red-500' : d.dayName === '六' ? 'text-green-600' : ''}>{d.dayName}</div>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {data.map((emp) => (
                                                <tr key={`emp-${emp.id}`} className="hover:bg-slate-50 transition">
                                                    <td className="border p-2 sticky left-0 bg-white z-10">{emp.dept}</td>
                                                    <td className="border p-2 sticky left-[60px] bg-white z-10">{emp.id}</td>
                                                    <td className="border p-2 sticky left-[140px] bg-white z-10 font-medium shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">{emp.name}</td>
                                                    
                                                    {DATES.map((d) => {
                                                        const status = emp.schedule[d.dateString] || '';
                                                        const isError = validationResults.cellErrors[`${emp.id}-${d.dateString}`];
                                                        
                                                        return (
                                                            <td 
                                                                key={`cell-${emp.id}-${d.dateString}`}
                                                                onClick={() => toggleSchedule(emp.id, d.dateString)}
                                                                className={`border p-2 grid-cell font-bold h-10 w-10 
                                                                    ${status === '休' ? 'status-休 bg-green-50' : ''}
                                                                    ${status === '例' ? 'status-例 bg-red-50' : ''}
                                                                    ${status === '特' ? 'status-特 bg-blue-50' : ''}
                                                                    ${d.isWeekend && status === '' ? 'bg-orange-50/30' : ''}
                                                                    ${isError ? 'error-cell' : ''}
                                                                `}
                                                            >
                                                                {status}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {}
                        <div className="h-48 bg-white rounded-lg shadow border border-gray-200 p-4 shrink-0 overflow-auto flex flex-col">
                            <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2 sticky top-0 bg-white pb-2 border-b">
                                <i data-lucide="alert-triangle" className="w-5 h-5 text-amber-500"></i>
                                系統自動檢核報告
                                <span className="text-sm font-normal text-gray-500 ml-2">
                                    {isUploaded ? `(共發現 ${validationResults.errors.length} 項違規)` : '(等待資料載入)'}
                                </span>
                            </h2>
                            <div className="flex-1">
                                {!isUploaded ? (
                                    <p className="text-gray-400 text-sm">尚無檢核資料。</p>
                                ) : validationResults.errors.length === 0 ? (
                                    <div className="flex items-center gap-2 text-green-600 bg-green-50 p-3 rounded-md">
                                        <i data-lucide="check-square" className="w-5 h-5"></i>
                                        排班完全符合法規！(符合七休一、未連續工作逾六日)
                                    </div>
                                ) : (
                                    <ul className="space-y-2">
                                        {validationResults.errors.map((err, idx) => (
                                            <li key={`err-${idx}`} className="flex items-start gap-2 text-sm text-red-700 bg-red-50 p-2 rounded border border-red-100">
                                                <i data-lucide="x-circle" className="w-4 h-4 mt-0.5 shrink-0"></i>
                                                <span>{err.msg}</span>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 100);
    </script>
</body>
</html>
