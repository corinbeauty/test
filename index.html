    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // MODULE 1: GLOBAL CONSTANTS & CONFIGURATION
        // ==========================================
        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯+週邊商品', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 10, color: 'rgb(251, 146, 60)' },
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 10, color: '#8B4513' },

        const DEFAULT_TIME_SLOTS = [

        const PILOT_ITEMS = [

            { phase: '配對階段\n(報到當週)', no: 2, item: '新人資料建檔', desc: '新人基本資料建立完整並上系統', std: '報到當日完成建檔' },
            { phase: '配對階段\n(報到當週)', no: 3, item: '領航員訓練', desc: '領航員已接受職責說明與輔導技巧訓練', std: '報到後3天內完成' },
            { phase: '配對階段\n(報到當週)', no: 4, item: '30天培育計畫', desc: '已與新人共同訂定30天學習計畫', std: '報到後7天內完成' },
            { phase: '30天階段\n(第1個月)', no: 5, item: '每週訪談紀錄', desc: '每週至少1次關懷訪談並填寫紀錄表', std: '每週完成' },
            { phase: '30天階段\n(第1個月)', no: 6, item: '技術訓練進度', desc: '技術項目依計畫完成練習與考核', std: '完成率達80%以上' },
            { phase: '30天階段\n(第1個月)', no: 7, item: '服務流程熟悉', desc: '熟悉門店服務流程與話術標準', std: '完成率達80%以上' },
            { phase: '30天階段\n(第1個月)', no: 8, item: '30天評估', desc: '完成30天學習評估並回饋改善建議', std: '第30天前完成評估' },
            { phase: '60天階段\n(第2個月)', no: 9, item: '持續關懷訪談', desc: '每週至少1次關懷訪談追蹤適應與狀況', std: '每週完成' },
            { phase: '60天階段\n(第2個月)', no: 10, item: '技術考核通過', desc: '通過第二階段技術考核', std: '考核分數80分以上' },
            { phase: '60天階段\n(第2個月)', no: 11, item: '60天評估', desc: '完成60天評估與下一階段目標設定', std: '第60天前完成評估' },
            { phase: '90天階段\n(第3個月)', no: 12, item: '進階技能培訓', desc: '進階手法與應對能力練習與考核', std: '完成率達80%以上' },
            { phase: '90天階段\n(第3個月)', no: 13, item: '服務品質達標', desc: '顧客滿意度與服務表現達標', std: '顧客回饋平均4.5分以上' },
            { phase: '90天階段\n(第3個月)', no: 14, item: '90天評估', desc: '完成90天評估與後續發展規劃', std: '第90天前完成評估' },
            { phase: '留任與發展', no: 15, item: '留任追蹤', desc: '追蹤新人留任狀況並關懷需求', std: '每月追蹤' },
            { phase: '留任與發展', no: 16, item: '領航員評核', desc: '評核領航員輔導成效與投入度', std: '每季評核1次' },
            { phase: '留任與發展', no: 17, item: '學習成長紀錄', desc: '新人學習歷程與成長紀錄完整保存', std: '持續更新' },
        ];

        // ADDED COLORS AND FIXED ICON
        const ZODIAC_ITEMS = [
            { no: 1, name: '業績管理', desc: '• 每日業績目標設定與追蹤\n• 業績達成檢討與改善行動\n• 業績報表準確與回報', std: '每日追蹤、檢討並提出改善方案\n月目標達成率100%以上', max: 10, icon: 'fa-chart-line', color: 'text-blue-500' },
            { no: 2, name: '商品銷售', desc: '• 主推商品積極銷售\n• 滴雞精/湯品銷售推廣\n• 商品庫存與銷售分析', std: '主推商品銷售達成率100%以上\n每100位客人銷售數達標', max: 15, icon: 'fa-shopping-bag', color: 'text-orange-500' },
            { no: 3, name: '筋膜推薦', desc: '• 筋膜主動介紹\n• 成交率提升與追蹤\n• 師傅話術落實與考核', std: '介紹率達80%以上\n成交率持續加強提升', max: 10, icon: 'fa-child', color: 'text-pink-500' },
            { no: 4, name: '套餐銷售', desc: '• 套餐話術推廣\n• 套餐銷售數量提升\n• 顧客回購與滿意度', std: '套餐銷售達成率100%以上\n每100位客人套餐銷售數達標', max: 10, icon: 'fa-box', color: 'text-green-500' },
            { no: 5, name: '人力管理', desc: '• 新人關懷與輔導\n• 員工出勤與排班管理\n• 離職預防與留才措施', std: '離職率低於5%\n高風險員工主動關懷與追蹤', max: 10, icon: 'fa-users-gear', color: 'text-purple-500' }, // FIXED ICON
            { no: 6, name: '粉專/社群經營', desc: '• 每週發文3篇以上\n• 互動與回覆粉絲增加\n• 短影音/活動分享', std: '每週發文3篇以上\n粉專至少30個按讚或互動', max: 5, icon: 'fa-thumbs-up', color: 'text-sky-500' },
            { no: 7, name: '訪談與輔導', desc: '• 同仁定期例行訪談\n• 新人/績效考核紀錄\n• 訪談表完整填寫', std: '每週至少完成1次訪談\n訪談紀錄完整且有效追蹤', max: 5, icon: 'fa-comments', color: 'text-teal-500' },
            { no: 8, name: 'Google評論管理', desc: '• 五星評論增加\n• 負評即時回覆與處理\n• 評論內容改善追蹤', std: '負評24小時內回覆率100%\n五星評論片數達指標', max: 10, icon: 'google', color: '' }, // Custom SVG
            { no: 9, name: 'APP會員經營', desc: '• 新會員招募\n• 會員回訪與互動\n• 會員成長數據追蹤', std: '本月新增會員數達標\n會員成長率持續提升', max: 5, icon: 'fa-mobile-screen', color: 'text-indigo-500' },
            { no: 10, name: '客訴管理', desc: '• 客訴即時處理\n• 處理流程符合SOP\n• 改善措施與追蹤', std: '客訴處理24小時內完成\n改善措施落實且追蹤', max: 10, icon: 'fa-headset', color: 'text-red-500' },
            { no: 11, name: '銷貨管理', desc: '• 銷貨成本管控\n• 銷貨與使用差異管控\n• 現金/刷卡帳款一致', std: '票券、商品與銷售一致無誤差', max: 5, icon: 'fa-file-invoice-dollar', color: 'text-yellow-600' },
            { no: 12, name: '庫存管理', desc: '• 定期盤點執行\n• 庫存數量管控\n• 效期商品管理', std: '每月盤點無誤差\n效期與庫存管理完整', max: 5, icon: 'fa-cubes', color: 'text-gray-600' }
        ];

        const getTodayStr = () => {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        };

        const calculateTarget = (baseData, itemId, settings) => {
            if (!baseData) return 0;
            const config = ITEM_CONFIG.find(i => i.id === itemId);
            const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
            const rate = settings[itemId] && settings[itemId].rate ? Number(settings[itemId].rate) : 0;
            return Math.ceil(baseValue * (rate / 100));
        };

        const calcMetrics = (target, actualValue) => {
            const actual = Number(actualValue) || 0;
            const gap = actual - target;
            const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
            const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
            return { gap, achieveRate, gapRate };
        };

        // ==========================================
        // MODULE 2: SUB-COMPONENTS (TABS & FORMS)
        // ==========================================

        const ShiftComponent = ({ shiftKey, shiftName, icon, colorClass, bgColorClass, database, safeInputDate, setInputDate, handleShiftChange, settings }) => {
            const getCurrentShiftData = () => {
                if (database[safeInputDate] && database[safeInputDate][shiftKey]) return database[safeInputDate][shiftKey];
                const emptyData = { customers: '', revenue: '' };
                ITEM_CONFIG.forEach(item => emptyData[item.id] = '');
                return emptyData;
            };
            const data = getCurrentShiftData();
            const customersNum = Number(data.customers) || 0;
            const revenueNum = Number(data.revenue) || 0;
            const atv = customersNum > 0 ? Math.round(revenueNum / customersNum) : 0;

            return (
                <div className="flex flex-col md:flex-row h-full gap-2 overflow-hidden text-sm">
                    <div className="w-full md:w-1/2 flex flex-col gap-1.5">
                        <div className="bg-white p-1.5 rounded shadow-sm border border-gray-200 flex justify-between items-center shrink-0">
                            <h2 className={`text-base font-bold ${colorClass}`}><i className={`fa-solid ${icon} mr-1`}></i>{shiftName} 數據輸入</h2>
                            <div className="flex items-center">
                                <label className="text-gray-600 mr-1 font-semibold text-xs">日期:</label>
                                <input type="date" value={safeInputDate} onChange={(e) => setInputDate(e.target.value)} className="p-0.5 border rounded shadow-sm outline-none text-xs" />
                            </div>
                        </div>
                        <div className="bg-white p-2 rounded shadow-sm border border-gray-200 flex-1 overflow-y-auto hide-scroll">
                            <div className="grid grid-cols-2 gap-2 mb-2 bg-gray-50 p-1.5 rounded">
                                <div><label className="block text-xs text-gray-600 mb-0.5">來客數</label><input type="number" className="w-full p-1 border rounded outline-none font-bold text-gray-800" value={data.customers !== undefined ? data.customers : ''} onChange={(e) => handleShiftChange(shiftKey, 'customers', e.target.value)} placeholder="0" /></div>
                                <div><label className="block text-xs text-gray-600 mb-0.5">總業績 (金額)</label><input type="number" className="w-full p-1 border rounded outline-none font-bold text-blue-700" value={data.revenue !== undefined ? data.revenue : ''} onChange={(e) => handleShiftChange(shiftKey, 'revenue', e.target.value)} placeholder="0" /></div>
                            </div>
                            <div className="space-y-1.5">
                                {ITEM_CONFIG.map(item => (
                                    <div key={`input-${item.id}`} className="flex items-center justify-between border-b pb-0.5">
                                        <span className="font-semibold text-gray-700 w-20 text-xs">{item.name}</span>
                                        <div className="flex items-center w-2/3">
                                            <span className="text-[10px] text-gray-400 w-12 text-right mr-1">實際:</span>
                                            <input type="number" className="w-full p-1 border border-blue-200 bg-blue-50/30 rounded outline-none text-blue-900 font-bold" value={data[item.id] !== undefined ? data[item.id] : ''} onChange={(e) => handleShiftChange(shiftKey, item.id, e.target.value)} placeholder="0" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="w-full md:w-1/2 screenshot-area bg-white p-2 rounded shadow-md border border-gray-300 flex flex-col overflow-y-auto hide-scroll">
                        <div className="text-center mb-1.5 shrink-0">
                            <h2 className="text-lg font-black text-gray-800 tracking-wider"><span className={`px-2 py-0.5 rounded text-white ${bgColorClass} mr-2 text-sm`}>{shiftName}</span>當班績效戰報</h2>
                            <div className="text-gray-500 mt-0.5 font-mono text-[10px]">{safeInputDate}</div>
                        </div>
                        <div className="grid grid-cols-2 gap-2 mb-2 shrink-0">
                            <div className="bg-gray-100 p-1.5 rounded text-center border"><div className="text-gray-500 text-[10px]">來客數</div><div className="text-base font-bold text-gray-800">{customersNum}</div></div>
                            <div className="bg-blue-50 p-1.5 rounded text-center border border-blue-100"><div className="text-blue-600 text-[10px]">客單價</div><div className="text-base font-bold text-blue-800">${atv.toLocaleString()}</div></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5 flex-1 content-start">
                            {ITEM_CONFIG.map(item => {
                                const target = calculateTarget(data, item.id, settings);
                                const actual = Number(data[item.id]) || 0;
                                const { gap, achieveRate, gapRate } = calcMetrics(target, actual);
                                const isGood = gap >= 0;
                                return (
                                    <div key={`view-${item.id}`} className="bg-white border rounded p-1.5 shadow-sm relative overflow-hidden flex flex-col justify-center">
                                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${isGood ? 'bg-green-500' : 'bg-red-400'}`}></div>
                                        <div className="flex justify-between items-center mb-1 pl-2">
                                            <span className="font-bold text-gray-700 text-[10px]">{item.name} <span className="text-gray-400 font-normal">({item.unit})</span></span>
                                            <div className="text-right text-[9px] leading-tight">
                                                <div className={`font-bold ${isGood ? 'text-green-600' : 'text-red-500'}`}>達成: {achieveRate}%</div>
                                                <div className={`font-bold ${isGood ? 'text-green-600' : 'text-red-500'}`}>差異: {gapRate}%</div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-0.5 text-center text-[10px] pl-1.5">
                                            <div className="bg-gray-50 rounded p-0.5"><div className="text-gray-400 scale-90">目標</div><div className="font-semibold text-gray-700">{target}</div></div>
                                            <div className="bg-blue-50 rounded p-0.5"><div className="text-blue-500 scale-90">實際</div><div className="font-bold text-blue-700">{actual}</div></div>
                                            <div className={`${isGood ? 'bg-green-50' : 'bg-red-50'} rounded p-0.5`}><div className={`${isGood ? 'text-green-600' : 'text-red-500'} scale-90`}>差異</div><div className={`font-bold ${isGood ? 'text-green-700' : 'text-red-600'}`}>{gap > 0 ? `+${gap}` : gap}</div></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const SummaryComponent = ({ database, safeInputDate, settings }) => {
            const todayStr = getTodayStr();
            const [summaryRange, setSummaryRange] = useState('currentMonth');
            const [summaryRangeStart, setSummaryRangeStart] = useState(todayStr.substring(0, 8) + '01');
            const [summaryRangeEnd, setSummaryRangeEnd] = useState(todayStr);
            const [selectedDate, setSelectedDate] = useState(safeInputDate);
            const [summaryWeek, setSummaryWeek] = useState(() => {
                const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
            });

            const summaryData = { customers: 0, revenue: 0, atv: 0, totalManpower: 0 };
            ITEM_CONFIG.forEach(i => summaryData[i.id] = 0);
            let displayTitle = "三班數據累加結算";
            let calcKeys = [];
            const fmtDateSafe = (d) => { if (!d || isNaN(d.getTime())) return ''; return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

            if (summaryRange === 'single') { displayTitle = `${selectedDate} 單日查詢`; calcKeys = [selectedDate]; }
            else if (summaryRange === 'customRange') { displayTitle = `${summaryRangeStart} 至 ${summaryRangeEnd} 累加`; calcKeys = Object.keys(database).filter(k => k >= summaryRangeStart && k <= summaryRangeEnd); }
            else if (summaryRange === 'currentMonth' || summaryRange === 'lastMonth') {
                const today = new Date(); let targetMonth = summaryRange === 'currentMonth' ? today.getMonth() + 1 : today.getMonth(); let targetYear = today.getFullYear();
                if (targetMonth === 0) { targetMonth = 12; targetYear -= 1; }
                displayTitle = `${targetMonth}月 累計總和`;
                const prefix = `${targetYear}-${String(targetMonth).padStart(2, '0')}`;
                calcKeys = Object.keys(database).filter(k => k.startsWith(prefix));
            } else if (['currentWeek', 'lastWeek', 'customWeek'].includes(summaryRange)) {
                let mon, sun;
                if (summaryRange === 'currentWeek' || summaryRange === 'lastWeek') {
                    const d = new Date(); if (summaryRange === 'lastWeek') d.setDate(d.getDate() - 7);
                    const day = d.getDay() || 7; mon = new Date(d); mon.setDate(d.getDate() - day + 1); sun = new Date(mon); sun.setDate(mon.getDate() + 6);
                    displayTitle = summaryRange === 'currentWeek' ? `本週 (${fmtDateSafe(mon).substring(5)}~${fmtDateSafe(sun).substring(5)})` : `上週 (${fmtDateSafe(mon).substring(5)}~${fmtDateSafe(sun).substring(5)})`;
                } else {
                    if (summaryWeek) {
                        const parts = summaryWeek.split('-W');
                        if (parts.length === 2) {
                            const year = parseInt(parts[0], 10); const week = parseInt(parts[1], 10); const jan4 = new Date(year, 0, 4); const dayOffset = jan4.getDay() || 7;
                            mon = new Date(year, 0, 4 - dayOffset + 1 + (week - 1) * 7); sun = new Date(mon); sun.setDate(mon.getDate() + 6);
                            displayTitle = `指定週 (${fmtDateSafe(mon).substring(5)}~${fmtDateSafe(sun).substring(5)})`;
                        }
                    }
                }
                if (mon && sun) { const sStart = fmtDateSafe(mon); const sEnd = fmtDateSafe(sun); calcKeys = Object.keys(database).filter(k => k >= sStart && k <= sEnd); }
            }

            calcKeys.forEach(dateKey => {
                if (database[dateKey]) {
                    ['morning', 'evening', 'night'].forEach(shift => {
                        if (database[dateKey][shift]) {
                            const sData = database[dateKey][shift];
                            summaryData.customers += Number(sData.customers) || 0;
                            summaryData.revenue += Number(sData.revenue) || 0;
                            ITEM_CONFIG.forEach(i => summaryData[i.id] += Number(sData[i.id]) || 0);
                        }
                    });
                    if (database[dateKey].manager && database[dateKey].manager.slots) {
                        Object.values(database[dateKey].manager.slots).forEach(slotData => {
                            summaryData.totalManpower += Number(slotData.hc) || 0;
                        });
                    }
                }
            });
            summaryData.atv = summaryData.customers > 0 ? Math.round(summaryData.revenue / summaryData.customers) : 0;
            const avgEfficiency = summaryData.totalManpower > 0 ? Math.round(summaryData.revenue / summaryData.totalManpower) : 0;

            let maxDateStr = safeInputDate;
            if (calcKeys.length > 0) maxDateStr = calcKeys.reduce((a, b) => a > b ? a : b);
            const targetYear = parseInt(maxDateStr.substring(0, 4)) || new Date().getFullYear();
            const targetMonth = parseInt(maxDateStr.substring(5, 7)) || (new Date().getMonth() + 1);
            const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
            let pastWeekdayRev = 0, pastWeekdayCount = 0, pastWeekendRev = 0, pastWeekendCount = 0, futureWeekdayCount = 0, futureWeekendCount = 0;
            const boundaryDateStr = maxDateStr > todayStr ? todayStr : maxDateStr;

            for (let i = 1; i <= daysInMonth; i++) {
                const dStr = `${targetYear}-${String(targetMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dObj = new Date(targetYear, targetMonth - 1, i);
                const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;
                if (dStr <= boundaryDateStr) {
                    let dayRev = 0;
                    if (database[dStr]) {
                        ['morning', 'evening', 'night'].forEach(shift => {
                            if (database[dStr][shift] && database[dStr][shift].revenue) dayRev += Number(database[dStr][shift].revenue);
                        });
                    }
                    if (isWeekend) { pastWeekendRev += dayRev; pastWeekendCount++; } else { pastWeekdayRev += dayRev; pastWeekdayCount++; }
                } else {
                    if (isWeekend) futureWeekendCount++; else futureWeekdayCount++;
                }
            }
            
            let avgWeekday = pastWeekdayCount > 0 ? pastWeekdayRev / pastWeekdayCount : 0;
            let avgWeekend = pastWeekendCount > 0 ? pastWeekendRev / pastWeekendCount : 0;
            if (avgWeekend === 0 && pastWeekendCount === 0) avgWeekend = avgWeekday;
            if (avgWeekday === 0 && pastWeekdayCount === 0) avgWeekday = avgWeekend;
            const predictedMonthEndRev = pastWeekdayRev + pastWeekendRev + (futureWeekdayCount * avgWeekday) + (futureWeekendCount * avgWeekend);

            return (
                <div className="bg-white p-4 rounded shadow border border-gray-200 h-full overflow-y-auto text-sm">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 border-b pb-2 gap-2">
                        <h2 className="text-lg font-bold text-green-700"><i className="fa-solid fa-layer-group mr-2"></i>{displayTitle}</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="flex bg-gray-100 rounded overflow-hidden text-xs border border-gray-200 flex-wrap">
                                <button onClick={() => setSummaryRange('single')} className={`px-2 py-1.5 ${summaryRange === 'single' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>單日</button>
                                <button onClick={() => setSummaryRange('currentWeek')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'currentWeek' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>本週</button>
                                <button onClick={() => setSummaryRange('lastWeek')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'lastWeek' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>上週</button>
                                <button onClick={() => setSummaryRange('customWeek')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'customWeek' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>指定週</button>
                                <button onClick={() => setSummaryRange('currentMonth')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'currentMonth' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>本月</button>
                                <button onClick={() => setSummaryRange('lastMonth')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'lastMonth' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>上月</button>
                                <button onClick={() => setSummaryRange('customRange')} className={`px-2 py-1.5 border-l border-gray-200 ${summaryRange === 'customRange' ? 'bg-green-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>自訂</button>
                            </div>
                            {summaryRange === 'single' && <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="p-1 border rounded bg-green-50 outline-none text-xs text-green-800" />}
                            {summaryRange === 'customWeek' && <input type="week" value={summaryWeek} onChange={(e) => setSummaryWeek(e.target.value)} className="p-1 border rounded bg-green-50 outline-none text-xs text-green-800" />}
                            {summaryRange === 'customRange' && (
                                <div className="flex items-center bg-green-50 p-1 rounded border border-green-200 gap-1">
                                    <input type="date" value={summaryRangeStart} onChange={(e) => setSummaryRangeStart(e.target.value)} className="p-1 border-none bg-transparent outline-none text-xs text-green-800" />
                                    <span className="text-gray-500 text-[10px]">至</span>
                                    <input type="date" value={summaryRangeEnd} onChange={(e) => setSummaryRangeEnd(e.target.value)} className="p-1 border-none bg-transparent outline-none text-xs text-green-800" />
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                        <div className="bg-gray-100 p-3 rounded border text-center">
                            <div className="text-gray-600 text-xs mb-1">期間累加來客</div>
                            <div className="text-2xl font-black text-gray-800">{summaryData.customers}</div>
                        </div>
                        <div className="bg-gray-100 p-3 rounded border text-center">
                            <div className="text-gray-600 text-xs mb-1">期間累加業績</div>
                            <div className="text-2xl font-black text-gray-800">${summaryData.revenue.toLocaleString()}</div>
                        </div>
                        <div className="bg-blue-50 p-3 rounded border border-blue-200 text-center">
                            <div className="text-blue-700 text-xs mb-1">平均客單價</div>
                            <div className="text-2xl font-black text-blue-600">${summaryData.atv.toLocaleString()}</div>
                        </div>
                        <div className="bg-emerald-50 p-3 rounded border border-emerald-200 text-center">
                            <div className="text-emerald-700 text-xs mb-1">期間平均人效</div>
                            <div className="text-2xl font-black text-emerald-600">${avgEfficiency.toLocaleString()}</div>
                        </div>
                        <div className="bg-amber-50 p-3 rounded border border-amber-200 text-center relative group">
                            <div className="text-amber-700 text-xs mb-1">預估月底業績 <i className="fa-solid fa-circle-info cursor-help"></i></div>
                            <div className="text-2xl font-black text-amber-600">${Math.round(predictedMonthEndRev).toLocaleString()}</div>
                            <div className="absolute top-full left-1/2 -translate-x-1/2 mt-1 w-48 p-2 bg-gray-800 text-white text-[10px] rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none z-50 transition-opacity text-left">
                                依本月平/假日均值推算未來：<br/>平日均值: ${Math.round(avgWeekday).toLocaleString()} ({futureWeekdayCount}天)<br/>假日均值: ${Math.round(avgWeekend).toLocaleString()} ({futureWeekendCount}天)
                            </div>
                        </div>
                    </div>

                    <table className="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr className="bg-gray-800 text-white">
                                <th className="p-2 rounded-tl">評估項目</th><th className="p-2 text-right">目標</th><th className="p-2 text-right">實際總和</th><th className="p-2 text-right">差異數</th><th className="p-2 text-right">達成率</th><th className="p-2 text-right rounded-tr">差異率</th>
                            </tr>
                        </thead>
                        <tbody>
                            {ITEM_CONFIG.map((item, index) => {
                                const target = calculateTarget(summaryData, item.id, settings);
                                const actual = summaryData[item.id];
                                const { gap, achieveRate, gapRate } = calcMetrics(target, actual);
                                const isGood = gap >= 0;
                                return (
                                    <tr key={`sum-${item.id}`} className={index % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                        <td className="p-2 border-b font-semibold border-l">{item.name}</td>
                                        <td className="p-2 border-b text-right text-gray-600">{target}</td>
                                        <td className="p-2 border-b text-right font-bold text-blue-600">{actual}</td>
                                        <td className={`p-2 border-b text-right font-bold ${isGood ? 'text-green-600' : 'text-red-500'}`}>{gap > 0 ? `+${gap}` : gap}</td>
                                        <td className="p-2 border-b text-right"><span className={`px-1 rounded text-xs font-bold ${isGood ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{achieveRate}%</span></td>
                                        <td className={`p-2 border-b text-right font-bold text-xs border-r ${isGood ? 'text-green-600' : 'text-red-500'}`}>{gapRate > 0 ? `+${gapRate}%` : `${gapRate}%`}</td>
                                    </tr>
                                )
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        const AuditComponent = ({ database, safeInputDate, settings, timeSlots, setInputDate, handleShiftChange, handleSlotChange }) => {
            const auditItems = [
                { id: 'customers', name: '總來客數', isAmount: false },
                { id: 'revenue', name: '總業績', isAmount: true },
                ...ITEM_CONFIG.map(i => ({ id: i.id, name: i.name, isAmount: i.type === 'amount' }))
            ];

            const dayData = database[safeInputDate] || {};
            const managerData = dayData.manager || { slots: {} };
            const slotsData = managerData.slots || {};

            const getSystemSum = (fieldId) => {
                return ['morning', 'evening', 'night'].reduce((acc, shift) => {
                    return acc + (dayData[shift] && dayData[shift][fieldId] ? Number(dayData[shift][fieldId]) : 0);
                }, 0);
            };

            let totalHc = 0, sumSlotRevenue = 0;
            timeSlots.forEach(slot => {
                totalHc += slotsData[slot.id] && slotsData[slot.id].hc ? Number(slotsData[slot.id].hc) : 0;
                sumSlotRevenue += slotsData[slot.id] && slotsData[slot.id].rev ? Number(slotsData[slot.id].rev) : 0;
            });
            const managerRev = Number(managerData.revenue) || 0;
            const dailyEfficiency = totalHc > 0 ? Math.round(managerRev / totalHc) : 0;

            let totalEarnedScore = 0, maxPossibleScore = 0;
            const performanceScores = ITEM_CONFIG.map(item => {
                const target = calculateTarget(managerData, item.id, settings);
                const actual = Number(managerData[item.id]) || 0;
                const maxScore = settings[item.id] && settings[item.id].score ? Number(settings[item.id].score) : 0;
                let earned = target > 0 ? Math.min(maxScore, (actual / target) * maxScore) : (actual > 0 ? maxScore : 0);
                totalEarnedScore += earned; maxPossibleScore += maxScore;
                return { ...item, target, actual, earned, maxScore };
            });

            return (
                <div className="bg-white p-4 rounded shadow border border-gray-200 h-full overflow-y-auto text-sm hide-scroll">
                    <div className="flex justify-between items-center mb-3 border-b pb-2">
                        <h2 className="text-lg font-bold text-red-700"><i className="fa-solid fa-clipboard-check mr-2"></i>今日日結稽核</h2>
                        <div className="flex items-center">
                            <label className="text-gray-600 mr-1 font-semibold text-xs">稽核日期:</label>
                            <input type="date" value={safeInputDate} onChange={(e) => setInputDate(e.target.value)} className="p-0.5 border rounded shadow-sm outline-none text-xs text-red-800 font-bold" />
                        </div>
                    </div>

                    <div className="bg-blue-50/50 border border-blue-200 rounded p-3 mb-4">
                        <div className="flex justify-between items-end border-b border-blue-200 pb-2 mb-3">
                            <h3 className="font-bold text-blue-800 text-sm"><i className="fa-solid fa-users-gear mr-1"></i>各時段產值與人效獨立分析</h3>
                            <div className="text-[10px] text-gray-500 bg-white px-2 py-0.5 rounded border">時段業績加總: <span className="font-bold text-gray-700">${sumSlotRevenue.toLocaleString()}</span></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
                            {timeSlots.map(slot => {
                                const hc = slotsData[slot.id] && slotsData[slot.id].hc ? Number(slotsData[slot.id].hc) : 0;
                                const rev = slotsData[slot.id] && slotsData[slot.id].rev ? Number(slotsData[slot.id].rev) : 0;
                                const eff = hc > 0 ? Math.round(rev / hc) : rev; 
                                return (
                                    <div key={slot.id} className="bg-white p-2 rounded border border-blue-100 shadow-sm flex flex-col relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                        <div className="text-xs text-blue-800 font-bold mb-2 pl-2">{slot.label}</div>
                                        <div className="grid grid-cols-2 gap-2 mb-2 pl-2">
                                            <div>
                                                <div className="text-[10px] text-gray-400 mb-0.5">人數 (HC)</div>
                                                <input type="number" step="0.5" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-gray-700 bg-gray-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].hc !== undefined) ? slotsData[slot.id].hc : ''} onChange={(e) => handleSlotChange(slot.id, 'hc', e.target.value)} />
                                            </div>
                                            <div>
                                                <div className="text-[10px] text-gray-400 mb-0.5">時段產值 ($)</div>
                                                <input type="number" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-blue-700 bg-blue-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].rev !== undefined) ? slotsData[slot.id].rev : ''} onChange={(e) => handleSlotChange(slot.id, 'rev', e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="bg-emerald-50 rounded p-1.5 flex justify-between items-center pl-2 ml-2 border border-emerald-100">
                                            <span className="text-[10px] text-emerald-700">時段人效</span><span className="font-black text-emerald-600 text-sm">${eff.toLocaleString()}</span>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                        <div className="flex items-center justify-between bg-blue-600 text-white p-2 rounded shadow-sm">
                            <div><span className="text-xs opacity-80 block">單日總出勤人力</span><span className="text-xl font-black">{totalHc} <span className="text-sm font-normal">人</span></span></div>
                            <div className="text-right border-l border-blue-400 pl-4"><span className="text-xs opacity-80 block">單日平均人效 (以日結總業績計)</span><span className="text-xl font-black">${dailyEfficiency.toLocaleString()}</span></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4 items-start">
                        <div className="bg-purple-50/50 border border-purple-200 rounded p-3 flex flex-col h-full">
                            <h3 className="font-bold text-purple-800 mb-2 text-sm border-b border-purple-200 pb-1"><i className="fa-solid fa-ranking-star mr-1"></i>今日綜合績效指標</h3>
                            <div className="flex-1 overflow-y-auto hide-scroll text-xs">
                                {performanceScores.map(score => (
                                    <div key={`score-${score.id}`} className="flex justify-between items-center border-b border-purple-100 py-1">
                                        <span className="text-gray-700 w-1/3">{score.name}</span><span className="text-gray-400 w-1/3 text-center text-[10px]">達標: {score.actual}/{score.target}</span><span className="font-bold text-purple-700 w-1/3 text-right">{score.earned.toFixed(1)} <span className="text-gray-400 font-normal text-[10px]">/ {score.maxScore}</span></span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-2 pt-2 border-t border-purple-300 flex justify-between items-end"><span className="font-bold text-purple-900">總項得分</span><span className="text-2xl font-black text-purple-700">{totalEarnedScore.toFixed(1)} <span className="text-sm font-normal text-gray-500">/ {maxPossibleScore} 分</span></span></div>
                        </div>
                        <div className="bg-white border rounded shadow-sm p-2 flex flex-col h-full">
                            <p className="text-[10px] text-gray-500 mb-2 bg-red-50 p-1.5 rounded border border-red-100"><i className="fa-solid fa-circle-info mr-1"></i>系統自動比對三班輸入總和，紅字代表異常或漏KEY。</p>
                            <div className="overflow-x-auto hide-scroll flex-1">
                                <table className="w-full text-xs border-collapse">
                                    <thead><tr className="bg-gray-100 text-gray-700"><th className="p-1.5 border text-left">項目</th><th className="p-1.5 border text-right">系統加總</th><th className="p-1.5 border text-center bg-red-50 text-red-700">日結輸入</th><th className="p-1.5 border text-right">差異</th></tr></thead>
                                    <tbody>
                                        {auditItems.map(item => {
                                            const sysSum = getSystemSum(item.id);
                                            const managerVal = managerData[item.id];
                                            const hasInput = managerVal !== undefined && managerVal !== '';
                                            const diff = hasInput ? (Number(managerVal) || 0) - sysSum : null;
                                            let diffDisplay = '-'; let diffColor = 'text-gray-300';
                                            if (hasInput) { if (diff === 0) { diffDisplay = '相符'; diffColor = 'text-green-600 bg-green-50'; } else { diffDisplay = diff > 0 ? `+${diff}` : diff; diffColor = 'text-red-600 bg-red-50 font-bold'; } }
                                            return (
                                                <tr key={item.id} className="border-b hover:bg-gray-50">
                                                    <td className="p-1.5 font-bold text-gray-700">{item.name}</td>
                                                    <td className="p-1.5 text-right text-gray-500">{item.isAmount ? '$' : ''}{sysSum.toLocaleString()}</td>
                                                    <td className="p-1 text-center bg-red-50/30 w-[80px]"><input type="number" className="w-full p-1 border border-red-300 rounded text-right text-xs text-red-800 font-bold outline-none" value={managerVal !== undefined ? managerVal : ''} onChange={(e) => handleShiftChange('manager', item.id, e.target.value)} /></td>
                                                    <td className={`p-1.5 text-right ${diffColor}`}>{diffDisplay}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TrendComponent = ({ database, safeInputDate, setInputDate, settings }) => {
            const [trendFilter, setTrendFilter] = useState('all');
            const [visibleChart, setVisibleChart] = useState(ITEM_CONFIG[0].id);
            const chartRef = useRef(null);

            const getMonthlyTrendData = () => {
                const monthPrefix = safeInputDate.substring(0, 7); 
                const year = parseInt(monthPrefix.split('-')[0]) || new Date().getFullYear();
                const month = parseInt(monthPrefix.split('-')[1]) || (new Date().getMonth() + 1);
                const daysInMonth = new Date(year, month, 0).getDate();
                const sortedDates = Array.from({length: daysInMonth}, (_, i) => `${monthPrefix}-${(i+1).toString().padStart(2, '0')}`);
                const trendData = { dates: sortedDates, dailyTotals: {}, cumulative: {}, shiftBreakdown: {}, chartDatasets: [] };
                const currentCumulative = { customers: 0, revenue: 0 };
                const currentShiftBreakdown = { morning: { customers: 0, revenue: 0 }, evening: { customers: 0, revenue: 0 }, night: { customers: 0, revenue: 0 } };
                
                ITEM_CONFIG.forEach(i => { currentCumulative[i.id] = 0; currentShiftBreakdown.morning[i.id] = 0; currentShiftBreakdown.evening[i.id] = 0; currentShiftBreakdown.night[i.id] = 0; });

                sortedDates.forEach(date => {
                    let hasData = false;
                    const dayData = { customers: 0, revenue: 0 };
                    ITEM_CONFIG.forEach(i => dayData[i.id] = 0);
                    
                    const shiftsToProcess = trendFilter === 'all' ? ['morning', 'evening', 'night'] : [trendFilter];
                    if (database[date]) {
                        shiftsToProcess.forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                const values = [sData.customers, sData.revenue, ...ITEM_CONFIG.map(i => sData[i.id])];
                                if (values.some(v => v !== '' && v !== undefined && v !== null)) hasData = true;
                                dayData.customers += Number(sData.customers) || 0;
                                dayData.revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => dayData[i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                        ['morning', 'evening', 'night'].forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                currentShiftBreakdown[shift].customers += Number(sData.customers) || 0;
                                currentShiftBreakdown[shift].revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => currentShiftBreakdown[shift][i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                    }

                    trendData.dailyTotals[date] = hasData ? dayData : null;
                    if (hasData) {
                        currentCumulative.customers += dayData.customers;
                        currentCumulative.revenue += dayData.revenue;
                        ITEM_CONFIG.forEach(i => currentCumulative[i.id] += dayData[i.id]);
                    }
                    trendData.cumulative[date] = JSON.parse(JSON.stringify(currentCumulative));
                    trendData.shiftBreakdown[date] = JSON.parse(JSON.stringify(currentShiftBreakdown));
                });

                ITEM_CONFIG.forEach(item => {
                    if(item.id === visibleChart) {
                        const dataPoints = sortedDates.map(date => trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : null);
                        trendData.chartDatasets.push({ label: item.name, data: dataPoints, borderColor: item.color, backgroundColor: item.color, tension: 0.3, fill: false, borderWidth: 2, pointRadius: 2, spanGaps: true });
                    }
                });
                return trendData;
            };

            useEffect(() => {
                if (typeof Chart === 'undefined') return;
                const trendData = getMonthlyTrendData();
                const ctx = document.getElementById('trendChart');
                if (ctx) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels: trendData.dates.map(d => parseInt(d.substring(8)).toString()), datasets: trendData.chartDatasets },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'top', labels: { boxWidth: 8, font: { size: 9 } } } },
                            scales: { 
                                y: { beginAtZero: true, ticks: { font: { size: 9 } } }, 
                                x: { ticks: { font: { size: 9 }, color: (ctx) => {
                                    if (ctx.tick && ctx.tick.label) {
                                        const d = new Date(`${safeInputDate.substring(0, 7)}-${ctx.tick.label.toString().padStart(2, '0')}`.replace(/-/g, '/'));
                                        if (d.getDay() === 0 || d.getDay() === 6) return '#ef4444';
                                    }
                                    return '#64748b';
                                }}} 
                            }
                        }
                    });
                }
                return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
            }, [database, trendFilter, settings, visibleChart, safeInputDate]);

            const trendData = getMonthlyTrendData();
            const dates = trendData.dates;
            const todayData = dates.find(d => d === safeInputDate);
            const latestCumulative = todayData ? trendData.cumulative[safeInputDate] : null;
            const latestBreakdown = todayData ? trendData.shiftBreakdown[safeInputDate] : null;

            const renderRankings = (itemId) => {
                if (!latestBreakdown || trendFilter !== 'all') return null; 
                const getShiftMetrics = (shiftKey) => {
                    const actual = latestBreakdown[shiftKey][itemId] || 0;
                    const target = calculateTarget(latestBreakdown[shiftKey], itemId, settings);
                    return target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                };
                const rankings = [
                    { shift: '早', rate: getShiftMetrics('morning'), actual: latestBreakdown.morning[itemId] || 0, color: 'text-orange-500' },
                    { shift: '晚', rate: getShiftMetrics('evening'), actual: latestBreakdown.evening[itemId] || 0, color: 'text-blue-500' },
                    { shift: '夜', rate: getShiftMetrics('night'), actual: latestBreakdown.night[itemId] || 0, color: 'text-gray-800' }
                ];
                rankings.sort((a, b) => b.rate - a.rate);
                let currentRank = 1;
                for (let i = 0; i < rankings.length; i++) {
                    if (i > 0 && rankings[i].rate < rankings[i-1].rate) currentRank = i + 1;
                    rankings[i].rank = rankings[i].rate === 0 && rankings[i].actual === 0 ? '-' : currentRank;
                }
                return (
                    <div className="mt-1 pt-1 border-t border-purple-200 flex flex-col gap-[2px]">
                        {rankings.map((d, i) => (
                            <div key={i} className="flex justify-between items-center text-[10px] leading-none">
                                <span className={`${d.color} font-bold`}>{d.shift}</span>
                                <div className="flex items-center gap-0.5">
                                    {d.rank === 1 ? <i className="fa-solid fa-crown text-yellow-500 text-[9px]"></i> : d.rank === 2 ? <i className="fa-solid fa-medal text-gray-400 text-[9px]"></i> : d.rank === 3 ? <i className="fa-solid fa-award text-amber-700 text-[9px]"></i> : <span className="w-[9px]"></span>}
                                    <span className="font-bold text-gray-700">{d.rate}% <span className="text-[8px] font-normal text-gray-400">({d.actual})</span></span>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full gap-1.5 text-sm overflow-y-auto hide-scroll pb-2">
                    <div className="bg-white p-1.5 rounded shadow border border-purple-200 shrink-0">
                        <div className="flex justify-between items-center mb-1">
                            <h2 className="text-sm font-bold text-purple-800"><i className="fa-solid fa-calendar-check mr-1"></i>本月累計 (至 {(safeInputDate.split('-')[1]) || ''}/{(safeInputDate.split('-')[2]) || ''})</h2>
                            <div className="flex items-center gap-2">
                                <input type="month" value={safeInputDate.substring(0,7)} onChange={(e) => setInputDate(`${e.target.value}-01`)} className="p-0.5 border rounded text-xs bg-gray-50 outline-none" />
                                <div className="flex bg-gray-100 rounded overflow-hidden text-[10px]">
                                    {['all', 'morning', 'evening', 'night'].map(f => (
                                        <button key={f} onClick={() => setTrendFilter(f)} className={`px-2 py-0.5 ${trendFilter === f ? 'bg-purple-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>
                                            {f === 'all' ? '全部累計' : f === 'morning' ? '早班' : f === 'evening' ? '晚班' : '夜班'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                        {latestCumulative && (
                            <div className="grid grid-cols-3 md:grid-cols-6 gap-1">
                                {ITEM_CONFIG.map(item => {
                                    const totalTarget = calculateTarget(latestCumulative, item.id, settings);
                                    const totalActual = latestCumulative[item.id];
                                    const { gap, achieveRate, gapRate } = calcMetrics(totalTarget, totalActual);
                                    const isGood = gap >= 0;
                                    return (
                                        <div key={`cumul-${item.id}`} className="bg-purple-50 p-1 rounded border border-purple-100 text-center flex flex-col justify-between">
                                            <div className="font-bold text-gray-700 text-[10px]">{item.name}</div>
                                            <div className="text-[9px] text-gray-500">目標: {totalTarget}</div>
                                            <div className="text-sm font-black text-purple-700">{totalActual}</div>
                                            <div className={`text-[9px] font-bold ${isGood ? 'text-green-600' : 'text-red-500'} leading-tight scale-90`}>達:{achieveRate}% / 差:{gapRate > 0 ? `+${gapRate}%` : `${gapRate}%`}</div>
                                            {renderRankings(item.id)}
                                        </div>
                                    )
                                })}
                            </div>
                        )}
                    </div>
                    <div className="bg-white rounded shadow border border-gray-200 overflow-hidden flex flex-col shrink-0">
                        <h3 className="font-bold text-gray-700 p-1 bg-gray-50 border-b text-xs"><i className="fa-solid fa-table mr-1"></i>每日總計明細</h3>
                        <div className="overflow-x-auto hide-scroll p-1 w-full">
                            <table className="w-full text-center border-collapse text-[10px]">
                                <thead>
                                    <tr>
                                        <th className="p-0.5 px-1 bg-gray-800 text-white border sticky left-0 z-10 min-w-[50px]">項目 \ 日期</th>
                                        {dates.map(date => {
                                            const d = new Date(date.replace(/-/g, '/'));
                                            return <th key={date} className={`p-0.5 border min-w-[22px] ${d.getDay() === 0 || d.getDay() === 6 ? 'text-red-500 bg-red-50' : 'bg-gray-100'}`}>{parseInt(date.substring(8))}</th>
                                        })}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="p-0.5 bg-gray-50 font-bold border sticky left-0 z-10 text-left pl-1">來客數</td>
                                        {dates.map(date => <td key={`cust-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date].customers : ''}</td>)}
                                    </tr>
                                    {ITEM_CONFIG.map(item => (
                                        <tr key={`row-${item.id}`}>
                                            <td className="p-0.5 bg-white font-semibold border sticky left-0 z-10 text-left pl-1" style={{color: item.color}}>{item.name}</td>
                                            {dates.map(date => <td key={`${item.id}-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : ''}</td>)}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div className="bg-white p-1 rounded shadow border border-gray-200 flex flex-col min-h-[250px] shrink-0">
                        <div className="flex flex-wrap gap-2 mb-1 px-1 justify-center border-b pb-1">
                            {ITEM_CONFIG.map(item => (
                                <label key={`rad-${item.id}`} className="flex items-center text-[10px] cursor-pointer">
                                    <input type="radio" checked={visibleChart === item.id} onChange={() => setVisibleChart(item.id)} className="mr-0.5" />
                                    <span style={{color: item.color}} className="font-bold">{item.name}</span>
                                </label>
                            ))}
                        </div>
                        <div className="relative flex-1 w-full"><canvas id="trendChart"></canvas></div>
                    </div>
                </div>
            );
        };

        const SettingsComponent = ({ settings, handleSettingChange, timeSlots, newSlotName, setNewSlotName, handleAddSlot, handleDeleteSlot }) => {
            const totalScore = ITEM_CONFIG.reduce((sum, item) => sum + (Number(settings[item.id]?.score) || 0), 0);

            return (
                <div className="flex flex-col md:flex-row h-full gap-4 text-sm overflow-hidden">
                    <div className="w-full md:w-1/2 bg-white p-4 rounded shadow border border-gray-200 overflow-y-auto hide-scroll">
                        <h2 className="text-lg font-bold text-gray-800 mb-2"><i className="fa-solid fa-gear mr-2 text-gray-500"></i>各項指標設定</h2>
                        <p className="text-xs text-gray-500 mb-4">設定各項目的目標轉換率(%)與配分。設定後連動全系統計算。</p>
                        <table className="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="p-2 border">指標項目</th>
                                    <th className="p-2 border">佔比 (%)</th>
                                    <th className="p-2 border">得分</th>
                                </tr>
                            </thead>
                            <tbody>
                                {ITEM_CONFIG.map(item => (
                                    <tr key={item.id} className="hover:bg-gray-50">
                                        <td className="p-2 border font-semibold">{item.name} <div className="text-[10px] text-gray-400">{item.type === 'amount' ? '當班業績' : '當班來客'}</div></td>
                                        <td className="p-2 border">
                                            <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                value={(settings[item.id] && settings[item.id].rate !== undefined) ? settings[item.id].rate : ''} 
                                                onChange={(e) => handleSettingChange(item.id, 'rate', e.target.value)} /> %
                                        </td>
                                        <td className="p-2 border">
                                            <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                value={(settings[item.id] && settings[item.id].score !== undefined) ? settings[item.id].score : ''} 
                                                onChange={(e) => handleSettingChange(item.id, 'score', e.target.value)} /> 分
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                            <tfoot>
                                <tr className="bg-blue-50 font-bold">
                                    <td colSpan="2" className="p-2 border text-right">總分累計：</td>
                                    <td className="p-2 border text-center text-blue-700">{totalScore} 分</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <div className="w-full md:w-1/2 bg-blue-50/30 p-4 rounded shadow border border-blue-200 overflow-y-auto hide-scroll">
                        <h2 className="text-lg font-bold text-blue-800 mb-2"><i className="fa-solid fa-clock mr-2"></i>排班時段管理</h2>
                        <p className="text-xs text-gray-500 mb-4">在此新增或刪除稽核用的排班時段。</p>
                        
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="輸入新時段名稱 (例: 10-14 時段)" 
                                className="flex-1 p-2 border border-blue-300 rounded outline-none focus:ring-1 focus:ring-blue-500 text-sm"
                                value={newSlotName} onChange={(e) => setNewSlotName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAddSlot()} />
                            <button onClick={handleAddSlot} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"><i className="fa-solid fa-plus mr-1"></i>新增</button>
                        </div>

                        <div className="space-y-2">
                            {timeSlots.map((slot, idx) => (
                                <div key={slot.id} className="flex justify-between items-center bg-white p-2.5 rounded border shadow-sm">
                                    <div className="font-bold text-gray-700"><span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-xs mr-2">{idx + 1}</span>{slot.label}</div>
                                    <button onClick={() => handleDeleteSlot(slot.id)} className="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded transition text-xs">
                                        <i className="fa-solid fa-trash-can mr-1"></i>刪除
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const HrForm1Component = ({ emp, handleHrFieldChange, renderSignBox }) => {
            const fData = emp.form1 || { rows: {}, summary: {} };
            const chg = (path, val) => handleHrFieldChange(emp.id, 'form1', path, val);

            return (
                <div className="hr-form-container">
                    <div className="bg-[#000080] text-white text-center py-2">
                        <h2 className="text-lg font-bold tracking-widest mb-1">領航員執行檢核表 ( 新人培育管理 )</h2>
                        <p className="text-[9px] font-bold tracking-widest text-red-400 bg-white inline-block px-3 py-0.5 rounded-full">落實領航員制度．陪伴關懷．提升新人留任率與專業力</p>
                    </div>
                    <div className="p-2 text-[10px] font-bold text-gray-800">
                        <div className="flex justify-between items-end mb-1">
                            <div className="flex items-center gap-1">店名: <input type="text" className="border-b border-gray-400 outline-none w-20 text-center font-bold" value={(fData.store) || emp.storeName || ''} onChange={e=>chg('form1.store', e.target.value)}/></div>
                            <div className="flex items-center gap-1">店長: <input type="text" className="border-b border-gray-400 outline-none w-16 text-center font-bold" value={(fData.manager) || ''} onChange={e=>chg('form1.manager', e.target.value)}/></div>
                            <div className="flex items-center gap-1">總監: <input type="text" className="border-b border-gray-400 outline-none w-16 text-center font-bold" value={(fData.director) || ''} onChange={e=>chg('form1.director', e.target.value)}/></div>
                            <div className="flex items-center gap-1">檢核日期: <input type="date" className="border-b border-gray-400 outline-none text-[9px]" value={(fData.date) || ''} onChange={e=>chg('form1.date', e.target.value)}/></div>
                        </div>

                        <div className="bg-[#000080] text-white p-1 text-center font-normal mb-1 tracking-wide">
                            檢核說明：本表由店長每月填寫，總監巡店時覆核。
                        </div>

                        <table className="w-full hr-table mb-2">
                            <thead>
                                <tr className="bg-gray-100 border-2 border-gray-400">
                                    <th rowSpan="2" className="w-[8%]">階段</th>
                                    <th rowSpan="2" className="w-[10%]">檢核項目</th>
                                    <th rowSpan="2" className="w-[20%]">檢核內容說明</th>
                                    <th rowSpan="2" className="w-[12%]">應完成標準</th>
                                    <th colSpan="3" className="w-[12%] p-0">完成狀況</th>
                                    <th rowSpan="2" className="w-[8%]">完成日期</th>
                                    <th rowSpan="2" className="w-[8%]">領航員<br/>簽名</th>
                                    <th rowSpan="2" className="w-[5%] leading-tight">店長<br/>覆核</th>
                                    <th rowSpan="2" className="w-[5%] leading-tight">總監<br/>覆核</th>
                                    <th rowSpan="2" className="w-[6%]">備註</th>
                                </tr>
                                <tr className="bg-gray-100 text-[8px] border-2 border-gray-400">
                                    <th>已完</th><th>部分</th><th>未完</th>
                                </tr>
                            </thead>
                            <tbody>
                                {PILOT_ITEMS.map((item, idx) => {
                                    const row = (fData.rows && fData.rows[item.no]) || {};
                                    const rChg = (f, v) => chg(`form1.rows.${item.no}.${f}`, v);
                                    const isFirstInPhase = idx === 0 || PILOT_ITEMS[idx-1].phase !== item.phase;
                                    const phaseCount = PILOT_ITEMS.filter(i => i.phase === item.phase).length;
                                    let phaseBg = item.no <= 4 ? 'bg-[#faebd7]' : item.no <= 8 ? 'bg-[#fffacd]' : item.no <= 11 ? 'bg-[#f0fff0]' : item.no <= 14 ? 'bg-[#e0ffff]' : 'bg-[#f0f8ff]';

                                    return (
                                        <tr key={item.no}>
                                            {isFirstInPhase && (
                                                <td rowSpan={phaseCount} className={`font-bold whitespace-pre-wrap ${phaseBg}`}>{item.phase}</td>
                                            )}
                                            <td className="font-bold flex items-center justify-center border-none h-full min-h-[30px]">
                                                <span className="w-3 inline-block">{item.no}</span>
                                                <span className="text-left flex-1 pl-1">{item.item}</span>
                                            </td>
                                            <td className="text-left text-[8px] px-1 font-normal leading-tight">{item.desc}</td>
                                            <td className="text-[8px] font-normal leading-tight">{item.std}</td>
                                            <td className="p-0 border-l border-r"><input type="checkbox" checked={row.status==='done'} onChange={()=>rChg('status', row.status==='done' ? '' : 'done')} className="scale-90"/></td>
                                            <td className="p-0 border-r"><input type="checkbox" checked={row.status==='part'} onChange={()=>rChg('status', row.status==='part' ? '' : 'part')} className="scale-90"/></td>
                                            <td className="p-0"><input type="checkbox" checked={row.status==='none'} onChange={()=>rChg('status', row.status==='none' ? '' : 'none')} className="scale-90"/></td>
                                            <td className="p-0 relative">
                                                <input type="text" className="w-full h-full text-center border-none outline-none bg-transparent text-[8px]" placeholder="/  /" value={row.date||''} onChange={e=>rChg('date', e.target.value)}/>
                                            </td>
                                            <td className="p-0 h-full">{renderSignBox('', `form1.rows.${item.no}.sig1`, emp, "min-h-[25px] border-none")}</td>
                                            <td className="p-0 text-center align-middle">
                                                <input type="checkbox" checked={row.mgrCheck||false} onChange={(e) => rChg('mgrCheck', e.target.checked)} className="scale-100" />
                                            </td>
                                            <td className="p-0 text-center align-middle">
                                                <input type="checkbox" checked={row.dirCheck||false} onChange={(e) => rChg('dirCheck', e.target.checked)} className="scale-100" />
                                            </td>
                                            <td className="p-0"><input type="text" className="w-full border-none outline-none px-1 text-[8px]" value={row.note||''} onChange={e=>rChg('note', e.target.value)}/></td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>

                        <table className="w-full hr-table border-collapse border-2 border-gray-400 font-bold">
                            <tbody>
                                <tr className="bg-gray-100">
                                    <td colSpan="2" className="w-1/4 py-1">本月新人培育總結</td>
                                    <td colSpan="2" className="w-3/8 py-1">店長檢核</td>
                                    <td colSpan="2" className="w-3/8 py-1">總監覆核意見</td>
                                </tr>
                                <tr>
                                    <td className="w-16">本月新增<br/>新人數</td>
                                    <td className="w-12"><input type="number" className="w-6 border-b border-gray-400 outline-none text-center font-bold" value={(fData.summary && fData.summary.newNum) || ''} onChange={e=>chg('form1.summary.newNum',e.target.value)}/> 人</td>
                                    <td colSpan="2" className="text-left align-top px-1 pb-1 font-normal">
                                        <div className="flex items-center gap-2 border-b pb-0.5 mb-0.5 font-bold">
                                            <span>檢核結果:</span>
                                            <label className="checkbox-group"><input type="checkbox" checked={fData.summary?.mgrRes==='good'} onChange={()=>chg('form1.summary.mgrRes', fData.summary?.mgrRes === 'good' ? '' : 'good')}/> 良好</label>
                                            <label className="checkbox-group"><input type="checkbox" checked={fData.summary?.mgrRes==='bad'} onChange={()=>chg('form1.summary.mgrRes', fData.summary?.mgrRes === 'bad' ? '' : 'bad')}/> 需加強</label>
                                        </div>
                                        需加強項目:<br/><textarea className="w-full border-none bg-transparent outline-none text-[9px] resize-none h-8" value={(fData.summary && fData.summary.mgrNote) || ''} onChange={e=>chg('form1.summary.mgrNote',e.target.value)}></textarea>
                                    </td>
                                    <td colSpan="2" className="text-left align-top px-1 pb-1 font-normal">
                                        <div className="flex items-center gap-2 border-b pb-0.5 mb-0.5 font-bold">
                                            <span>覆核結果:</span>
                                            <label className="checkbox-group"><input type="checkbox" checked={fData.summary?.dirRes==='good'} onChange={()=>chg('form1.summary.dirRes', fData.summary?.dirRes === 'good' ? '' : 'good')}/> 良好</label>
                                            <label className="checkbox-group"><input type="checkbox" checked={fData.summary?.dirRes==='bad'} onChange={()=>chg('form1.summary.dirRes', fData.summary?.dirRes === 'bad' ? '' : 'bad')}/> 需加強</label>
