                        <button onClick={() => switchTab('audit')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'audit' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-clipboard-check mr-1 text-red-600"></i>稽核</button>
                        <button onClick={() => switchTab('trend')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'trend' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-chart-line mr-1 text-purple-600"></i>趨勢圖表</button>
                        <button onClick={() => switchTab('settings')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'settings' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-gear mr-1 text-gray-500"></i>店長設定</button>
                        <button onClick={() => setShowPwdModal(true)} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-red-200 ${activeTab === 'hr' ? 'tab-active !border-b-red-500 !text-red-700' : 'text-red-500 hover:bg-red-50'}`}><i className="fa-solid fa-user-shield mr-1"></i>領航員/績效改善</button>
                    </nav>

                    <main className={`flex-1 ${fullScreenMode ? 'fullscreen-container' : 'overflow-hidden'}`}>
                        {activeTab === 'night' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('night', '夜班', 'fa-moon', 'text-gray-800', 'bg-gray-800')}</div>}
                        {activeTab === 'morning' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('morning', '早班', 'fa-sun', 'text-orange-600', 'bg-orange-500')}</div>}
                        {activeTab === 'evening' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('evening', '晚班', 'fa-cloud-sun', 'text-indigo-600', 'bg-indigo-500')}</div>}
                        {activeTab === 'summary' && <div className="p-2 h-full overflow-hidden">{renderSummary()}</div>}
                        {activeTab === 'audit' && <div className="p-2 h-full overflow-hidden">{renderAudit()}</div>}
                        {activeTab === 'trend' && <div className="p-2 h-full overflow-hidden">{renderTrendTab()}</div>}
                        {activeTab === 'settings' && <div className="p-2 h-full overflow-hidden">{renderSettings()}</div>}
                        {activeTab === 'hr' && renderHrTab()}
                    </main>
                </div>
            );
        }

        // 導入企業級錯誤捕捉防護罩 (Error Boundary)
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Caught unhandled exception:", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', fontFamily: 'sans-serif', background: '#fee2e2', color: '#991b1b', height: '100vh', overflow: 'auto' }}>
                            <h2 style={{ fontWeight: 'bold', fontSize: '20px' }}>系統發生未預期錯誤</h2>
                            <p>非常抱歉，畫面渲染失敗。請截圖以下代碼交給工程師，這能幫助我們徹底除錯：</p>
                            <pre style={{ background: '#fff', padding: '10px', marginTop: '10px', border: '1px solid #f87171', borderRadius: '4px', fontSize: '12px', whiteSpace: 'pre-wrap' }}>
                                {this.state.error && this.state.error.toString()}
                                {'\n'}
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '20px', padding: '10px 20px', background: '#dc2626', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>
                                重新載入
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        // 將 App 包在防護罩內
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
