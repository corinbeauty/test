                                    <tr>
                                        <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-briefcase mr-1"></i> 職務</th>
                                        <td className="border-emerald-700"><input type="text" className="w-full bg-transparent px-1 outline-none text-left" value={(fData.basic && fData.basic.job) || ''} onChange={e=>chg('form3.basic.job',e.target.value)}/></td>
                                        <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-calendar-day mr-1"></i> 到職日</th>
                                        <td className="border-emerald-700"><input type="date" className="w-full bg-transparent px-1 outline-none text-center text-[9px]" value={(fData.basic && fData.basic.joinDate) || ''} onChange={e=>chg('form3.basic.joinDate',e.target.value)}/></td>
                                        <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-user-tie mr-1"></i> 直屬主管</th>
                                        <td className="border-emerald-700"><input type="text" className="w-full bg-transparent px-1 outline-none text-left" value={(fData.basic && fData.basic.mgr) || ''} onChange={e=>chg('form3.basic.mgr',e.target.value)}/></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div>
                            <div className="form-section-title bg-emerald-700">二、面談內容</div>
                            <table className="w-full hr-table text-left border-2 border-emerald-700">
                                <tbody>
                                    <tr>
                                        <th className="w-[15%] bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-calendar-days mr-1"></i> 面談日期</th><td className="w-[35%] border-emerald-700"><input type="date" className="w-full outline-none px-2 text-left bg-transparent text-[9px]" value={(fData.interview && fData.interview.date) || ''} onChange={e=>chg('form3.interview.date',e.target.value)}/></td>
                                        <th className="w-[15%] bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-location-dot mr-1"></i> 面談地點</th><td className="w-[35%] border-emerald-700"><input type="text" className="w-full outline-none px-2 bg-transparent" value={(fData.interview && fData.interview.loc) || ''} onChange={e=>chg('form3.interview.loc',e.target.value)}/></td>
                                    </tr>
                                    <tr>
                                        <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-comments mr-1"></i> 面談類型</th>
                                        <td colSpan="3" className="text-left p-1.5 border-emerald-700">
                                            <div className="flex flex-wrap gap-x-4 gap-y-1.5">
                                                <label className="checkbox-group">{ckbx('interview', 'type1')} 關懷面談</label>
                                                <label className="checkbox-group">{ckbx('interview', 'type2')} 績效改善</label>
                                                <label className="checkbox-group">{ckbx('interview', 'type3')} 客訴事件</label>
                                                <label className="checkbox-group">{ckbx('interview', 'type4')} 出勤異常</label>
                                                <label className="checkbox-group">{ckbx('interview', 'type5')} 工作態度</label>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th className="bg-emerald-50 text-emerald-800 border-emerald-700"><i className="fa-solid fa-pen-to-square mr-1"></i> 具體事實說明</th>
                                        <td colSpan="3" className="border-emerald-700 p-0"><textarea className="w-full h-12 outline-none p-1.5 resize-none text-left align-top bg-transparent" value={fData.fact||''} onChange={e=>chg('form3.fact',e.target.value)}></textarea></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div>
                            <div className="form-section-title bg-emerald-700">三、員工說明</div>
                            <div className="border-2 border-emerald-700 rounded-sm">
                                <textarea className="w-full h-12 outline-none p-1.5 resize-none text-left bg-transparent" value={fData.emp||''} onChange={e=>chg('form3.emp',e.target.value)}></textarea>
                            </div>
                        </div>

                        <div>
                            <div className="form-section-title bg-emerald-700">五、改善計畫</div>
                            <table className="w-full hr-table border-2 border-emerald-700">
                                <thead><tr className="bg-emerald-50 text-emerald-800 border-emerald-700">
                                    <th className="border-emerald-700 w-[10%] font-bold py-1">No</th>
                                    <th className="border-emerald-700 w-[30%] font-bold py-1">改善項目</th>
                                    <th className="border-emerald-700 w-[40%] font-bold py-1">改善目標</th>
                                    <th className="border-emerald-700 w-[20%] font-bold py-1">完成期限</th>
                                </tr></thead>
                                <tbody>
                                    {[0,1,2].map(idx => (
                                        <tr key={`imp_${idx}`}>
                                            <td className="border-emerald-700 font-bold bg-gray-50">{idx+1}</td>
                                            <td className="border-emerald-700 p-0 h-6"><input type="text" className="w-full h-full outline-none px-1.5 text-left bg-transparent" value={(fData.improve && fData.improve[idx] && fData.improve[idx].item) || ''} onChange={e=>chg(`form3.improve.${idx}.item`,e.target.value)}/></td>
                                            <td className="border-emerald-700 p-0"><input type="text" className="w-full h-full outline-none px-1.5 text-left bg-transparent" value={(fData.improve && fData.improve[idx] && fData.improve[idx].goal) || ''} onChange={e=>chg(`form3.improve.${idx}.goal`,e.target.value)}/></td>
                                            <td className="border-emerald-700 p-0"><input type="date" className="w-full h-full outline-none px-1.5 text-center bg-transparent text-[8px]" value={(fData.improve && fData.improve[idx] && fData.improve[idx].deadline) || ''} onChange={e=>chg(`form3.improve.${idx}.deadline`,e.target.value)}/></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div>
                            <div className="form-section-title bg-emerald-700 mb-0.5">八、雙方確認</div>
                            <div className="border-2 border-emerald-700 p-1.5 bg-emerald-50/30">
                                <div className="flex justify-between items-end gap-4 px-4 font-bold text-gray-700">
                                    <div className="flex-1 flex flex-col items-center">
                                        <div className="border-b border-gray-400 w-full mb-1 h-10 relative">
                                            <div className="absolute inset-0 flex items-end justify-center">{renderSignBox('', 'form3.sign.emp', emp, "border-none !min-h-0")}</div>
                                        </div>
                                        <span>員工簽名</span>
                                    </div>
                                    <div className="flex-1 flex flex-col items-center">
                                        <div className="border-b border-gray-400 w-full mb-1 h-10 relative">
                                            <div className="absolute inset-0 flex items-end justify-center">{renderSignBox('', 'form3.sign.mgr', emp, "border-none !min-h-0")}</div>
                                        </div>
                                        <span>主管簽名</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HrForm4Component = ({ emp, handleHrFieldChange, renderSignBox }) => {
            const [selectedRecordId, setSelectedRecordId] = useState('');
            const [newRecordType, setNewRecordType] = useState('month'); 
            const [newRecordDate, setNewRecordDate] = useState('');

            // Access form4Records or fallback to empty
            const records = emp.form4Records || {};
            const recordKeys = Object.keys(records).sort().reverse();

            // Set initial selected record
            useEffect(() => {
                if (!selectedRecordId && recordKeys.length > 0) {
                    setSelectedRecordId(recordKeys[0]);
                }
            }, [emp.id, recordKeys, selectedRecordId]);

            const handleCreateRecord = () => {
                if (!newRecordDate) { alert("請選擇日期"); return; }
                const recordId = `${newRecordType}-${newRecordDate}`;
                
                if (records[recordId]) {
                    setSelectedRecordId(recordId);
                    return;
                }

                // Initialize new empty record based on standard template
                const newRecord = { basic: { periodType: newRecordType, store: emp.storeName, manager: emp.name }, scores: {}, result: {} };
                handleHrFieldChange(emp.id, 'form4Records', recordId, newRecord);
                setSelectedRecordId(recordId);
            };

            const renderIcon = (item) => {
                if (item.icon === 'google') {
                    return (
                        <svg viewBox="0 0 24 24" width="18" height="18" className="mr-1 inline-block shrink-0" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    );
                }
                return <i className={`fa-solid ${item.icon} ${item.color} mr-1 text-base w-5 text-center shrink-0`}></i>;
            };

            return (
                <div className="hr-form-container text-gray-800 p-4 relative">
                    
                    {/* Record Selector UI (Top Bar) */}
                    <div className="bg-blue-50 border border-blue-200 p-2 rounded mb-4 flex flex-wrap gap-4 items-end hide-in-fullscreen shadow-sm">
                        <div className="flex-1 min-w-[200px]">
                            <label className="block text-xs font-bold text-blue-800 mb-1"><i className="fa-solid fa-folder-open mr-1"></i>選擇歷史戰報</label>
                            <select 
                                className="w-full border border-blue-300 rounded p-1.5 text-sm outline-none font-bold bg-white focus:ring-2 focus:ring-blue-500"
                                value={selectedRecordId}
                                onChange={e => setSelectedRecordId(e.target.value)}
                            >
                                <option value="">-- 請選擇戰報紀錄 --</option>
                                {recordKeys.map(key => {
                                    const display = key.startsWith('month') ? `月度戰報 : ${key.replace('month-', '')}` : `週度戰報 : ${key.replace('week-', '').replace('-', '年 第')}週`;
                                    return <option key={key} value={key}>{display}</option>;
                                })}
                            </select>
                        </div>
                        <div className="border-l border-blue-300 pl-4 flex-1 min-w-[300px] flex gap-2 items-end">
                            <div>
                                <label className="block text-xs font-bold text-blue-800 mb-1"><i className="fa-solid fa-file-circle-plus mr-1"></i>新增戰報</label>
                                <select className="border border-blue-300 rounded p-1.5 text-sm outline-none bg-white" value={newRecordType} onChange={e => setNewRecordType(e.target.value)}>
                                    <option value="month">月度戰報</option>
                                    <option value="week">週度戰報</option>
                                </select>
                            </div>
                            <div>
                                {newRecordType === 'month' ? (
                                    <input type="month" className="border border-blue-300 rounded p-1.5 text-sm outline-none bg-white font-bold text-gray-700" value={newRecordDate} onChange={e => setNewRecordDate(e.target.value)} />
                                ) : (
                                    <input type="week" className="border border-blue-300 rounded p-1.5 text-sm outline-none bg-white font-bold text-gray-700" value={newRecordDate} onChange={e => setNewRecordDate(e.target.value)} />
                                )}
                            </div>
                            <button onClick={handleCreateRecord} className="bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-bold shadow hover:bg-blue-700 transition">建立/載入</button>
                        </div>
                    </div>

                    {!selectedRecordId ? (
                        <div className="text-center py-16 text-gray-400 font-bold border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center">
                            <i className="fa-solid fa-folder-open text-4xl mb-3 opacity-30"></i>
                            <p>目前沒有選取任何戰報。</p>
                            <p className="text-xs font-normal mt-1">請從上方選單選擇歷史紀錄，或建立一份全新的戰報。</p>
                        </div>
                    ) : (
                        <Form4Content 
                            emp={emp} 
                            recordId={selectedRecordId} 
                            fData={records[selectedRecordId]} 
                            handleHrFieldChange={handleHrFieldChange}
                            renderSignBox={renderSignBox}
                            renderIcon={renderIcon}
                        />
                    )}
                </div>
            );
        };

        // Form 4 Inner Content Component (Extracted for cleaner state handling with multi-records)
        const Form4Content = ({ emp, recordId, fData = {}, handleHrFieldChange, renderSignBox, renderIcon }) => {
            const chg = (path, val) => handleHrFieldChange(emp.id, 'form4Records', `${recordId}.${path}`, val);

            let totalScore = 0;
            ZODIAC_ITEMS.forEach(item => { totalScore += (Number(fData.scores?.[item.no]?.self) || 0); });
            const avgScore = (totalScore / 12).toFixed(2);
            const achieveRate = ((totalScore / 100) * 100).toFixed(2);

            let grade = '';
            if (totalScore >= 90) grade = 'excellent';
            else if (totalScore >= 80) grade = 'good';
            else if (totalScore >= 60) grade = 'pass';
            else if (totalScore > 0) grade = 'fail';

            return (
                <div className="relative animate-fadeIn">
                    <div className="text-center pb-2 mb-2 relative">
                        <h2 className="text-2xl font-black text-[#1d3557] tracking-wider mb-1">12生肖績效檢討表</h2>
                        <p className="text-xs text-red-500 font-bold tracking-widest">落實執行 ． 追蹤管理 ． 持續改善 ． 提升營運績效</p>
                        <div className="absolute right-0 top-0 text-[10px] font-bold text-gray-400 border px-2 py-1 rounded bg-gray-50 hide-in-fullscreen">
                            目前檢視: {recordId.startsWith('month') ? '月度' : '週度'} ({recordId.split('-').slice(1).join('-')})
                        </div>
                    </div>

                    <div className="border-t-2 border-b-2 border-red-500 py-1.5 px-2 mb-2 text-xs font-bold flex flex-wrap justify-between items-center gap-y-2 bg-gray-50">
                        <div className="flex gap-4">
                            <div>店名：<input type="text" className="border-b border-gray-400 bg-transparent outline-none w-24 text-center text-blue-800 font-black" value={fData.basic?.store || emp.storeName || ''} onChange={e=>chg('basic.store', e.target.value)}/></div>
                            <div>店長：<input type="text" className="border-b border-gray-400 bg-transparent outline-none w-20 text-center text-blue-800 font-black" value={fData.basic?.manager || emp.name || ''} onChange={e=>chg('basic.manager', e.target.value)}/></div>
                        </div>
                        <div className="flex items-center gap-2">
                            <span>檢討期間：</span>
                            <label className="flex items-center gap-0.5 cursor-pointer"><input type="checkbox" checked={fData.basic?.periodType==='week'} onChange={()=>chg('basic.periodType', 'week')} /> 週</label>
                            <div className="flex items-center gap-1">
                                <span className="text-gray-400">(</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.wS_M||''} onChange={e=>chg('basic.wS_M', e.target.value)}/><span className="text-gray-400">/</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.wS_D||''} onChange={e=>chg('basic.wS_D', e.target.value)}/><span className="text-gray-400">~</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.wE_M||''} onChange={e=>chg('basic.wE_M', e.target.value)}/><span className="text-gray-400">/</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.wE_D||''} onChange={e=>chg('basic.wE_D', e.target.value)}/>
                                <span className="text-gray-400">)</span>
                            </div>
                            
                            <label className="flex items-center gap-0.5 cursor-pointer ml-3"><input type="checkbox" checked={fData.basic?.periodType==='month'} onChange={()=>chg('basic.periodType', 'month')} /> 月</label>
                            <div className="flex items-center gap-1">
                                <span className="text-gray-400">(</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.mS_M||''} onChange={e=>chg('basic.mS_M', e.target.value)}/><span className="text-gray-400">/</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.mS_D||''} onChange={e=>chg('basic.mS_D', e.target.value)}/><span className="text-gray-400">~</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.mE_M||''} onChange={e=>chg('basic.mE_M', e.target.value)}/><span className="text-gray-400">/</span>
                                <input type="text" className="border-b border-gray-400 bg-transparent outline-none w-6 text-center text-[11px] text-blue-700 font-bold" value={fData.basic?.mE_D||''} onChange={e=>chg('basic.mE_D', e.target.value)}/>
                                <span className="text-gray-400">)</span>
                            </div>
                        </div>
                    </div>

                    <table className="w-full hr-table mb-2 border-2 border-[#1d3557]">
                        <thead>
                            <tr className="bg-[#1d3557] text-white text-[11px]">
                                <th className="w-[4%] py-2">項次</th>
                                <th className="w-[11%]">檢核項目</th>
                                <th className="w-[21%]">檢核重點內容</th>
                                <th className="w-[18%]">執行標準<br/><span className="text-[9px] font-normal text-white/80">(達成本月指標)</span></th>
                                <th className="w-[4%]">配分</th>
                                <th className="w-[6%]">店長<br/>自評</th>
                                <th className="w-[6%]">總監<br/>覆評</th>
                                <th className="w-[30%]">建議改善事項</th>
                            </tr>
                        </thead>
                        <tbody>
                            {ZODIAC_ITEMS.map(item => (
                                <tr key={item.no} className="hover:bg-gray-50/50">
                                    <td className="font-bold bg-gray-50 border-gray-400">{item.no}</td>
                                    <td className="font-black text-gray-800 text-left pl-1 border-gray-400">
                                        {renderIcon(item)}
                                        {item.name}
                                    </td>
                                    <td className="text-left font-normal text-[9px] leading-tight whitespace-pre-wrap p-1 border-gray-400">{item.desc}</td>
                                    <td className="text-left font-semibold text-[9px] text-gray-600 leading-tight whitespace-pre-wrap p-1 border-gray-400">{item.std}</td>
                                    <td className="font-bold bg-gray-50 border-gray-400 text-gray-700">{item.max}</td>
                                    <td className="p-0 border-gray-400 bg-white">
                                        <input type="number" step="0.01" min="0" max={item.max} className="w-full h-full text-center p-1 font-black text-blue-700 bg-transparent outline-none focus:bg-gray-100" placeholder="0" value={fData.scores?.[item.no]?.self !== undefined ? fData.scores[item.no].self : ''} onChange={e=>chg(`scores.${item.no}.self`, e.target.value)} />
                                    </td>
                                    <td className="p-0 border-gray-400 bg-white">
                                        <input type="number" step="0.01" min="0" max={item.max} className="w-full h-full text-center p-1 font-black text-indigo-700 bg-transparent outline-none focus:bg-gray-100" placeholder="0" value={fData.scores?.[item.no]?.audit !== undefined ? fData.scores[item.no].audit : ''} onChange={e=>chg(`scores.${item.no}.audit`, e.target.value)} />
                                    </td>
                                    <td className="p-0 border-gray-400">
                                        <textarea 
                                            className="w-full h-full min-h-[40px] text-[10px] font-normal leading-relaxed p-1 border-none outline-none resize-none bg-transparent focus:bg-white text-left overflow-hidden block" 
                                            placeholder="輸入改善建議..." 
                                            value={fData.scores?.[item.no]?.note || ''} 
                                            onChange={(e) => {
                                                chg(`scores.${item.no}.note`, e.target.value);
                                                e.target.style.height = 'auto';
                                                e.target.style.height = (e.target.scrollHeight) + 'px';
                                            }}
                                            ref={(el) => { if(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; } }}
                                        ></textarea>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    {/* REDESIGNED LAYOUT: 12-column grid for maximizing textareas */}
                    <div className="border-2 border-blue-200 grid grid-cols-1 md:grid-cols-12 text-xs mb-3 font-bold">
                        {/* Column 1: Scores (Span 2) */}
                        <div className="col-span-1 md:col-span-2 border-b md:border-b-0 md:border-r border-blue-200 flex flex-col justify-center bg-gray-50/50 p-2">
                            <div className="flex justify-between py-1 border-b border-dashed"><span>平均分數：</span><span className="text-blue-700 font-black">{avgScore} <span className="text-[10px] font-normal text-gray-500">/ 100 分</span></span></div>
                            <div className="flex justify-between py-1"><span>達成率：</span><span className="text-blue-700 font-black">{achieveRate} <span className="text-[10px] font-normal text-gray-500">%</span></span></div>
                        </div>
                        
                        {/* Column 2: Grades (Span 3) */}
                        <div className="col-span-1 md:col-span-3 border-b md:border-b-0 md:border-r border-blue-200 p-2 flex flex-col gap-1 justify-center">
                            <div className="text-[10px] text-gray-500 mb-0.5">等級評估 (自動連動)：</div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-1 text-[10px]">
                                <label className="flex items-center gap-1"><input type="checkbox" disabled checked={grade==='excellent'} className="scale-110"/> 優秀(90分以上)</label>
                                <label className="flex items-center gap-1"><input type="checkbox" disabled checked={grade==='good'} className="scale-110"/> 良好(80-89分以上)</label>
                                <label className="flex items-center gap-1"><input type="checkbox" disabled checked={grade==='pass'} className="scale-110"/> 合格(60-79分以上)</label>
                                <label className="flex items-center gap-1"><input type="checkbox" disabled checked={grade==='fail'} className="scale-110"/> 待改善(未達60分)</label>
                            </div>
                        </div>

                        {/* Column 3: Textareas (Span 7) - Maximized */}

                            <p className="text-xs text-gray-500 mt-1">目前登入身分：<span className="font-bold text-red-600">信吉 (Super Admin)</span></p>

                    <div className="flex-1 bg-white rounded shadow border border-gray-200 overflow-y-auto">
                        <table className="w-full text-left border-collapse text-sm">

                                    <th className="p-3">姓名 / 帳號</th><th className="p-3">層級身份</th><th className="p-3">所屬群組 (門店/區域)</th>

                            <tbody>

                                        <td className="p-3 font-bold text-gray-700">{user.group || '未指定'}</td>
                                        <td className="p-3 text-xs text-gray-600">{user.permissions && user.permissions.includes('view_all') ? <span className="text-red-600 font-bold"><i className="fa-solid fa-eye mr-1"></i>跨區/全區資料</span> : <span className="text-blue-600 font-bold"><i className="fa-solid fa-store mr-1"></i>僅限本店資料</span>}</td>
                                        <td className="p-3 text-center">{user.status === 'active' ? <span className="text-green-600 font-bold bg-green-50 px-2 py-1 rounded text-xs"><i className="fa-solid fa-check-circle mr-1"></i>啟用中</span> : <span className="text-gray-500 font-bold bg-gray-100 px-2 py-1 rounded text-xs"><i className="fa-solid fa-ban mr-1"></i>已停權</span>}</td>

                                            {user.status === 'active' ? (

                                            ) : (

                                            )}
                                            <button onClick={() => handleDeleteUser(user.id)} className="px-2 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded transition text-xs font-bold" title="刪除"><i className="fa-solid fa-trash"></i></button>

                    {manageUserModal && (

                                        <div><label className="block text-xs text-gray-500 mb-1">人員姓名</label><input required name="name" defaultValue={editUser?.name} className="w-full border p-2 rounded outline-none focus:border-red-500" placeholder="例: 王小明" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">層級身分</label>
                                            <select name="role" defaultValue={editUser?.role || 'staff'} className="w-full border p-2 rounded outline-none">
                                                <option value="staff">店長/店員</option><option value="admin">區主管</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">群組分類 (門店/區域)</label>
                                            <input name="group" defaultValue={editUser?.group} className="w-full border p-2 rounded outline-none focus:border-red-500" placeholder="例: 中清店" />

                                    <div className="bg-gray-50 p-3 rounded border">
                                        <label className="block text-xs font-bold text-gray-700 mb-2"><i className="fa-solid fa-shield mr-1"></i>資料檢視權限配置</label>

                                            <span className="text-sm font-bold text-gray-800">僅限檢視本店/所屬群組資料</span>

                                            <input type="checkbox" name="permissions" value="view_all" defaultChecked={editUser ? editUser.permissions?.includes('view_all') : false} className="scale-125" />
                                            <span className="text-sm font-bold text-red-600">開放檢視所有跨區資料 (主管級)</span>
                                        </label>
                                    </div>
                                    <div className="pt-4 flex justify-end gap-3 border-t">
                                        <button type="button" onClick={() => {setManageUserModal(false); setEditUser(null);}} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                        <button type="submit" className="px-6 py-2 bg-red-600 text-white rounded font-bold shadow hover:bg-red-700 transition">儲存設定</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // MODULE 3: MAIN ORCHESTRATOR APP
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('night');
            const [selectedDate, setSelectedDate] = useState(getTodayStr()); 
            const [inputDate, setInputDate] = useState(getTodayStr());       
            const [database, setDatabase] = useState({});
            const safeInputDate = inputDate || getTodayStr();

            const [settings, setSettings] = useState(
                ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: { rate: item.defaultRate, score: item.defaultScore } }), {})
            );
            const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
            const [newSlotName, setNewSlotName] = useState('');

            // Auth & Modals state
            const [hrAuthUnlocked, setHrAuthUnlocked] = useState(false);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [pwdErrorModal, setPwdErrorModal] = useState(false); 
            const [pwdInput, setPwdInput] = useState('');
            const [fullScreenMode, setFullScreenMode] = useState(false);

            // HR Employees state
            const [hrEmployees, setHrEmployees] = useState({});
            const [selectedStore, setSelectedStore] = useState(''); 
            const [selectedEmpId, setSelectedEmpId] = useState(''); 
            const [newEmpId, setNewEmpId] = useState('');
            const [newEmpName, setNewEmpName] = useState('');
            const [hrFormTab, setHrFormTab] = useState('form1');
            const [showEmpModal, setShowEmpModal] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [editEmpData, setEditEmpData] = useState({ id: '', name: '', storeName: '' });
            const [sigModal, setSigModal] = useState({ isOpen: false, fieldPath: '' });
            
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            // Admin state
            const [isSuperAdmin, setIsSuperAdmin] = useState(false);
            const [showSuperAuthModal, setShowSuperAuthModal] = useState(false);
            const [superAuthErrorModal, setSuperAuthErrorModal] = useState(false); 
            const [superAccInput, setSuperAccInput] = useState('');
            const [superPwdInput, setSuperPwdInput] = useState('');
            const [systemUsers, setSystemUsers] = useState([]);
            const [loggedInGroup, setLoggedInGroup] = useState('中清店');

            useEffect(() => {
                if (fullScreenMode) document.body.classList.add('pdf-mode');
                else document.body.classList.remove('pdf-mode');
            }, [fullScreenMode]);

            const switchTab = (tabName) => {
                if (tabName !== 'hr') { setHrAuthUnlocked(false); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); setFullScreenMode(false); }
                if (tabName !== 'admin') { setIsSuperAdmin(false); }
                setActiveTab(tabName);
            };

            const handlePwdSubmit = () => {
                if (pwdInput === '8888') { setHrAuthUnlocked(true); setActiveTab('hr'); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); }
                else { setPwdErrorModal(true); setPwdInput(''); }
            };

            const handleSuperAuthSubmit = () => {
                if (superAccInput === '信吉' && superPwdInput === '7310168888') {
                    setIsSuperAdmin(true); setLoggedInGroup('總部最高權限'); setActiveTab('admin'); setShowSuperAuthModal(false); setSuperAccInput(''); setSuperPwdInput(''); setSuperAuthErrorModal(false);
                } else { setSuperAuthErrorModal(true); setSuperPwdInput(''); }
            };

            // Firebase Synchronization
            useEffect(() => {
                const initFb = async () => {
                    if (!window.fb) return;
                    const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, db, collection, onSnapshot } = window.fb;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (err) { console.error("Firebase Auth Exception:", err); }

                    onAuthStateChanged(auth, user => {
                        window.firebaseUser = user;
                        if (!user) return;
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                        const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
                        const hrRef = collection(db, 'artifacts', appId, 'public', 'data', 'hr_employees');
                        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'system_users');

                        onSnapshot(recordsRef, snap => { const newDb = {}; snap.forEach(d => newDb[d.id] = d.data()); setDatabase(newDb); });
                        onSnapshot(settingsRef, snap => { snap.forEach(d => { if (d.id === "global") { const data = d.data(); if (data.rates) setSettings(prev => ({ ...prev, ...data.rates })); if (data.timeSlots) setTimeSlots(data.timeSlots); } }); });
                        onSnapshot(hrRef, snap => { const newHr = {}; snap.forEach(d => { const data = d.data(); if(!data.isDeleted) newHr[d.id] = data; }); setHrEmployees(newHr); });
                        onSnapshot(usersRef, snap => { const users = []; snap.forEach(d => users.push({ id: d.id, ...d.data() })); setSystemUsers(users); });
                    });
                };
                if (window.fb) initFb();
                else window.addEventListener('firebase-ready', initFb);
                return () => window.removeEventListener('firebase-ready', initFb);
            }, []);

            const saveToFirebase = (collectionName, docId, dataToMerge, isMerge = true) => {
                if (window.fb && window.firebaseUser) {
                    const { db, doc, setDoc } = window.fb;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'akpi-e0698';
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
                    setDoc(docRef, dataToMerge, { merge: isMerge }).catch(e => console.error("DB Write Error:", e));
                }
            };

            const handleShiftChange = (shift, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { morning: {}, evening: {}, night: {}, manager: {} };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = {};
                    if (!newDb[safeInputDate][shift]) newDb[safeInputDate][shift] = {};
                    newDb[safeInputDate][shift] = { ...newDb[safeInputDate][shift], [field]: parsedValue };
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSlotChange = (slotId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { manager: {} };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = {};
                    if (!newDb[safeInputDate].manager.slots) newDb[safeInputDate].manager.slots = {};
                    if (!newDb[safeInputDate].manager.slots[slotId]) newDb[safeInputDate].manager.slots[slotId] = {};
                    newDb[safeInputDate].manager.slots[slotId][field] = parsedValue;
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSettingChange = (itemId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setSettings(prev => {
                    const newSettings = { ...prev, [itemId]: { ...prev[itemId], [field]: parsedValue } };
                    saveToFirebase('settings', 'global', { rates: newSettings });
                    return newSettings;
                });
            };

            const handleAddSlot = () => {
                if (!newSlotName.trim()) return;
                const newSlots = [...timeSlots, { id: 'ts_' + Date.now(), label: newSlotName.trim() }];
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots }); setNewSlotName('');
            };
            const handleDeleteSlot = (idToRemove) => {
                const newSlots = timeSlots.filter(s => s.id !== idToRemove);
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots });
            };

            const handleAddHrEmployee = () => {
                if (!selectedStore) { alert("請先從左方選擇店別！或點擊「完整新增」建立新店別與員工。"); return; }
                if (!newEmpId.trim() || !newEmpName.trim()) { alert("請輸入完整的員工編號與姓名！"); return; }
                if (hrEmployees[newEmpId]) { alert("此員工編號已存在！"); return; }
                const newEmp = { id: newEmpId, name: newEmpName, storeName: selectedStore, form1: { rows: {}, summary: {} }, form2: { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }, form3: { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} }, form4Records: {} };
                saveToFirebase('hr_employees', newEmpId, newEmp); setNewEmpId(''); setNewEmpName(''); setSelectedEmpId(newEmpId);
            };

            const handleSaveHrEmployee = (e) => {
                e.preventDefault();
                if (!editEmpData.storeName.trim() || !editEmpData.id.trim() || !editEmpData.name.trim()) { alert("請填寫完整的店別、員工編號與姓名！"); return; }
                if (isEditMode) {
                    if (hrEmployees[editEmpData.id]) {
                        saveToFirebase('hr_employees', editEmpData.id, { ...hrEmployees[editEmpData.id], name: editEmpData.name, storeName: editEmpData.storeName });
                        setSelectedStore(editEmpData.storeName);
                    }
                } else {
                    if (hrEmployees[editEmpData.id]) { alert("此員工編號已存在！"); return; }
                    const newEmp = { id: editEmpData.id, name: editEmpData.name, storeName: editEmpData.storeName, form1: { rows: {}, summary: {} }, form2: { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }, form3: { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} }, form4Records: {} };
                    saveToFirebase('hr_employees', editEmpData.id, newEmp); setSelectedStore(editEmpData.storeName); setSelectedEmpId(editEmpData.id);
                }
                setShowEmpModal(false); setEditEmpData({ id: '', name: '', storeName: '' });
            };

            const handleDeleteHrEmployee = () => {
                const currentEmp = hrEmployees[selectedEmpId] || null;
                if(!currentEmp) return;
                if(confirm(`確定要永久刪除員工 ${currentEmp.name} 及其所有表單紀錄嗎？這無法復原！`)) {
                    saveToFirebase('hr_employees', currentEmp.id, { isDeleted: true }, false); setSelectedEmpId('');
                }
            };

            const handleHrFieldChange = (empId, formType, fieldPath, value) => {
                setHrEmployees(prev => {
                    const empData = prev[empId];
                    if (!empData) return prev;
                    const updatedEmp = JSON.parse(JSON.stringify(empData));
                    const keys = fieldPath.split('.');
                    let current = updatedEmp;
                    
                    // Allow saving to the specific formType key if needed (for Form 4 multi-records)
                    if (formType === 'form4Records' && keys[0] !== 'form4Records') {
                       if (!current.form4Records) current.form4Records = {};
                       current = current.form4Records;
                    }

                    for (let i = 0; i < keys.length - 1; i++) { if (!current[keys[i]]) current[keys[i]] = {}; current = current[keys[i]]; }
                    current[keys[keys.length - 1]] = value;
                    saveToFirebase('hr_employees', empId, updatedEmp);
                    return { ...prev, [empId]: updatedEmp };
                });
            };

            // Canvas Signature Functions
            const startDrawing = (e) => { isDrawingRef.current = true; draw(e); };
            const stopDrawing = () => { isDrawingRef.current = false; if (canvasRef.current) canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawingRef.current || !canvasRef.current) return;
                e.preventDefault();
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (!clientX || !clientY) return;
                const x = clientX - rect.left; const y = clientY - rect.top;
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            const clearCanvas = () => { if (canvasRef.current) { const ctx = canvasRef.current.getContext('2d'); ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); ctx.beginPath(); } };
            const saveSignature = () => {
                if (canvasRef.current && sigModal.fieldPath && selectedEmpId) {
                    const dataUrl = canvasRef.current.toDataURL('image/png');
                    // We parse the first part of the path to know if it's form4Records or standard form
                    let formType = null;
                    if (sigModal.fieldPath.startsWith('form4Records.')) {
                        formType = 'form4Records';
                        // strip form4Records from path for the handler logic above if we want, or just pass as is.
                        // Actually our handler is flexible enough to handle full paths from root
                    }
                    
                    handleHrFieldChange(selectedEmpId, formType, sigModal.fieldPath, dataUrl);
                    setSigModal({ isOpen: false, fieldPath: '' });
                }
            };
            const renderSignBox = (label, fieldPath, empData, customClass="") => {
                const keys = fieldPath.split('.');
                let val = empData;
                for (let k of keys) { val = val && val[k]; }
                return (
                    <div className="flex flex-col items-center justify-center h-full w-full">
                        {label && <div className="text-[10px] text-gray-500 mb-1">{label}</div>}
                        <div className={`sign-box w-full ${customClass}`} onClick={() => {
                            setSigModal({ isOpen: true, fieldPath });
                            setTimeout(() => { if (canvasRef.current) { const p = canvasRef.current.parentElement; canvasRef.current.width = p.clientWidth; canvasRef.current.height = p.clientHeight; } }, 100);
                        }}>
                            {val ? <img src={val} className="sign-img" alt="簽名" /> : <span className="sign-placeholder">點擊簽名</span>}
                        </div>
                    </div>
                );
            };

            return (
                <div className={`flex flex-col max-w-7xl mx-auto bg-gray-100 relative ${fullScreenMode ? 'pdf-mode' : 'h-full'}`}>
                    {showPwdModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
                                <div className="bg-blue-800 text-white p-4 font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-lock"></i> 系統安全驗證</div>
                                <div className="p-6">
                                    <p className="text-gray-600 text-sm mb-4 font-bold">請輸入授權密碼以解鎖畫面。</p>
                                    <input type="password" className="w-full border-2 border-gray-300 rounded-lg p-3 text-center text-2xl tracking-[0.5em] focus:border-blue-500 outline-none transition-colors font-sans" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handlePwdSubmit()} placeholder="輸入密碼" autoFocus />
                                </div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t">
                                    <button onClick={() => {setShowPwdModal(false); setPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                    <button onClick={handlePwdSubmit} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">驗證解鎖</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSuperAuthModal && (
                        <div className="fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border-2 border-yellow-500">
                                <div className="bg-gray-900 text-yellow-500 p-4 font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-crown"></i> 總部最高權限登入</div>
                                <div className="p-6 space-y-4">
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">管理員帳號</label><input type="text" className="w-full border-2 border-gray-300 rounded-lg p-2 text-center text-lg font-bold focus:border-yellow-500 outline-none" value={superAccInput} onChange={e => setSuperAccInput(e.target.value)} placeholder="輸入帳號" autoFocus /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">管理員密碼</label><input type="password" className="w-full border-2 border-gray-300 rounded-lg p-2 text-center text-xl tracking-[0.2em] font-sans focus:border-yellow-500 outline-none" value={superPwdInput} onChange={e => setSuperPwdInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSuperAuthSubmit()} placeholder="輸入密碼" /></div>
                                </div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t">
                                    <button onClick={() => {setShowSuperAuthModal(false); setSuperAccInput(''); setSuperPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                    <button onClick={handleSuperAuthSubmit} className="px-6 py-2 bg-yellow-500 text-gray-900 rounded font-bold shadow hover:bg-yellow-400 transition">驗證登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pwdErrorModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] p-4">
                            <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full transform transition-all border-l-4 border-red-500">
                                <div className="flex items-center text-red-500 mb-4"><i className="fa-solid fa-triangle-exclamation text-3xl mr-2"></i><h3 className="font-bold text-lg">存取失敗</h3></div>
                                <p className="text-gray-600 mb-6 font-bold">密碼錯誤，請重新輸入以驗證您的身份。</p>
                                <button onClick={() => setPwdErrorModal(false)} className="w-full bg-gray-900 text-white py-2 rounded-lg font-bold hover:bg-gray-700 transition">我知道了</button>
                            </div>
                        </div>
                    )}

                    {superAuthErrorModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[130] p-4">
                            <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full transform transition-all border-l-4 border-red-600 border-t-2 border-r-2 border-b-2">
                                <div className="flex items-center text-red-600 mb-4"><i className="fa-solid fa-ban text-3xl mr-3"></i><h3 className="font-black text-xl tracking-wider">權限驗證失敗</h3></div>
                                <p className="text-gray-700 mb-6 font-bold leading-relaxed">您輸入的最高權限帳號或密碼不正確。<br/><span className="text-sm text-gray-500 font-normal mt-1 block">請重新確認後再試一次。</span></p>
                                <button onClick={() => setSuperAuthErrorModal(false)} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition shadow-md">返回重新輸入</button>
                            </div>
                        </div>
                    )}

                    {fullScreenMode && (
                        <button onClick={() => setFullScreenMode(false)} className="fixed bottom-6 right-6 bg-red-600 text-white px-5 py-3 rounded-full shadow-2xl font-bold z-[100] hover:bg-red-700 border-2 border-white flex items-center no-print">
                            <i className="fa-solid fa-compress mr-2"></i>結束整頁模式
                        </button>
                    )}

                    <header className="px-4 py-2 border-b bg-white flex justify-between items-center shrink-0 shadow-sm relative z-10 hide-in-fullscreen">
                        <h1 className="text-xl font-black text-gray-800 tracking-tight"><span className="text-blue-600 mr-1">{loggedInGroup}</span>12生肖戰報</h1>
                        <button onClick={() => setShowSuperAuthModal(true)} className="bg-gray-900 text-yellow-500 px-3 py-1 rounded text-xs font-bold shadow hover:bg-gray-800 transition"><i className="fa-solid fa-key mr-1"></i>權限登入</button>
                    </header>

                    <nav className="flex overflow-x-auto border-b bg-white shrink-0 hide-scroll text-sm relative z-10 hide-in-fullscreen">
                        <button onClick={() => switchTab('night')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'night' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-moon mr-1 text-gray-700"></i>夜班</button>
                        <button onClick={() => switchTab('morning')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'morning' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-sun mr-1 text-orange-500"></i>早班</button>
                        <button onClick={() => switchTab('evening')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'evening' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-cloud-sun mr-1 text-indigo-500"></i>晚班</button>
                        <button onClick={() => switchTab('summary')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'summary' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-layer-group mr-1 text-green-600"></i>三班累加</button>
                        <button onClick={() => switchTab('audit')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'audit' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-clipboard-check mr-1 text-red-600"></i>稽核</button>
                        <button onClick={() => switchTab('trend')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'trend' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-chart-line mr-1 text-purple-600"></i>趨勢圖表</button>
                        <button onClick={() => switchTab('settings')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'settings' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-gear mr-1 text-gray-500"></i>店長設定</button>
                        <button onClick={() => setShowPwdModal(true)} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-blue-200 ${activeTab === 'hr' ? 'tab-active !border-b-blue-600 !text-blue-800' : 'text-blue-600 hover:bg-blue-50'}`}><i className="fa-solid fa-user-shield mr-1"></i>領航員/績效改善</button>
                        {isSuperAdmin && (
                            <button onClick={() => switchTab('admin')} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-red-200 ${activeTab === 'admin' ? 'tab-active !border-b-red-600 !text-red-700 bg-red-50' : 'text-red-500 hover:bg-red-50'}`}><i className="fa-solid fa-crown mr-1"></i>權限管理</button>
                        )}
                    </nav>

                    <main className={`flex-1 ${fullScreenMode ? 'print-mode' : 'overflow-hidden'}`}>
                        {activeTab === 'night' && <div className="p-2 h-full overflow-hidden"><ShiftComponent shiftKey="night" shiftName="夜班" icon="fa-moon" colorClass="text-gray-800" bgColorClass="bg-gray-800" database={database} safeInputDate={safeInputDate} setInputDate={setInputDate} handleShiftChange={handleShiftChange} settings={settings} /></div>}
                        {activeTab === 'morning' && <div className="p-2 h-full overflow-hidden"><ShiftComponent shiftKey="morning" shiftName="早班" icon="fa-sun" colorClass="text-orange-600" bgColorClass="bg-orange-500" database={database} safeInputDate={safeInputDate} setInputDate={setInputDate} handleShiftChange={handleShiftChange} settings={settings} /></div>}
                        {activeTab === 'evening' && <div className="p-2 h-full overflow-hidden"><ShiftComponent shiftKey="evening" shiftName="晚班" icon="fa-cloud-sun" colorClass="text-indigo-600" bgColorClass="bg-indigo-500" database={database} safeInputDate={safeInputDate} setInputDate={setInputDate} handleShiftChange={handleShiftChange} settings={settings} /></div>}
                        {activeTab === 'summary' && <div className="p-2 h-full overflow-hidden"><SummaryComponent database={database} safeInputDate={safeInputDate} settings={settings} /></div>}
                        {activeTab === 'audit' && <div className="p-2 h-full overflow-hidden"><AuditComponent database={database} safeInputDate={safeInputDate} settings={settings} timeSlots={timeSlots} setInputDate={setInputDate} handleShiftChange={handleShiftChange} handleSlotChange={handleSlotChange} /></div>}
                        {activeTab === 'trend' && <div className="p-2 h-full overflow-hidden"><TrendComponent database={database} safeInputDate={safeInputDate} setInputDate={setInputDate} settings={settings} /></div>}
                        {activeTab === 'settings' && <div className="p-2 h-full overflow-hidden"><SettingsComponent settings={settings} handleSettingChange={handleSettingChange} timeSlots={timeSlots} newSlotName={newSlotName} setNewSlotName={setNewSlotName} handleAddSlot={handleAddSlot} handleDeleteSlot={handleDeleteSlot} /></div>}
                        {activeTab === 'hr' && <HrComponent hrAuthUnlocked={hrAuthUnlocked} hrEmployees={hrEmployees} selectedStore={selectedStore} setSelectedStore={setSelectedStore} selectedEmpId={selectedEmpId} setSelectedEmpId={setSelectedEmpId} newEmpId={newEmpId} setNewEmpId={setNewEmpId} newEmpName={newEmpName} setNewEmpName={setNewEmpName} hrFormTab={hrFormTab} setHrFormTab={setHrFormTab} setFullScreenMode={setFullScreenMode} handleAddHrEmployee={handleAddHrEmployee} handleDeleteHrEmployee={handleDeleteHrEmployee} setEditEmpData={setEditEmpData} setIsEditMode={setIsEditMode} setShowEmpModal={setShowEmpModal} handleHrFieldChange={handleHrFieldChange} renderSignBox={renderSignBox} />}
                        {activeTab === 'admin' && <AdminComponent isSuperAdmin={isSuperAdmin} systemUsers={systemUsers} saveToFirebase={saveToFirebase} />}
                        
                        {/* 模態框等在最上層，若開啟簽名版也需放在這裡 */}
                        {showEmpModal && (
                            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
                                    <div className="bg-blue-600 text-white p-4 font-bold flex justify-between">
                                        <span>{isEditMode ? '編輯人員資料' : '新增系統人員'}</span>
                                        <button onClick={() => setShowEmpModal(false)}><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <form onSubmit={handleSaveHrEmployee} className="p-6 space-y-4">
                                        <div><label className="block text-xs font-bold text-gray-500 mb-1">所屬店別</label><input required value={editEmpData.storeName} onChange={e => setEditEmpData({...editEmpData, storeName: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 中清店" /></div>
                                        <div><label className="block text-xs font-bold text-gray-500 mb-1">人員編號</label><input required value={editEmpData.id} onChange={e => setEditEmpData({...editEmpData, id: e.target.value})} disabled={isEditMode} className="w-full border p-2 rounded outline-none focus:border-blue-500 disabled:bg-gray-100" placeholder="例: E001" /></div>
                                        <div><label className="block text-xs font-bold text-gray-500 mb-1">人員姓名</label><input required value={editEmpData.name} onChange={e => setEditEmpData({...editEmpData, name: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 王小明" /></div>
                                        <div className="pt-4 flex justify-end gap-3 border-t">
                                            <button type="button" onClick={() => setShowEmpModal(false)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                            <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認儲存</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {sigModal.isOpen && (
                            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[400px]">
                                    <div className="bg-blue-800 text-white p-4 font-bold flex justify-between items-center">
                                        <span><i className="fa-solid fa-pen-nib mr-2"></i>電子簽名板</span>
                                        <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="text-white/80 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                                    </div>
                                    <div className="flex-1 bg-gray-50 relative m-4 border-2 border-dashed border-gray-300 rounded-lg overflow-hidden cursor-crosshair">
                                        <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} style={{ touchAction: 'none' }} className="w-full h-full" />
                                    </div>
                                    <div className="p-4 border-t bg-gray-50 flex justify-between gap-3">
                                        <button onClick={clearCanvas} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition border border-gray-300">清除重簽</button>
                                        <div className="flex gap-2">
                                            <button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button>
                                            <button onClick={saveSignature} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認存檔</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Caught exception:", error, errorInfo); this.setState({ errorInfo }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', fontFamily: 'sans-serif', background: '#fee2e2', color: '#991b1b', height: '100vh', overflow: 'auto' }}>
                            <h2 style={{ fontWeight: 'bold', fontSize: '20px' }}>系統發生未預期錯誤</h2>
                            <pre style={{ background: '#fff', padding: '10px', marginTop: '10px', border: '1px solid #f87171', borderRadius: '4px', fontSize: '12px', whiteSpace: 'pre-wrap' }}>{this.state.error && this.state.error.toString()}{'\n'}{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '20px', padding: '10px 20px', background: '#dc2626', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}>重新載入</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
