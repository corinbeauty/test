        const firebaseConfig = {
            apiKey: "AIzaSyB6XN-DEpUi4L9jETKpZWZhVrQw7tV4M5E",
            authDomain: "akpi-e0698.firebaseapp.com",
            projectId: "akpi-e0698",
            storageBucket: "akpi-e0698.firebasestorage.app",
            messagingSenderId: "446898815193",

        const app = initializeApp(firebaseConfig);

        /* HR Forms Styles */
        .hr-form-container { width: 100%; max-width: 1000px; margin: 0 auto; background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        /* 簽名版樣式優化 */
        .sign-box { border: 1px dashed #94a3b8; border-radius: 4px; min-height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; color: #94a3b8; overflow: hidden; width: 100%; position: relative; }

        .form-section-title { padding: 4px 10px !important; margin-bottom: 4px !important; font-size: 0.85rem !important; font-weight: bold; color: white;}
        textarea.auto-expand { width: 100%; height: 100%; min-height: 60px; resize: none; background: transparent; border: none; outline: none; white-space: pre-wrap; word-break: break-all; font-size: 0.75rem; }

        /* PDF 預覽 / 列印模式 */

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯+週邊商品', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 10, color: 'rgb(251, 146, 60)' },
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 10, color: '#8B4513' },
            { id: 'setMeal', name: '套餐', type: 'count', unit: '單數', defaultRate: 12, defaultScore: 10, color: 'rgb(74, 222, 128)' },
            { id: 'fascia', name: '筋膜刀', type: 'amount', unit: '金額', defaultRate: 7, defaultScore: 10, color: 'rgb(248, 113, 113)' },
            { id: 'review', name: '評論', type: 'count', unit: '則數', defaultRate: 10, defaultScore: 10, color: 'rgb(96, 165, 250)' },
            { id: 'app', name: '會員APP', type: 'count', unit: '單數', defaultRate: 6, defaultScore: 5, color: 'rgb(167, 139, 250)' }
        ];

        const DEFAULT_TIME_SLOTS = [
            { id: 'ts_00_08', label: '00-08 時段' },
            { id: 'ts_08_16', label: '08-16 時段' },
            { id: 'ts_12_21', label: '12-21 時段' },
            { id: 'ts_15_00', label: '15-00 時段' }
        ];

        const PILOT_ITEMS = [ { phase: '配對階段', no: 1, item: '指定領航員', desc: '已指派合適領航員並告知雙方職責', std: '報到當日完成配對' } ];

        // 12生肖戰報固定設定
        const ZODIAC_ITEMS = [
            { id: 1, name: '業績管理', weight: 10, icon: 'fa-chart-line', color: 'text-orange-600', points: '• 每日業績目標設定與追蹤\n• 業績達成檢討與改善行動\n• 業績報表準確與回報' },
            { id: 2, name: '商品銷售', weight: 15, icon: 'fa-cart-shopping', color: 'text-blue-500', points: '• 主推商品積極銷售\n• 滴雞精/湯品銷售推廣\n• 商品庫存與銷售分析' },
            { id: 3, name: '筋膜推廣', weight: 10, icon: 'fa-person-running', color: 'text-blue-700', points: '• 筋膜主動介紹\n• 成交率提升與追蹤\n• 師傅話術落實與檢核' },
            { id: 4, name: '套餐銷售', weight: 10, icon: 'fa-gift', color: 'text-blue-400', points: '• 套餐話術落實\n• 套餐銷售數量提升\n• 顧客回購與滿意度' },
            { id: 5, name: '人力管理', weight: 10, icon: 'fa-users', color: 'text-orange-500', points: '• 新人關懷與輔導\n• 員工出勤與排班管理\n• 離職預警與留人措施' },
            { id: 6, name: '粉專/社群', weight: 5, icon: 'fa-thumbs-up', color: 'text-orange-400', points: '• 每週發文3篇以上\n• 互動回應與粉絲增加\n• 短影音/活動分享' },
            { id: 7, name: '訪談與輔導', weight: 5, icon: 'fa-comments', color: 'text-gray-500', points: '• 員工與師傅訪談\n• 新人/績效輔導紀錄\n• 訪談表完整填寫' },
            { id: 8, name: 'Google評論', weight: 10, icon: 'fa-google', color: 'text-red-500', points: '• 五星評論增加\n• 負評即時回覆處理\n• 評論內容改善追蹤' },
            { id: 9, name: 'APP會員', weight: 5, icon: 'fa-mobile-screen', color: 'text-blue-600', points: '• 新會員招募\n• 會員回訪與互動\n• 會員成長數追蹤' },
            { id: 10, name: '客訴管理', weight: 10, icon: 'fa-headset', color: 'text-indigo-800', points: '• 客訴即時處理\n• 處理流程符合SOP\n• 改善措施與追蹤' },
            { id: 11, name: '銷貨管理', weight: 5, icon: 'fa-clipboard-check', color: 'text-teal-600', points: '• 銷貨成本管控\n• 銷貨與使用差異管控\n• 現金/刷卡帳款一致' },
            { id: 12, name: '庫存管理', weight: 5, icon: 'fa-box', color: 'text-yellow-700', points: '• 定期盤點執行\n• 庫存數量管控\n• 效期商品管理' }
        ];

        function App() {
            // === 統一把所有狀態放在最頂層，絕不寫在條件判斷內 ===
            const [activeTab, setActiveTab] = useState('night');
            const getTodayStr = () => { const today = new Date(); return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`; };
            const todayStr = getTodayStr();
            const [selectedDate, setSelectedDate] = useState(todayStr); 
            const [inputDate, setInputDate] = useState(todayStr);       
            const [database, setDatabase] = useState({});
            const safeInputDate = inputDate || todayStr;

            // 趨勢與累加狀態
            const [summaryRange, setSummaryRange] = useState('currentMonth');
            const [summaryRangeStart, setSummaryRangeStart] = useState(todayStr.substring(0, 8) + '01');
            const [summaryRangeEnd, setSummaryRangeEnd] = useState(todayStr);
            const [summaryWeek, setSummaryWeek] = useState(() => {
                const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
            });
            const [trendFilter, setTrendFilter] = useState('all');
            const [trendPeriodType, setTrendPeriodType] = useState('month');
            const [visibleChart, setVisibleChart] = useState(ITEM_CONFIG[0].id);
            const chartRef = useRef(null);

            // 設定與時段
            const [settings, setSettings] = useState(ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: { rate: item.defaultRate, score: item.defaultScore } }), {}));
            const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
            const [newSlotName, setNewSlotName] = useState('');

            // HR & 安全驗證狀態
            const [hrAuthUnlocked, setHrAuthUnlocked] = useState(false);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [pwdErrorModal, setPwdErrorModal] = useState(false); 
            const [pwdInput, setPwdInput] = useState('');
            const [fullScreenMode, setFullScreenMode] = useState(false);
            const [hrEmployees, setHrEmployees] = useState({});
            
            // 員工管理 States
            const [selectedStore, setSelectedStore] = useState(''); 
            const [selectedEmpId, setSelectedEmpId] = useState(''); 
            const [newEmpId, setNewEmpId] = useState('');
            const [newEmpName, setNewEmpName] = useState('');
            const [hrFormTab, setHrFormTab] = useState('form4'); // 預設跳到生肖戰報
            const [zodiacPeriodType, setZodiacPeriodType] = useState('week'); // 生肖表週/月切換
            const [zodiacPeriodValue, setZodiacPeriodValue] = useState(summaryWeek); // 儲存選擇的週/月字串
            
            // Modal States
            const [showEmpModal, setShowEmpModal] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [editEmpData, setEditEmpData] = useState({ id: '', name: '', storeName: '' });
            const [sigModal, setSigModal] = useState({ isOpen: false, fieldPath: '' });
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            // Admin States
            const [isSuperAdmin, setIsSuperAdmin] = useState(false);
            const [showSuperAuthModal, setShowSuperAuthModal] = useState(false);
            const [superAuthErrorModal, setSuperAuthErrorModal] = useState(false); 
            const [superAccInput, setSuperAccInput] = useState('');
            const [superPwdInput, setSuperPwdInput] = useState('');
            const [systemUsers, setSystemUsers] = useState([]);
            const [loggedInGroup, setLoggedInGroup] = useState('中清店');
            const [editUser, setEditUser] = useState(null);
            const [manageUserModal, setManageUserModal] = useState(false);

            // PDF 模式綁定
            useEffect(() => {
                if (fullScreenMode) document.body.classList.add('pdf-mode');
                else document.body.classList.remove('pdf-mode');
            }, [fullScreenMode]);

            const switchTab = (tabName) => {
                if (tabName !== 'hr') { setHrAuthUnlocked(false); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); setFullScreenMode(false); }
                if (tabName !== 'admin') setIsSuperAdmin(false);
                setActiveTab(tabName);
            };

            const handlePwdSubmit = () => {
                if (pwdInput === '8888') { setHrAuthUnlocked(true); setActiveTab('hr'); setShowPwdModal(false); setPwdInput(''); setPwdErrorModal(false); } 
                else { setPwdErrorModal(true); setPwdInput(''); }
            };

            const handleSuperAuthSubmit = () => {
                if (superAccInput === '信吉' && superPwdInput === '7310168888') {
                    setIsSuperAdmin(true); setLoggedInGroup('總部最高權限'); setActiveTab('admin'); setShowSuperAuthModal(false); setSuperAccInput(''); setSuperPwdInput(''); setSuperAuthErrorModal(false);
                } else { setSuperAuthErrorModal(true); setSuperPwdInput(''); }
            };

            useEffect(() => {
                const initFb = async () => {
                    if (!window.fb) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.fb;
                    try { await signInAnonymously(auth); } catch (err) {}

                    onAuthStateChanged(auth, user => {
                        window.firebaseUser = user;
                        if (!user) return;
                        const appId = 'akpi-e0698';
                        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                        const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
                        const hrRef = collection(db, 'artifacts', appId, 'public', 'data', 'hr_employees');
                        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'system_users');

                        onSnapshot(recordsRef, snap => { const newDb = {}; snap.forEach(d => newDb[d.id] = d.data()); setDatabase(newDb); });
                        onSnapshot(settingsRef, snap => {
                            snap.forEach(d => {
                                if (d.id === "global") {
                                    const data = d.data();
                                    if (data.rates) setSettings(prev => ({ ...prev, ...data.rates }));
                                    if (data.timeSlots && Array.isArray(data.timeSlots)) setTimeSlots(data.timeSlots);
                                }
                            });
                        });
                        onSnapshot(hrRef, snap => {
                            const newHr = {}; 
                            snap.forEach(d => { const data = d.data(); if(!data.isDeleted) newHr[d.id] = data; }); 
                            setHrEmployees(newHr);
                        });
                        onSnapshot(usersRef, snap => {
                            const users = []; snap.forEach(d => users.push({ id: d.id, ...d.data() })); setSystemUsers(users);
                        });
                    });
                };
                if (window.fb) initFb();
                else window.addEventListener('firebase-ready', initFb);
                return () => window.removeEventListener('firebase-ready', initFb);
            }, []);

            const saveToFirebase = (collectionName, docId, dataToMerge, isMerge = true) => {
                if (window.fb && window.firebaseUser) {
                    const { db, doc, setDoc } = window.fb;
                    const docRef = doc(db, 'artifacts', 'akpi-e0698', 'public', 'data', collectionName, docId);
                    setDoc(docRef, dataToMerge, { merge: isMerge }).catch(e => console.error("DB Write Error:", e));
                }
            };

            const getCurrentShiftData = (date, shift) => {
                if (database[date] && database[date][shift]) return database[date][shift];
                const emptyData = { customers: '', revenue: '' };
                ITEM_CONFIG.forEach(item => emptyData[item.id] = '');
                if (shift === 'manager') emptyData.slots = {}; 
                return emptyData;
            };

            const handleShiftChange = (shift, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { morning: getCurrentShiftData(safeInputDate, 'morning'), evening: getCurrentShiftData(safeInputDate, 'evening'), night: getCurrentShiftData(safeInputDate, 'night'), manager: getCurrentShiftData(safeInputDate, 'manager') };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = getCurrentShiftData(safeInputDate, 'manager');
                    newDb[safeInputDate][shift] = { ...newDb[safeInputDate][shift], [field]: parsedValue };
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSlotChange = (slotId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setDatabase(prev => {
                    const newDb = { ...prev };
                    if (!newDb[safeInputDate]) newDb[safeInputDate] = { manager: getCurrentShiftData(safeInputDate, 'manager') };
                    if (!newDb[safeInputDate].manager) newDb[safeInputDate].manager = getCurrentShiftData(safeInputDate, 'manager');
                    if (!newDb[safeInputDate].manager.slots) newDb[safeInputDate].manager.slots = {};
                    if (!newDb[safeInputDate].manager.slots[slotId]) newDb[safeInputDate].manager.slots[slotId] = {};
                    newDb[safeInputDate].manager.slots[slotId][field] = parsedValue;
                    saveToFirebase('records', safeInputDate, newDb[safeInputDate]);
                    return newDb;
                });
            };

            const handleSettingChange = (itemId, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                setSettings(prev => {
                    const newSettings = { ...prev, [itemId]: { ...prev[itemId], [field]: parsedValue } };
                    saveToFirebase('settings', 'global', { rates: newSettings });
                    return newSettings;
                });
            };

            const handleAddSlot = () => {
                if (!newSlotName.trim()) return;
                const newSlots = [...timeSlots, { id: 'ts_' + Date.now(), label: newSlotName.trim() }];
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots }); setNewSlotName('');
            };

            const handleDeleteSlot = (idToRemove) => {
                const newSlots = timeSlots.filter(s => s.id !== idToRemove);
                setTimeSlots(newSlots); saveToFirebase('settings', 'global', { timeSlots: newSlots });
            };

            // === 日期與輔助邏輯 ===
            const getDatesFromPeriod = (type, value) => {
                if (!value) return [];
                const dates = [];
                if (type === 'week') {
                    const parts = value.split('-W');
                    if (parts.length === 2) {
                        const year = parseInt(parts[0], 10); const week = parseInt(parts[1], 10);
                        const jan4 = new Date(year, 0, 4); const dayOffset = jan4.getDay() || 7;
                        const mon = new Date(year, 0, 4 - dayOffset + 1 + (week - 1) * 7);
                        for(let i=0; i<7; i++) {
                            const d = new Date(mon); d.setDate(mon.getDate() + i);
                            dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                        }
                    }
                } else if (type === 'month') {
                    const parts = value.split('-');
                    if(parts.length === 2) {
                        const y = parseInt(parts[0]); const m = parseInt(parts[1]);
                        const days = new Date(y, m, 0).getDate();
                        for(let i=1; i<=days; i++) { dates.push(`${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`); }
                    }
                }
                return dates;
            };

            const calculateTarget = (baseData, itemId) => {
                if (!baseData) return 0;
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
                const rate = settings[itemId] && settings[itemId].rate ? Number(settings[itemId].rate) : 0;
                return Math.ceil(baseValue * (rate / 100));
            };

            const calcMetrics = (target, actualValue) => {
                const actual = Number(actualValue) || 0;
                const gap = actual - target;
                const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
                return { gap, achieveRate, gapRate };
            };

            // === 員工操作邏輯 ===
            const handleAddHrEmployee = () => {
                if (!selectedStore) { alert("請先從左方選擇店別！或點擊「完整新增」建立新店別與員工。"); return; }
                if (!newEmpId.trim() || !newEmpName.trim()) { alert("請輸入完整的員工編號與姓名！"); return; }
                if (hrEmployees[newEmpId]) { alert("此員工編號已存在！"); return; }
                
                const newEmp = {
                    id: newEmpId,
                    name: newEmpName,
                    storeName: selectedStore,
                    form4: {}
                };
                saveToFirebase('hr_employees', newEmpId, newEmp);
                setNewEmpId(''); setNewEmpName('');
                setSelectedEmpId(newEmpId);
            };

            const handleSaveHrEmployee = (e) => {
                e.preventDefault();
                if (!editEmpData.storeName.trim() || !editEmpData.id.trim() || !editEmpData.name.trim()) {
                    alert("請填寫完整的店別、員工編號與姓名！"); return;
                }

                if (!clientX || !clientY) return;
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';

                const targetMonth = parseInt(maxDateStr.substring(5, 7)) || (new Date().getMonth() + 1);
                const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
                let pastWeekdayRev = 0, pastWeekdayCount = 0, pastWeekendRev = 0, pastWeekendCount = 0, futureWeekdayCount = 0, futureWeekendCount = 0;
                const boundaryDateStr = maxDateStr > todayStr ? todayStr : maxDateStr;

                for (let i = 1; i <= daysInMonth; i++) {

                    const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;
                    if (dStr <= boundaryDateStr) {
                        let dayRev = 0;
                        if (database[dStr]) {

                let avgWeekend = pastWeekendCount > 0 ? pastWeekendRev / pastWeekendCount : 0;

                timeSlots.forEach(slot => {
                    totalHc += slotsData[slot.id] && slotsData[slot.id].hc ? Number(slotsData[slot.id].hc) : 0;
                    sumSlotRevenue += slotsData[slot.id] && slotsData[slot.id].rev ? Number(slotsData[slot.id].rev) : 0;
                });
                const managerRev = Number(managerData.revenue) || 0;
                const dailyEfficiency = totalHc > 0 ? Math.round(managerRev / totalHc) : 0;

                let totalEarnedScore = 0, maxPossibleScore = 0;
                const performanceScores = ITEM_CONFIG.map(item => {
                    const target = calculateTarget(managerData, item.id);
                    const actual = Number(managerData[item.id]) || 0;
                    const maxScore = settings[item.id] && settings[item.id].score ? Number(settings[item.id].score) : 0;
                    let earned = target > 0 ? Math.min(maxScore, (actual / target) * maxScore) : (actual > 0 ? maxScore : 0);
                    totalEarnedScore += earned; maxPossibleScore += maxScore;
                    return { ...item, target, actual, earned, maxScore };
                });

                return (
                    <div className="bg-white p-4 rounded shadow border border-gray-200 h-full overflow-y-auto text-sm hide-scroll">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                            <h2 className="text-lg font-bold text-red-700"><i className="fa-solid fa-clipboard-check mr-2"></i>店長日結稽核</h2>
                            <div className="flex items-center">
                                <label className="text-gray-600 mr-1 font-semibold text-xs">稽核日期:</label>
                                <input type="date" value={safeInputDate} onChange={(e) => setInputDate(e.target.value)} className="p-0.5 border rounded shadow-sm outline-none text-xs text-red-800 font-bold" />
                            </div>
                        </div>

                        <div className="bg-blue-50/50 border border-blue-200 rounded p-3 mb-4">
                            <div className="flex justify-between items-end border-b border-blue-200 pb-2 mb-3">
                                <h3 className="font-bold text-blue-800 text-sm"><i className="fa-solid fa-users-gear mr-1"></i>各時段產值與人效獨立分析</h3>
                                <div className="text-[10px] text-gray-500 bg-white px-2 py-0.5 rounded border">時段業績加總: <span className="font-bold text-gray-700">${sumSlotRevenue.toLocaleString()}</span></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
                                {timeSlots.map(slot => {
                                    const hc = slotsData[slot.id] && slotsData[slot.id].hc ? Number(slotsData[slot.id].hc) : 0;
                                    const rev = slotsData[slot.id] && slotsData[slot.id].rev ? Number(slotsData[slot.id].rev) : 0;
                                    const eff = hc > 0 ? Math.round(rev / hc) : rev; 
                                    return (
                                        <div key={slot.id} className="bg-white p-2 rounded border border-blue-100 shadow-sm flex flex-col relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                            <div className="text-xs text-blue-800 font-bold mb-2 pl-2">{slot.label}</div>
                                            <div className="grid grid-cols-2 gap-2 mb-2 pl-2">
                                                <div>
                                                    <div className="text-[10px] text-gray-400 mb-0.5">人數 (HC)</div>
                                                    <input type="number" step="0.5" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-gray-700 bg-gray-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].hc !== undefined) ? slotsData[slot.id].hc : ''} onChange={(e) => handleSlotChange(slot.id, 'hc', e.target.value)} />
                                                </div>
                                                <div>
                                                    <div className="text-[10px] text-gray-400 mb-0.5">時段產值 ($)</div>
                                                    <input type="number" min="0" placeholder="0" className="w-full text-center border rounded p-1 outline-none font-bold text-blue-700 bg-blue-50 focus:bg-white" value={(slotsData[slot.id] && slotsData[slot.id].rev !== undefined) ? slotsData[slot.id].rev : ''} onChange={(e) => handleSlotChange(slot.id, 'rev', e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="bg-emerald-50 rounded p-1.5 flex justify-between items-center pl-2 ml-2 border border-emerald-100">
                                                <span className="text-[10px] text-emerald-700">時段人效</span><span className="font-black text-emerald-600 text-sm">${eff.toLocaleString()}</span>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="flex items-center justify-between bg-blue-600 text-white p-2 rounded shadow-sm">
                                <div><span className="text-xs opacity-80 block">單日總出勤人力</span><span className="text-xl font-black">{totalHc} <span className="text-sm font-normal">人</span></span></div>
                                <div className="text-right border-l border-blue-400 pl-4"><span className="text-xs opacity-80 block">單日平均人效 (以日結總業績計)</span><span className="text-xl font-black">${dailyEfficiency.toLocaleString()}</span></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4 items-start">
                            <div className="bg-purple-50/50 border border-purple-200 rounded p-3 flex flex-col h-full">
                                <h3 className="font-bold text-purple-800 mb-2 text-sm border-b border-purple-200 pb-1"><i className="fa-solid fa-ranking-star mr-1"></i>今日綜合績效指標</h3>
                                <div className="flex-1 overflow-y-auto hide-scroll text-xs">
                                    {performanceScores.map(score => (
                                        <div key={`score-${score.id}`} className="flex justify-between items-center border-b border-purple-100 py-1">
                                            <span className="text-gray-700 w-1/3">{score.name}</span><span className="text-gray-400 w-1/3 text-center text-[10px]">達標: {score.actual}/{score.target}</span><span className="font-bold text-purple-700 w-1/3 text-right">{score.earned.toFixed(1)} <span className="text-gray-400 font-normal text-[10px]">/ {score.maxScore}</span></span>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-2 pt-2 border-t border-purple-300 flex justify-between items-end"><span className="font-bold text-purple-900">總項得分</span><span className="text-2xl font-black text-purple-700">{totalEarnedScore.toFixed(1)} <span className="text-sm font-normal text-gray-500">/ {maxPossibleScore} 分</span></span></div>
                            </div>
                            <div className="bg-white border rounded shadow-sm p-2 flex flex-col h-full">
                                <p className="text-[10px] text-gray-500 mb-2 bg-red-50 p-1.5 rounded border border-red-100"><i className="fa-solid fa-circle-info mr-1"></i>系統自動比對三班輸入總和，紅字代表異常或漏KEY。</p>
                                <div className="overflow-x-auto hide-scroll flex-1">
                                    <table className="w-full text-xs border-collapse">
                                        <thead><tr className="bg-gray-100 text-gray-700"><th className="p-1.5 border text-left">項目</th><th className="p-1.5 border text-right">系統加總</th><th className="p-1.5 border text-center bg-red-50 text-red-700">日結輸入</th><th className="p-1.5 border text-right">差異</th></tr></thead>
                                        <tbody>
                                            {auditItems.map(item => {
                                                const sysSum = getSystemSum(item.id);
                                                const managerVal = managerData[item.id];
                                                const hasInput = managerVal !== undefined && managerVal !== '';
                                                const diff = hasInput ? (Number(managerVal) || 0) - sysSum : null;
                                                let diffDisplay = '-'; let diffColor = 'text-gray-300';
                                                if (hasInput) { if (diff === 0) { diffDisplay = '相符'; diffColor = 'text-green-600 bg-green-50'; } else { diffDisplay = diff > 0 ? `+${diff}` : diff; diffColor = 'text-red-600 bg-red-50 font-bold'; } }
                                                return (
                                                    <tr key={item.id} className="border-b hover:bg-gray-50">
                                                        <td className="p-1.5 font-bold text-gray-700">{item.name}</td>
                                                        <td className="p-1.5 text-right text-gray-500">{item.isAmount ? '$' : ''}{sysSum.toLocaleString()}</td>
                                                        <td className="p-1 text-center bg-red-50/30 w-[80px]"><input type="number" className="w-full p-1 border border-red-300 rounded text-right text-xs text-red-800 font-bold outline-none" value={managerVal !== undefined ? managerVal : ''} onChange={(e) => handleShiftChange('manager', item.id, e.target.value)} /></td>
                                                        <td className={`p-1.5 text-right ${diffColor}`}>{diffDisplay}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const getMonthlyTrendData = () => {
                const dates = getDatesFromPeriod(trendPeriodType, trendPeriodType === 'month' ? safeInputDate.substring(0,7) : summaryWeek);
                const trendData = { dates: dates, dailyTotals: {}, cumulative: {}, shiftBreakdown: {}, chartDatasets: [] };
                const currentCumulative = { customers: 0, revenue: 0 };
                const currentShiftBreakdown = { morning: { customers: 0, revenue: 0 }, evening: { customers: 0, revenue: 0 }, night: { customers: 0, revenue: 0 } };
                
                ITEM_CONFIG.forEach(i => { currentCumulative[i.id] = 0; currentShiftBreakdown.morning[i.id] = 0; currentShiftBreakdown.evening[i.id] = 0; currentShiftBreakdown.night[i.id] = 0; });

                dates.forEach(date => {
                    let hasData = false;
                    const dayData = { customers: 0, revenue: 0 };
                    ITEM_CONFIG.forEach(i => dayData[i.id] = 0);
                    
                    const shiftsToProcess = trendFilter === 'all' ? ['morning', 'evening', 'night'] : [trendFilter];
                    if (database[date]) {
                        shiftsToProcess.forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                const values = [sData.customers, sData.revenue, ...ITEM_CONFIG.map(i => sData[i.id])];
                                if (values.some(v => v !== '' && v !== undefined && v !== null)) hasData = true;
                                dayData.customers += Number(sData.customers) || 0;
                                dayData.revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => dayData[i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                        ['morning', 'evening', 'night'].forEach(shift => {
                            if (database[date][shift]) {
                                const sData = database[date][shift];
                                currentShiftBreakdown[shift].customers += Number(sData.customers) || 0;
                                currentShiftBreakdown[shift].revenue += Number(sData.revenue) || 0;
                                ITEM_CONFIG.forEach(i => currentShiftBreakdown[shift][i.id] += Number(sData[i.id]) || 0);
                            }
                        });
                    }

                    trendData.dailyTotals[date] = hasData ? dayData : null;
                    if (hasData) {
                        currentCumulative.customers += dayData.customers;
                        currentCumulative.revenue += dayData.revenue;
                        ITEM_CONFIG.forEach(i => currentCumulative[i.id] += dayData[i.id]);
                    }
                    trendData.cumulative[date] = JSON.parse(JSON.stringify(currentCumulative));
                    trendData.shiftBreakdown[date] = JSON.parse(JSON.stringify(currentShiftBreakdown));
                });

                ITEM_CONFIG.forEach(item => {
                    if(item.id === visibleChart) {
                        const dataPoints = dates.map(date => trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : null);
                        trendData.chartDatasets.push({ label: item.name, data: dataPoints, borderColor: item.color, backgroundColor: item.color, tension: 0.3, fill: false, borderWidth: 2, pointRadius: 2, spanGaps: true });
                    }
                });
                return trendData;
            };

            useEffect(() => {
                if (activeTab !== 'trend' || typeof Chart === 'undefined') return;
                const trendData = getMonthlyTrendData();
                const ctx = document.getElementById('trendChart');
                if (ctx) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels: trendData.dates.map(d => trendPeriodType === 'week' ? d.substring(5).replace('-','/') : parseInt(d.substring(8)).toString()), datasets: trendData.chartDatasets },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'top', labels: { boxWidth: 8, font: { size: 9 } } } },
                            scales: { 
                                y: { beginAtZero: true, ticks: { font: { size: 9 } } }, 
                                x: { ticks: { font: { size: 9 }, color: (ctx) => {
                                    if (ctx.tick && ctx.tick.label) {
                                        const dateStr = trendPeriodType === 'week' ? `${safeInputDate.substring(0,4)}/${ctx.tick.label}` : `${safeInputDate.substring(0, 7)}-${ctx.tick.label.toString().padStart(2, '0')}`.replace(/-/g, '/');
                                        const d = new Date(dateStr);
                                        if (d.getDay() === 0 || d.getDay() === 6) return '#ef4444';
                                    }
                                    return '#64748b';
                                }}} 
                            }
                        }
                    });
                }
                return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
            }, [activeTab, database, trendFilter, trendPeriodType, summaryWeek, settings, visibleChart, safeInputDate]);

            const renderTrendTab = () => {
                const trendData = getMonthlyTrendData();
                const dates = trendData.dates;
                const lastDateWithData = [...dates].reverse().find(d => trendData.cumulative[d] && trendData.cumulative[d].customers > 0) || dates[dates.length - 1];
                const latestCumulative = lastDateWithData ? trendData.cumulative[lastDateWithData] : null;
                const latestBreakdown = lastDateWithData ? trendData.shiftBreakdown[lastDateWithData] : null;

                const renderRankings = (itemId) => {
                    if (!latestBreakdown || trendFilter !== 'all') return null; 
                    const getShiftMetrics = (shiftKey) => {
                        const actual = latestBreakdown[shiftKey][itemId] || 0;
                        const target = calculateTarget(latestBreakdown[shiftKey], itemId);
                        return target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                    };
                    const rankings = [
                        { shift: '早', rate: getShiftMetrics('morning'), actual: latestBreakdown.morning[itemId] || 0, color: 'text-orange-500' },
                        { shift: '晚', rate: getShiftMetrics('evening'), actual: latestBreakdown.evening[itemId] || 0, color: 'text-blue-500' },
                        { shift: '夜', rate: getShiftMetrics('night'), actual: latestBreakdown.night[itemId] || 0, color: 'text-gray-800' }
                    ];
                    rankings.sort((a, b) => b.rate - a.rate);
                    let currentRank = 1;
                    for (let i = 0; i < rankings.length; i++) {
                        if (i > 0 && rankings[i].rate < rankings[i-1].rate) currentRank = i + 1;
                        rankings[i].rank = rankings[i].rate === 0 && rankings[i].actual === 0 ? '-' : currentRank;
                    }
                    return (
                        <div className="mt-1 pt-1 border-t border-purple-200 flex flex-col gap-[2px]">
                            {rankings.map((d, i) => (
                                <div key={i} className="flex justify-between items-center text-[10px] leading-none">
                                    <span className={`${d.color} font-bold`}>{d.shift}</span>
                                    <div className="flex items-center gap-0.5">
                                        {d.rank === 1 ? <i className="fa-solid fa-crown text-yellow-500 text-[9px]"></i> : d.rank === 2 ? <i className="fa-solid fa-medal text-gray-400 text-[9px]"></i> : d.rank === 3 ? <i className="fa-solid fa-award text-amber-700 text-[9px]"></i> : <span className="w-[9px]"></span>}
                                        <span className="font-bold text-gray-700">{d.rate}% <span className="text-[8px] font-normal text-gray-400">({d.actual})</span></span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full gap-1.5 text-sm overflow-y-auto hide-scroll pb-2">
                        <div className="bg-white p-1.5 rounded shadow border border-purple-200 shrink-0">
                            <div className="flex justify-between items-center mb-1 border-b pb-1">
                                <h2 className="text-sm font-bold text-purple-800 flex items-center">
                                    <i className="fa-solid fa-calendar-check mr-1"></i>
                                    區間累計戰報 
                                    <span className="text-gray-500 text-xs ml-2 font-normal">
                                        ({trendPeriodType === 'month' ? safeInputDate.substring(0,7) : summaryWeek} 累計至 {lastDateWithData})
                                    </span>
                                </h2>
                                <div className="flex items-center gap-2">
                                    <select value={trendPeriodType} onChange={(e) => setTrendPeriodType(e.target.value)} className="border rounded text-xs p-0.5 bg-gray-50 font-bold outline-none">
                                        <option value="month">看整月</option>
                                        <option value="week">看單週</option>
                                    </select>
                                    {trendPeriodType === 'month' ? 
                                        <input type="month" value={safeInputDate.substring(0,7)} onChange={(e) => setInputDate(`${e.target.value}-01`)} className="p-0.5 border rounded text-xs bg-gray-50 outline-none" /> :
                                        <input type="week" value={summaryWeek} onChange={(e) => setSummaryWeek(e.target.value)} className="p-0.5 border rounded text-xs bg-gray-50 outline-none" />
                                    }
                                    <div className="flex bg-gray-100 rounded overflow-hidden text-[10px]">
                                        {['all', 'morning', 'evening', 'night'].map(f => (
                                            <button key={f} onClick={() => setTrendFilter(f)} className={`px-2 py-0.5 ${trendFilter === f ? 'bg-purple-500 text-white font-bold' : 'text-gray-600 hover:bg-gray-200'}`}>
                                                {f === 'all' ? '全部累計' : f === 'morning' ? '早班' : f === 'evening' ? '晚班' : '夜班'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            {latestCumulative && (
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-1 mt-2">
                                    {ITEM_CONFIG.map(item => {
                                        const totalTarget = calculateTarget(latestCumulative, item.id);
                                        const totalActual = latestCumulative[item.id];
                                        const { gap, achieveRate, gapRate } = calcMetrics(totalTarget, totalActual);
                                        const isGood = gap >= 0;
                                        return (
                                            <div key={`cumul-${item.id}`} className="bg-purple-50 p-1 rounded border border-purple-100 text-center flex flex-col justify-between">
                                                <div className="font-bold text-gray-700 text-[10px]">{item.name}</div>
                                                <div className="text-[9px] text-gray-500">目標: {totalTarget}</div>
                                                <div className="text-sm font-black text-purple-700">{totalActual}</div>
                                                <div className={`text-[9px] font-bold ${isGood ? 'text-green-600' : 'text-red-500'} leading-tight scale-90`}>達:{achieveRate}% / 差:{gapRate > 0 ? `+${gapRate}%` : `${gapRate}%`}</div>
                                                {renderRankings(item.id)}
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="bg-white rounded shadow border border-gray-200 overflow-hidden flex flex-col shrink-0">
                            <h3 className="font-bold text-gray-700 p-1 bg-gray-50 border-b text-xs"><i className="fa-solid fa-table mr-1"></i>期間明細</h3>
                            <div className="overflow-x-auto hide-scroll p-1 w-full">
                                <table className="w-full text-center border-collapse text-[10px]">
                                    <thead>
                                        <tr>
                                            <th className="p-0.5 px-1 bg-gray-800 text-white border sticky left-0 z-10 min-w-[50px]">項目 \ 日期</th>
                                            {dates.map(date => {
                                                const d = new Date(date.replace(/-/g, '/'));
                                                const displayDate = trendPeriodType === 'week' ? date.substring(5).replace('-','/') : parseInt(date.substring(8));
                                                return <th key={date} className={`p-0.5 border min-w-[22px] ${d.getDay() === 0 || d.getDay() === 6 ? 'text-red-500 bg-red-50' : 'bg-gray-100'}`}>{displayDate}</th>
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="p-0.5 bg-gray-50 font-bold border sticky left-0 z-10 text-left pl-1">來客數</td>
                                            {dates.map(date => <td key={`cust-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date].customers : ''}</td>)}
                                        </tr>
                                        {ITEM_CONFIG.map(item => (
                                            <tr key={`row-${item.id}`}>
                                                <td className="p-0.5 bg-white font-semibold border sticky left-0 z-10 text-left pl-1" style={{color: item.color}}>{item.name}</td>
                                                {dates.map(date => <td key={`${item.id}-${date}`} className="p-0.5 border text-gray-700">{trendData.dailyTotals[date] ? trendData.dailyTotals[date][item.id] : ''}</td>)}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="bg-white p-1 rounded shadow border border-gray-200 flex flex-col min-h-[250px] shrink-0">
                            <div className="flex flex-wrap gap-2 mb-1 px-1 justify-center border-b pb-1">
                                {ITEM_CONFIG.map(item => (
                                    <label key={`rad-${item.id}`} className="flex items-center text-[10px] cursor-pointer">
                                        <input type="radio" checked={visibleChart === item.id} onChange={() => setVisibleChart(item.id)} className="mr-0.5" />
                                        <span style={{color: item.color}} className="font-bold">{item.name}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="relative flex-1 w-full"><canvas id="trendChart"></canvas></div>
                        </div>
                    </div>
                );
            };

            const renderSettings = () => {
                const totalScore = ITEM_CONFIG.reduce((sum, item) => sum + (Number(settings[item.id]?.score) || 0), 0);

                return (
                    <div className="flex flex-col md:flex-row h-full gap-4 text-sm overflow-hidden">
                        <div className="w-full md:w-1/2 bg-white p-4 rounded shadow border border-gray-200 overflow-y-auto hide-scroll">
                            <h2 className="text-lg font-bold text-gray-800 mb-2"><i className="fa-solid fa-gear mr-2 text-gray-500"></i>各項指標設定</h2>
                            <p className="text-xs text-gray-500 mb-4">設定各項目的目標轉換率(%)與配分。設定後連動全系統計算。</p>
                            <table className="w-full text-left border-collapse text-xs">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="p-2 border">指標項目</th>
                                        <th className="p-2 border">佔比 (%)</th>
                                        <th className="p-2 border">得分</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {ITEM_CONFIG.map(item => (
                                        <tr key={item.id} className="hover:bg-gray-50">
                                            <td className="p-2 border font-semibold">{item.name} <div className="text-[10px] text-gray-400">{item.type === 'amount' ? '當班業績' : '當班來客'}</div></td>
                                            <td className="p-2 border">
                                                <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                    value={(settings[item.id] && settings[item.id].rate !== undefined) ? settings[item.id].rate : ''} 
                                                    onChange={(e) => handleSettingChange(item.id, 'rate', e.target.value)} /> %
                                            </td>
                                            <td className="p-2 border">
                                                <input type="number" className="p-1 border rounded w-16 text-center outline-none" 
                                                    value={(settings[item.id] && settings[item.id].score !== undefined) ? settings[item.id].score : ''} 
                                                    onChange={(e) => handleSettingChange(item.id, 'score', e.target.value)} /> 分
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot>
                                    <tr className="bg-blue-50 font-bold">
                                        <td colSpan="2" className="p-2 border text-right">總分累計：</td>
                                        <td className="p-2 border text-center text-blue-700">{totalScore} 分</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <div className="w-full md:w-1/2 bg-blue-50/30 p-4 rounded shadow border border-blue-200 overflow-y-auto hide-scroll">
                            <h2 className="text-lg font-bold text-blue-800 mb-2"><i className="fa-solid fa-clock mr-2"></i>排班時段管理</h2>
                            <p className="text-xs text-gray-500 mb-4">在此新增或刪除稽核用的排班時段。這些時段將顯示於「店長稽核」分頁，供輸入各時段產值與人數。</p>
                            
                            <div className="flex gap-2 mb-4">
                                <input type="text" placeholder="輸入新時段名稱 (例: 10-14 時段)" 
                                    className="flex-1 p-2 border border-blue-300 rounded outline-none focus:ring-1 focus:ring-blue-500 text-sm"
                                    value={newSlotName} onChange={(e) => setNewSlotName(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleAddSlot()} />
                                <button onClick={handleAddSlot} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"><i className="fa-solid fa-plus mr-1"></i>新增</button>
                            </div>

                            <div className="space-y-2">
                                {timeSlots.map((slot, idx) => (
                                    <div key={slot.id} className="flex justify-between items-center bg-white p-2.5 rounded border shadow-sm">
                                        <div className="font-bold text-gray-700"><span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-xs mr-2">{idx + 1}</span>{slot.label}</div>
                                        <button onClick={() => handleDeleteSlot(slot.id)} className="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded transition text-xs">
                                            <i className="fa-solid fa-trash-can mr-1"></i>刪除
                                        </button>
                                    </div>
                                ))}
                                {timeSlots.length === 0 && <div className="text-center text-gray-400 py-4">目前沒有設定任何時段</div>}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderHrTab = () => {
                if (!hrAuthUnlocked) return <div className="p-4 text-center text-red-500 mt-10 font-bold">拒絕存取：請由導覽列重新驗證密碼。</div>;
                const availableStores = [...new Set(Object.values(hrEmployees).map(emp => emp.storeName).filter(Boolean))];
                const empsInStore = Object.values(hrEmployees).filter(emp => emp.storeName === selectedStore);
                const currentEmp = hrEmployees[selectedEmpId] || null;

                const renderHrForm4 = (emp) => {
                    const fData = emp.form4 || {};
                    const periodKey = zodiacPeriodValue || 'default';
                    const periodData = fData[periodKey] || { items: {}, summary: {}, sign: {} };
                    const dates = getDatesFromPeriod(zodiacPeriodType, zodiacPeriodValue);
                    const dStart = dates[0] ? dates[0].replace(/-/g,'/') : '';
                    const dEnd = dates[dates.length-1] ? dates[dates.length-1].replace(/-/g,'/') : '';

                    const chg = (path, val) => handleHrFieldChange(emp.id, 'form4', `${periodKey}.${path}`, val);

                    // 自動帶入營運數據 & 計算邏輯
                    const autoSyncData = () => {
                        let sumRev = 0, sumCust = 0, sumProducts = 0, sumFascia = 0, sumSet = 0, sumReview = 0, sumApp = 0;
                        dates.forEach(d => {
                            if(database[d]) {
                                ['morning', 'evening', 'night'].forEach(shift => {
                                    if(database[d][shift]) {
                                        const s = database[d][shift];
                                        sumRev += Number(s.revenue)||0;
                                        sumCust += Number(s.customers)||0;
                                        sumProducts += (Number(s.chickenSoup)||0) + (Number(s.essence)||0) + (Number(s.setMeal)||0);
                                        sumFascia += Number(s.fascia)||0;
                                        sumSet += Number(s.setMeal)||0;
                                        sumReview += Number(s.review)||0;
                                        sumApp += Number(s.app)||0;
                                    }
                                });
                            }
                        });
                        
                        const updates = {
                            1: { text: `實際業績: $${sumRev.toLocaleString()}`, rate: sumRev > 0 ? 100 : 0 },
                            2: { text: `實際商品銷售: ${sumProducts}`, rate: sumProducts > 0 ? 100 : 0 },
                            3: { text: `筋膜實績: ${sumFascia}`, rate: sumFascia > 0 ? 100 : 0 },
                            4: { text: `套餐實績: ${sumSet}`, rate: sumSet > 0 ? 100 : 0 },
                            8: { text: `Google評論實績: ${sumReview}`, rate: sumReview > 0 ? 100 : 0 },
                            9: { text: `APP會員實績: ${sumApp}`, rate: sumApp > 0 ? 100 : 0 },
                        };

                        Object.keys(updates).forEach(itemId => {
                            chg(`items.${itemId}.actualText`, updates[itemId].text);
                            updateRateAndScore(itemId, updates[itemId].rate);
                        });
                        alert('已成功將該區間的營運數據帶入對應欄位，請手動檢視/調整達成率！');
                    };

                    const updateRateAndScore = (itemId, newRate) => {
                        const rateNum = Number(newRate) || 0;
                        const weight = ZODIAC_ITEMS.find(i => i.id === Number(itemId)).weight;
                        const score = Number(((rateNum / 100) * weight).toFixed(2));
                        const maxScore = Math.min(score, weight); // 最高不超過配分
                        chg(`items.${itemId}.rate`, rateNum);
                        chg(`items.${itemId}.score`, maxScore);
                    };

                    // 自動計算總結
                    let totalScore = 0;
                    ZODIAC_ITEMS.forEach(i => {
                        const itemScore = Number(periodData.items?.[i.id]?.score) || 0;
                        totalScore += itemScore;
                    });
                    const achieveRate = totalScore; // 總分100，所以分數即達成率%
                    const level = totalScore >= 90 ? '優秀' : totalScore >= 80 ? '良好' : totalScore >= 60 ? '合格' : '待改善';

                    return (
                        <div className="hr-form-container text-gray-800 bg-white">
                            <div className="text-center py-4 border-b-2 border-red-600 mb-2 relative">
                                <h1 className="text-3xl font-bold text-blue-900 tracking-[0.2em]">12生肖績效檢討表</h1>
                                <p className="text-red-600 font-bold mt-2 tracking-widest text-sm">落實執行 ． 追蹤管理 ． 持續改善 ． 提升營運績效</p>
                            </div>

                            <div className="flex justify-between items-end px-4 mb-2 text-sm font-bold border-b border-gray-300 pb-2 hide-in-fullscreen">
                                <div className="flex items-center gap-4">
                                    <span>店名: <span className="text-blue-700 ml-1 border-b px-2">{emp.storeName}</span></span>
                                    <span>店長: <span className="text-blue-700 ml-1 border-b px-2">{emp.name}</span></span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={autoSyncData} className="bg-yellow-500 text-yellow-900 px-3 py-1 rounded text-xs hover:bg-yellow-400 transition shadow-sm border border-yellow-600">
                                        <i className="fa-solid fa-bolt mr-1"></i>自動帶入營運數據
                                    </button>
                                    <div className="flex items-center bg-gray-100 p-1 rounded">
                                        <label className="mr-2 cursor-pointer flex items-center text-xs"><input type="radio" checked={zodiacPeriodType==='week'} onChange={()=>setZodiacPeriodType('week')} className="mr-1"/>週</label>
                                        <label className="mr-2 cursor-pointer flex items-center text-xs"><input type="radio" checked={zodiacPeriodType==='month'} onChange={()=>setZodiacPeriodType('month')} className="mr-1"/>月</label>
                                        {zodiacPeriodType === 'week' ? 
                                            <input type="week" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/> : 
                                            <input type="month" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/>
                                        }
                                    </div>
                                    <span className="text-xs text-blue-800 bg-blue-50 px-2 py-1 rounded border border-blue-200">
                                        期間：{dStart} ~ {dEnd}
                                    </span>
                                </div>
                            </div>
                            
                            {/* 列印專用 Header */}
                            <div className="hidden print:flex justify-between items-end px-4 mb-2 text-sm font-bold border-b-2 border-red-600 pb-2 mt-4">
                                <div className="flex gap-8">
                                    <span>店名： <span className="text-blue-900 border-b border-gray-400 inline-block w-24 text-center">{emp.storeName}</span></span>
                                    <span>店長： <span className="text-blue-900 border-b border-gray-400 inline-block w-24 text-center">{emp.name}</span></span>
                                </div>
                                <div>
                                    檢討期間：<span className="mx-1">{zodiacPeriodType==='week' ? '☑ 週  ☐ 月' : '☐ 週  ☑ 月'}</span> 
                                    <span className="text-blue-900 ml-2">({dStart} ~ {dEnd})</span>
                                </div>
                            </div>

                            <div className="px-2">
                                <table className="w-full text-center border-collapse border-2 border-blue-900 text-xs shadow-sm">
                                    <thead>
                                        <tr className="bg-blue-900 text-white font-bold tracking-widest">
                                            <th className="p-2 border border-blue-800 w-[5%]">項次</th>
                                            <th className="p-2 border border-blue-800 w-[12%]">檢核項目</th>
                                            <th className="p-2 border border-blue-800 w-[20%] text-left pl-4">檢核重點內容</th>
                                            <th className="p-2 border border-blue-800 w-[23%] text-left pl-4">執行標準<br/><span className="text-[10px] font-normal opacity-80">(達成實績)</span></th>
                                            <th className="p-2 border border-blue-800 w-[5%]">配分</th>
                                            <th className="p-2 border border-blue-800 w-[6%] leading-tight">店長<br/>自評</th>
                                            <th className="p-2 border border-blue-800 w-[6%] leading-tight">總監<br/>覆評</th>
                                            <th className="p-2 border border-blue-800 w-[23%]">建議改善事項</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white">
                                        {ZODIAC_ITEMS.map((item, index) => {
                                            const iData = periodData.items?.[item.id] || {};
                                            return (
                                                <tr key={item.id} className="border-b border-gray-300 hover:bg-gray-50 transition-colors group">
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-700">{item.id}</td>
                                                    <td className="p-2 border-r border-gray-300 font-bold">
                                                        <div className={`flex items-center justify-center gap-2 ${item.color}`}>
                                                            <i className={`fa-solid ${item.icon} text-lg w-5`}></i>
                                                            <span className="text-sm tracking-widest">{item.name}</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 border-r border-gray-300 text-left text-[11px] font-semibold text-gray-700 whitespace-pre-wrap leading-relaxed tracking-wide align-middle">
                                                        {item.points}
                                                    </td>
                                                    <td className="p-1 border-r border-gray-300 relative align-top h-[75px]">
                                                        <textarea 
                                                            className="auto-expand" 
                                                            placeholder="填寫實績或文字說明..." 
                                                            value={iData.actualText||''} 
                                                            onChange={e=>chg(`items.${item.id}.actualText`, e.target.value)}
                                                        ></textarea>
                                                        <div className="absolute bottom-1 right-1 flex items-center text-[10px] bg-white/90 px-1 py-0.5 rounded border border-gray-200 shadow-sm opacity-50 group-hover:opacity-100 transition-opacity print:opacity-100">
                                                            <span className="font-bold text-blue-800 mr-1">達成率:</span>
                                                            <input type="number" className="w-10 text-center font-bold text-blue-600 bg-transparent outline-none border-b border-blue-300 mr-0.5" value={iData.rate!==undefined?iData.rate:''} onChange={e=>updateRateAndScore(item.id, e.target.value)} placeholder="0"/>%
                                                        </div>
                                                    </td>
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-800 text-sm">{item.weight}</td>
                                                    <td className="p-1 border-r border-gray-300 align-middle">
                                                        <input type="number" className="w-full text-center font-black text-blue-700 bg-transparent outline-none text-sm" value={iData.score!==undefined?iData.score:''} onChange={e=>chg(`items.${item.id}.score`, e.target.value)} placeholder="0"/>
                                                    </td>
                                                    <td className="p-1 border-r border-gray-300 align-middle">
                                                        <input type="number" className="w-full text-center font-bold text-gray-700 bg-transparent outline-none text-sm" value={iData.dirScore!==undefined?iData.dirScore:''} onChange={e=>chg(`items.${item.id}.dirScore`, e.target.value)}/>
                                                    </td>
                                                    <td className="p-1 border-gray-300 align-top h-[75px]">
                                                        <textarea className="auto-expand" placeholder="輸入建議改善事項..." value={iData.note||''} onChange={e=>chg(`items.${item.id}.note`, e.target.value)}></textarea>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        
                                        <tr className="bg-[#eef2ff] border-t-2 border-blue-900">
                                            <td colSpan="4" className="text-right p-2 font-bold text-gray-700 border-r border-gray-300">
                                                <div className="mb-2">平均分數：</div>
                                                <div>達成率：</div>
                                            </td>
                                            <td colSpan="2" className="p-2 text-center border-r border-gray-300 font-black text-lg text-blue-800 tracking-wider">
                                                <div className="mb-1 border-b border-blue-200 pb-1">{totalScore.toFixed(2)} <span className="text-xs font-normal">/ 100 分</span></div>
                                                <div className="text-red-600">{achieveRate.toFixed(2)}%</div>
                                            </td>
                                            <td colSpan="2" className="p-2 text-left font-bold text-gray-700 align-top relative">
                                                <div className="bg-white px-2 py-1 rounded shadow-sm border border-blue-100 h-full flex flex-col">
                                                    <div className="border-b border-blue-100 pb-1 mb-1 text-center text-[#1e3a8a]">本月亮點與改善重點</div>
                                                    <div className="flex-1 flex flex-col gap-1">
                                                        <div className="flex items-start">
                                                            <span className="w-12 text-[#1e3a8a] shrink-0 mt-0.5">亮點:</span>
                                                            <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[30px]" value={periodData.summary?.highlight||''} onChange={e=>chg('summary.highlight', e.target.value)}></textarea>
                                                        </div>
                                                        <div className="flex items-start border-t border-dashed border-gray-200 pt-1">
                                                            <span className="w-16 text-red-700 shrink-0 mt-0.5">改善重點:</span>
                                                            <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[30px]" value={periodData.summary?.improve||''} onChange={e=>chg('summary.improve', e.target.value)}></textarea>
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr className="bg-[#eef2ff] border-t border-blue-200">
                                            <td colSpan="2" className="text-center font-bold text-gray-700 border-r border-gray-300 py-3">
                                                總分計算
                                            </td>
                                            <td colSpan="2" className="text-left font-bold text-gray-700 border-r border-gray-300 py-3 pl-4 flex flex-col justify-center h-full">
                                                <div className="flex items-center gap-2">等級評估：</div>
                                            </td>
                                            <td colSpan="4" className="text-left p-3 border-none flex items-center justify-around h-full font-bold">
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='優秀'} readOnly/><span className={level==='優秀'?'text-blue-700':''}>優秀(90分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='良好'} readOnly/><span className={level==='良好'?'text-green-700':''}>良好(80-89分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='合格'} readOnly/><span className={level==='合格'?'text-amber-600':''}>合格(60-79分以上)</span></label>
                                                <label className="cursor-pointer flex items-center"><input type="checkbox" className="scale-125 mr-2" checked={level==='待改善'} readOnly/><span className={level==='待改善'?'text-red-600':''}>待改善(未達60分)</span></label>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                <div className="mt-4 flex justify-between items-end pb-4 font-bold text-gray-800 text-sm">
                                    <div className="flex-1 flex items-end">
                                        <span className="w-20 tracking-widest shrink-0">店長簽名:</span>
                                        <div className="w-48 border-b border-gray-400 mx-2 pb-1 relative h-12">
                                            {renderSignBox('', 'form4.'+periodKey+'.sign.mgr', emp, "border-none bg-transparent !min-h-0")}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex items-end justify-center">
                                        <span className="w-20 tracking-widest shrink-0">總監簽名:</span>
                                        <div className="w-48 border-b border-gray-400 mx-2 pb-1 relative h-12">
                                            {renderSignBox('', 'form4.'+periodKey+'.sign.dir', emp, "border-none bg-transparent !min-h-0")}
                                        </div>
                                    </div>
                                    <div className="flex items-end">
                                        <span className="shrink-0 tracking-widest">評核日期:</span>
                                        <input type="date" className="border-b border-gray-400 ml-2 outline-none text-center bg-transparent font-bold w-32" value={periodData.sign?.date||''} onChange={e=>chg('sign.date', e.target.value)}/>
                                    </div>
                                </div>
                                <div className="text-center text-[10px] text-gray-500 font-bold mb-4">
                                    ★ 說明：請<span className="text-red-600">店長每週或每月自評後由總監覆評</span>，針對未達成項目擬定改善計畫並持續追蹤，確保各項管理目標落實執行。
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full bg-gray-50 overflow-hidden relative">
                        <div className="bg-white border-b px-4 py-2 flex justify-between items-center shrink-0 shadow-sm hide-in-fullscreen relative z-20">
                            <div className="flex items-center gap-4">
                                <h2 className="text-blue-800 font-bold flex items-center whitespace-nowrap"><i className="fa-solid fa-user-shield mr-2"></i>人事管理系統</h2>
                                <div className="flex items-center gap-2">
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold bg-blue-50 text-blue-800" value={selectedStore} onChange={(e) => { setSelectedStore(e.target.value); setSelectedEmpId(''); }}>
                                        <option value="">-- 選擇店別 --</option>
                                        {availableStores.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} disabled={!selectedStore}>
                                        <option value="">-- 選擇員工 --</option>
                                        {empsInStore.map(emp => <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-2 items-center">
                                {currentEmp && (
                                    <>
                                        <button onClick={() => { setEditEmpData({ id: currentEmp.id, name: currentEmp.name, storeName: currentEmp.storeName }); setIsEditMode(true); setShowEmpModal(true); }} className="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700 transition"><i className="fa-solid fa-pen mr-1"></i>編輯</button>
                                        <button onClick={handleDeleteHrEmployee} className="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700 transition"><i className="fa-solid fa-trash-can mr-1"></i>刪除</button>
                                    </>
                                )}
                                <input type="text" placeholder="編號" className="border rounded px-2 py-1 text-sm w-16" value={newEmpId} onChange={e => setNewEmpId(e.target.value)} />
                                <input type="text" placeholder="姓名" className="border rounded px-2 py-1 text-sm w-24" value={newEmpName} onChange={e => setNewEmpName(e.target.value)} />
                                <button onClick={handleAddHrEmployee} className="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition whitespace-nowrap"><i className="fa-solid fa-plus mr-1"></i>快速新增</button>
                                <button onClick={() => { setEditEmpData({ id: '', name: '', storeName: selectedStore }); setIsEditMode(false); setShowEmpModal(true); }} className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700 transition whitespace-nowrap"><i className="fa-solid fa-user-plus mr-1"></i>完整新增</button>
                            </div>
                        </div>

                        {currentEmp ? (
                            <div className="flex-1 flex flex-col overflow-hidden fullscreen-container">
                                <div className="flex bg-gray-100 border-b shrink-0 text-xs font-bold hide-in-fullscreen">
                                    <button onClick={() => setHrFormTab('form4')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form4' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>12生肖戰報</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 relative z-10 hide-scroll bg-gray-50 fullscreen-container">
                                    <div className="flex justify-end mb-2 hide-in-fullscreen max-w-[1000px] mx-auto">
                                        <button onClick={() => setFullScreenMode(true)} className="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow hover:bg-gray-700 transition font-bold"><i className="fa-regular fa-file-pdf mr-1"></i> 列印預覽 / 截圖模式</button>
                                    </div>
                                    <div className="w-full max-w-[1000px] mx-auto pb-20">
                                        {hrFormTab === 'form4' && renderHrForm4(currentEmp)}
