                if (type === 'week') {
                    const parts = value.split('-W');
                    if (parts.length === 2) {
                        const year = parseInt(parts[0], 10); const week = parseInt(parts[1], 10);
                        const jan4 = new Date(year, 0, 4); const dayOffset = jan4.getDay() || 7;
                        const mon = new Date(year, 0, 4 - dayOffset + 1 + (week - 1) * 7);
                        for(let i=0; i<7; i++) {
                            const d = new Date(mon); d.setDate(mon.getDate() + i);
                            dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                        }
                    }
                } else if (type === 'month') {
                    const parts = value.split('-');
                    if(parts.length === 2) {
                        const y = parseInt(parts[0]); const m = parseInt(parts[1]);
                        const days = new Date(y, m, 0).getDate();
                        for(let i=1; i<=days; i++) { dates.push(`${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`); }
                    }
                }
                return dates;
            };

            const calculateTarget = (baseData, itemId) => {
                if (!baseData) return 0;
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(baseData.revenue) || 0) : (Number(baseData.customers) || 0);
                const rate = settings[itemId] && settings[itemId].rate ? Number(settings[itemId].rate) : 0;
                return Math.ceil(baseValue * (rate / 100));
            };

            const calcMetrics = (target, actualValue) => {
                const actual = Number(actualValue) || 0;
                const gap = actual - target;
                const achieveRate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                const gapRate = target > 0 ? Math.round((gap / target) * 100) : 0;
                return { gap, achieveRate, gapRate };
            };

            const handleHrFieldChange = (empId, formType, fieldPath, value) => {
                setHrEmployees(prev => {
                    const empData = prev[empId];
                    if (!empData) return prev;
                    const updatedEmp = JSON.parse(JSON.stringify(empData));
                    const keys = fieldPath.split('.');
                    let current = updatedEmp;
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!current[keys[i]]) current[keys[i]] = {};
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                    saveToFirebase('hr_employees', empId, updatedEmp);
                    return { ...prev, [empId]: updatedEmp };
                });
            };

            const handleHrMultipleFieldsChange = (empId, updatesArray) => {
                setHrEmployees(prev => {
                    const empData = prev[empId];
                    if (!empData) return prev;
                    const updatedEmp = JSON.parse(JSON.stringify(empData));
                    updatesArray.forEach(({ path, value }) => {
                        const keys = path.split('.');
                        let current = updatedEmp;
                        for (let i = 0; i < keys.length - 1; i++) {
                            if (!current[keys[i]]) current[keys[i]] = {};
                            current = current[keys[i]];
                        }
                        current[keys[keys.length - 1]] = value;
                    });
                    saveToFirebase('hr_employees', empId, updatedEmp);
                    return { ...prev, [empId]: updatedEmp };
                });
            };

            // 員工管理
            const handleAddHrEmployee = () => {
                if (!selectedStore) { alert("請先從左方選擇店別！"); return; }
                if (!newEmpId.trim() || !newEmpName.trim()) { alert("請輸入完整的員工編號與姓名！"); return; }
                if (hrEmployees[newEmpId]) { alert("此員工編號已存在！"); return; }
                const newEmp = {
                    id: newEmpId, name: newEmpName, storeName: selectedStore,
                    form1: { rows: {}, summary: {} }, form2: { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }, form3: { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} }
                };
                saveToFirebase('hr_employees', newEmpId, newEmp); setNewEmpId(''); setNewEmpName(''); setSelectedEmpId(newEmpId);
            };

            const handleSaveHrEmployee = (e) => {
                e.preventDefault();
                if (!editEmpData.storeName.trim() || !editEmpData.id.trim() || !editEmpData.name.trim()) return;
                if (isEditMode) {
                    const currentEmp = hrEmployees[editEmpData.id];
                    if (currentEmp) saveToFirebase('hr_employees', editEmpData.id, { ...currentEmp, name: editEmpData.name, storeName: editEmpData.storeName });
                } else {
                    if (hrEmployees[editEmpData.id]) { alert("此員工編號已存在！"); return; }
                    saveToFirebase('hr_employees', editEmpData.id, { id: editEmpData.id, name: editEmpData.name, storeName: editEmpData.storeName, form1: { rows: {}, summary: {} }, form2: { phase1: {}, phase2: {}, phase3: {}, phase4: {}, eval: {} }, form3: { basic: {}, interview: {}, fact: '', emp: '', guide: {}, improve: [{},{},{}], track: {}, concl: {} } });
                    setSelectedEmpId(editEmpData.id);
                }
                setSelectedStore(editEmpData.storeName); setShowEmpModal(false); setEditEmpData({ id: '', name: '', storeName: '' });
            };

            const handleDeleteHrEmployee = () => {
                const currentEmp = hrEmployees[selectedEmpId] || null;
                if(!currentEmp) return;
                if(confirm(`確定要永久刪除員工 ${currentEmp.name} 及其所有表單紀錄嗎？這無法復原！`)) {
                    saveToFirebase('hr_employees', currentEmp.id, { isDeleted: true }, false); setSelectedEmpId('');
                }
            };

            // 簽名板
            const startDrawing = (e) => { isDrawingRef.current = true; draw(e); };
            const stopDrawing = () => { isDrawingRef.current = false; if (canvasRef.current) canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawingRef.current || !canvasRef.current) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (!clientX || !clientY) return;
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                ctx.lineTo(x, y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y);
            };
            const clearCanvas = () => { if (canvasRef.current) { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); } };
            const saveSignature = () => {
                if (canvasRef.current && sigModal.fieldPath && selectedEmpId) {
                    const dataUrl = canvasRef.current.toDataURL('image/png');
                    handleHrFieldChange(selectedEmpId, null, sigModal.fieldPath, dataUrl);
                    setSigModal({ isOpen: false, fieldPath: '' });
                }
            };
            const openSignature = (fieldPath) => {
                setSigModal({ isOpen: true, fieldPath });
                setTimeout(() => {
                    if (canvasRef.current) {
                        const canvas = canvasRef.current;
                        const parent = canvas.parentElement;
                        canvas.width = parent.clientWidth;
                        canvas.height = parent.clientHeight;
                    }
                }, 100);
            };

            const renderSignBox = (label, fieldPath, empData, customClass="") => {
                const keys = fieldPath.split('.');
                let val = empData;
                for (let k of keys) { val = val && val[k]; }
                return (
                    <div className="flex flex-col items-center justify-center h-full w-full relative">
                        {label && <div className="text-[10px] text-gray-500 mb-1 z-20">{label}</div>}
                        <div className={`sign-box w-full ${customClass}`} onClick={() => openSignature(fieldPath)}>
                            {val ? <img src={val} className="sign-img" alt="簽名" /> : <span className="sign-placeholder text-[10px]">點擊簽名</span>}
                        </div>
                    </div>
                );
            };

            // 輔助畫面渲染
            const renderShiftTab = (shiftKey, shiftName, icon, colorClass, bgColorClass) => { return <div className="p-4 text-center">各班別輸入畫面 (已省略保持精簡)</div>; };
            const renderSummary = () => { return <div className="p-4 text-center">三班累加畫面 (已省略保持精簡)</div>; };
            const renderAudit = () => { return <div className="p-4 text-center">店長日結稽核畫面 (已省略保持精簡)</div>; };
            const renderTrendTab = () => { return <div className="p-4 text-center">趨勢圖表畫面 (已省略保持精簡)</div>; };
            const renderSettings = () => { return <div className="p-4 text-center">設定畫面 (已省略保持精簡)</div>; };

            const renderHrTab = () => {
                if (!hrAuthUnlocked) return <div className="p-4 text-center text-red-500 mt-10 font-bold">拒絕存取：請由導覽列重新驗證密碼。</div>;
                
                const availableStores = [...new Set(Object.values(hrEmployees).map(emp => emp.storeName).filter(Boolean))];
                const empsInStore = Object.values(hrEmployees).filter(emp => emp.storeName === selectedStore);
                const currentEmp = hrEmployees[selectedEmpId] || null;

                const renderHrForm1 = (emp) => { return <div className="p-4 text-center">領航員表單 (已省略保持精簡)</div>; };
                const renderHrForm2 = (emp) => { return <div className="p-4 text-center">新人關懷表單 (已省略保持精簡)</div>; };
                const renderHrForm3 = (emp) => { return <div className="p-4 text-center">績效改善表單 (已省略保持精簡)</div>; };

                // ==========================================
                // 12生肖績效檢討表 (Form4) - 100% 重構與開放編輯
                // ==========================================
                const renderHrForm4 = (emp) => {
                    const fData = emp.form4 || {};
                    const periodKey = zodiacPeriodValue || 'default';
                    const periodData = fData[periodKey] || { items: {}, summary: {}, sign: {} };
                    const dates = getDatesFromPeriod(zodiacPeriodType, zodiacPeriodValue);
                    const dStart = dates[0] ? dates[0].replace(/-/g,'/') : '';
                    const dEnd = dates[dates.length-1] ? dates[dates.length-1].replace(/-/g,'/') : '';

                    const chg = (path, val) => handleHrFieldChange(emp.id, 'form4', `${periodKey}.${path}`, val);

                    // 在右側文字框輸入時，自動抓取 "達成率：XX%" 計算分數 (純 onChange 事件)
                    const handleNoteChange = (itemId, val) => {
                        chg(`items.${itemId}.note`, val);
                        const match = val.match(/達成率[：:]\s*(\d+(\.\d+)?)%/);
                        if (match) {
                            const rateNum = Number(match[1]);
                            const weight = ZODIAC_ITEMS.find(i => i.id === Number(itemId)).weight;
                            let score = Number(((rateNum / 100) * weight).toFixed(2));
                            if (score > weight) score = weight;
                            chg(`items.${itemId}.score`, score); // 自動幫填店長自評
                        }
                    };

                    const autoSyncData = () => {
                        let sumRev = 0, sumCust = 0, sumProducts = 0, sumFascia = 0, sumSet = 0, sumReview = 0, sumApp = 0;
                        dates.forEach(d => {
                            if(database[d]) {
                                ['morning', 'evening', 'night'].forEach(shift => {
                                    if(database[d][shift]) {
                                        const s = database[d][shift];
                                        sumRev += Number(s.revenue)||0;
                                        sumCust += Number(s.customers)||0;
                                        sumProducts += (Number(s.chickenSoup)||0) + (Number(s.essence)||0) + (Number(s.setMeal)||0);
                                        sumFascia += Number(s.fascia)||0;
                                        sumSet += Number(s.setMeal)||0;
                                        sumReview += Number(s.review)||0;
                                        sumApp += Number(s.app)||0;
                                    }
                                });
                            }
                        });

                        const updatesArray = [];
                        const setUpdate = (id, target, actual) => {
                            const weight = ZODIAC_ITEMS.find(i => i.id === id).weight;
                            const rate = target > 0 ? Math.round((actual / target) * 100) : (actual > 0 ? 100 : 0);
                            let score = Number(((rate / 100) * weight).toFixed(2));
                            if (score > weight) score = weight;
                            // 將自動帶入的數據填寫到最右側的「建議改善事項」欄位中
                            const text = `目標：${target.toLocaleString()}\n實績：${actual.toLocaleString()}\n達成率：${rate}%`;
                            updatesArray.push({ path: `form4.${periodKey}.items.${id}.note`, value: text });
                            updatesArray.push({ path: `form4.${periodKey}.items.${id}.score`, value: score });
                        };

                        setUpdate(1, sumRev, sumRev); 
                        setUpdate(2, calculateTarget({customers: sumCust, revenue: sumRev}, 'chickenSoup') + calculateTarget({customers: sumCust, revenue: sumRev}, 'essence'), sumProducts);
                        setUpdate(3, calculateTarget({customers: sumCust, revenue: sumRev}, 'fascia'), sumFascia);
                        setUpdate(4, calculateTarget({customers: sumCust, revenue: sumRev}, 'setMeal'), sumSet);
                        setUpdate(8, calculateTarget({customers: sumCust, revenue: sumRev}, 'review'), sumReview);
                        setUpdate(9, calculateTarget({customers: sumCust, revenue: sumRev}, 'app'), sumApp);

                        handleHrMultipleFieldsChange(emp.id, updatesArray);
                        setSyncSuccessModal(true);
                    };

                    // 純粹衍生計算，不改變狀態
                    let totalScore = 0;
                    ZODIAC_ITEMS.forEach(i => { totalScore += Number(periodData.items?.[i.id]?.score) || 0; });
                    const achieveRate = totalScore; 
                    const level = totalScore >= 90 ? '優秀' : totalScore >= 80 ? '良好' : totalScore >= 60 ? '合格' : '待改善';

                    return (
                        <div className="hr-form-container text-gray-800 bg-white relative">
                            {/* 標題區 */}
                            <div className="text-center pt-6 pb-2">
                                <h1 className="text-3xl font-bold text-[#000080] tracking-[0.2em] mb-3">12生肖績效檢討表</h1>
                                <p className="text-red-600 font-bold tracking-[0.2em] text-sm">落實執行 ． 追蹤管理 ． 持續改善 ． 提升營運績效</p>
                            </div>
                            <div className="border-t-2 border-red-600 mb-2"></div>

                            {/* 控制與資訊列 */}
                            <div className="flex justify-between items-end px-4 mb-3 text-sm font-bold pb-1">
                                <div className="flex items-center gap-6">
                                    <span className="flex items-end">店名：<div className="w-32 text-center text-blue-900 ml-1">{emp.storeName}</div></span>
                                    <span className="flex items-end">店長：<div className="w-32 text-center text-blue-900 ml-1">{emp.name}</div></span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={autoSyncData} className="hide-in-fullscreen bg-yellow-500 text-yellow-900 px-3 py-1 rounded text-xs hover:bg-yellow-400 transition shadow-sm border border-yellow-600 mr-2">
                                        <i className="fa-solid fa-bolt mr-1"></i>自動帶入營運數據
                                    </button>
                                    <span className="flex items-center text-[#000080]">
                                        檢討期間：
                                        <label className="cursor-pointer mx-1 flex items-center font-bold">
                                            <div className="w-3.5 h-3.5 border-2 border-[#000080] flex items-center justify-center bg-white mr-1" onClick={() => setZodiacPeriodType('week')}>
                                                {zodiacPeriodType === 'week' && <i className="fa-solid fa-check text-[10px] text-[#000080]"></i>}
                                            </div> 週
                                        </label>
                                        <div className="hide-in-fullscreen mx-1">
                                            {zodiacPeriodType === 'week' ? 
                                                <input type="week" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/> : 
                                                <input type="month" value={zodiacPeriodValue} onChange={e=>setZodiacPeriodValue(e.target.value)} className="border p-0.5 text-xs outline-none rounded bg-white"/>
                                            }
                                        </div>
                                        <span>( {dStart} ~ {dEnd} )</span>
                                        <label className="cursor-pointer ml-3 flex items-center font-bold text-gray-700">
                                            <div className="w-3.5 h-3.5 border-2 border-gray-400 flex items-center justify-center bg-white mr-1" onClick={() => setZodiacPeriodType('month')}>
                                                {zodiacPeriodType === 'month' && <i className="fa-solid fa-check text-[10px] text-gray-700"></i>}
                                            </div> 月
                                        </label>
                                    </span>
                                </div>
                            </div>

                            {/* 核心表格 (100% 仿刻圖片藍底白字) */}
                            <div className="px-1 pb-4">
                                <table className="w-full text-center border-collapse border border-[#000080] text-xs shadow-sm">
                                    <thead>
                                        <tr className="bg-[#000080] text-white font-bold tracking-widest h-12">
                                            <th className="p-2 border border-gray-300 w-[4%] align-middle">項次</th>
                                            <th className="p-2 border border-gray-300 w-[10%] align-middle">檢核項目</th>
                                            <th className="p-2 border border-gray-300 w-[20%] text-center align-middle">檢核重點內容</th>
                                            <th className="p-2 border border-gray-300 w-[20%] text-center align-middle leading-tight">執行標準<br/><span className="text-[9px] font-normal opacity-80">(達成指標)</span></th>
                                            <th className="p-2 border border-gray-300 w-[5%] align-middle">配分</th>
                                            <th className="p-2 border border-gray-300 w-[6%] leading-tight align-middle">店長<br/>自評</th>
                                            <th className="p-2 border border-gray-300 w-[6%] leading-tight align-middle">總監<br/>覆評</th>
                                            <th className="p-2 border border-gray-300 w-[29%] text-center align-middle">建議改善事項</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white">
                                        {ZODIAC_ITEMS.map((item, index) => {
                                            const iData = periodData.items?.[item.id] || {};
                                            return (
                                                <tr key={item.id} className="border-b border-gray-300 hover:bg-gray-50 transition-colors">
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-700">{item.id}</td>
                                                    <td className="p-2 border-r border-gray-300 font-bold">
                                                        <div className={`flex items-center justify-center gap-2 ${item.color}`}>
                                                            <i className={`fa-solid ${item.icon} text-lg w-5`}></i>
                                                            <span className="text-sm tracking-widest whitespace-nowrap">{item.name}</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-2 border-r border-gray-300 text-left text-[11px] font-semibold text-gray-700 whitespace-pre-wrap leading-relaxed align-middle">
                                                        {item.points}
                                                    </td>
                                                    <td className="p-2 border-r border-gray-300 text-left align-middle">
                                                        {/* 只顯示純文字提示 */}
                                                        <div className="whitespace-pre-wrap text-[11px] text-gray-800 leading-relaxed font-semibold">
                                                            {EXEC_STANDARDS[item.id]}
                                                        </div>
                                                    </td>
                                                    <td className="p-2 border-r border-gray-300 font-bold text-gray-800 text-sm">{item.weight}</td>
                                                    <td className="p-0 border-r border-gray-300 align-middle">
                                                        {/* 解除 readonly，開放自由編輯 */}
                                                        <input type="number" step="0.1" className="w-full h-full min-h-[60px] text-center font-black text-blue-700 bg-transparent outline-none text-sm placeholder-gray-300" value={iData.score!==undefined?iData.score:''} onChange={e=>chg(`items.${item.id}.score`, e.target.value)} placeholder="-"/>
                                                    </td>
                                                    <td className="p-0 border-r border-gray-300 align-middle">
                                                        {/* 開放自由編輯 */}
                                                        <input type="number" step="0.1" className="w-full h-full min-h-[60px] text-center font-bold text-gray-700 bg-transparent outline-none text-sm placeholder-gray-300" value={iData.dirScore!==undefined?iData.dirScore:''} onChange={e=>chg(`items.${item.id}.dirScore`, e.target.value)} placeholder="-"/>
                                                    </td>
                                                    <td className="p-1 border-gray-300 align-top h-[75px] bg-white">
                                                        {/* 開放自由編輯，並結合自動解析功能 */}
                                                        <textarea className="auto-expand p-1 text-[11px] leading-relaxed text-gray-800 placeholder-gray-300" placeholder="填寫目標/實績/達成率或文字..." value={iData.note||''} onChange={e=>handleNoteChange(item.id, e.target.value)}></textarea>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        
                                        {/* 總計與評估區塊 */}
                                        <tr className="bg-[#f8f9fc] border-t border-gray-300">
                                            <td colSpan="2" rowSpan="3" className="text-center font-bold text-gray-700 border-r border-gray-300 py-3 align-middle bg-white">總分計算</td>
                                            <td colSpan="3" className="text-right p-2 pr-6 font-bold text-gray-600 border-r border-b border-gray-300 align-middle">平均分數：</td>
                                            <td colSpan="2" className="p-2 text-center border-r border-b border-gray-300 font-black text-lg text-[#000080] tracking-wider align-middle bg-white">
                                                {totalScore.toFixed(2)} <span className="text-sm font-bold text-gray-600">/ 100 分</span>
                                            </td>
                                            <td className="p-2 text-center font-bold text-gray-700 align-middle border-b border-gray-300">本月亮點與改善重點</td>
                                        </tr>
                                        <tr className="bg-[#f8f9fc]">
                                            <td colSpan="3" className="text-right p-2 pr-6 font-bold text-gray-600 border-r border-b border-gray-300 align-middle">達成率：</td>
                                            <td colSpan="2" className="p-2 text-center border-r border-b border-gray-300 font-black text-lg text-blue-600 tracking-wider align-middle bg-white">
                                                {achieveRate.toFixed(2)}%
                                            </td>
                                            <td rowSpan="2" className="p-2 text-left font-bold text-gray-700 align-top relative bg-[#f8f9fc]">
                                                <div className="flex flex-col gap-2 h-full">
                                                    <div className="flex items-start">
                                                        <span className="w-12 text-gray-700 shrink-0">亮點：</span>
                                                        <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[40px] text-gray-800" value={periodData.summary?.highlight||''} onChange={e=>chg('summary.highlight', e.target.value)}></textarea>
                                                    </div>
                                                    <div className="flex items-start">
                                                        <span className="w-20 text-gray-700 shrink-0">改善重點：</span>
                                                        <textarea className="flex-1 resize-none bg-transparent outline-none min-h-[40px] text-gray-800" value={periodData.summary?.improve||''} onChange={e=>chg('summary.improve', e.target.value)}></textarea>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr className="bg-[#f8f9fc]">
                                            <td colSpan="3" className="text-right p-2 pr-6 font-bold text-gray-600 border-r border-gray-300 align-top pt-4">等級評估：</td>
                                            <td colSpan="2" className="text-left p-3 border-r border-gray-300 flex flex-col justify-around h-full font-bold bg-white text-gray-700 gap-1 pl-6">
                                                <label className="flex items-center gap-2"><div className="w-3.5 h-3.5 border border-gray-500 flex items-center justify-center">{level==='優秀' && <div className="w-2 h-2 bg-[#000080]"></div>}</div> 優秀(90分以上)</label>
                                                <label className="flex items-center gap-2"><div className="w-3.5 h-3.5 border border-gray-500 flex items-center justify-center">{level==='良好' && <div className="w-2 h-2 bg-[#000080]"></div>}</div> 良好(80-89分以上)</label>
                                                <label className="flex items-center gap-2"><div className="w-3.5 h-3.5 border border-gray-500 flex items-center justify-center bg-blue-100">{level==='合格' && <i className="fa-solid fa-check text-[#000080] text-[10px]"></i>}</div> 合格(60-79分以上)</label>
                                                <label className="flex items-center gap-2"><div className="w-3.5 h-3.5 border border-gray-500 flex items-center justify-center">{level==='待改善' && <div className="w-2 h-2 bg-[#000080]"></div>}</div> 待改善(未達60分)</label>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                {/* 最下層簽名區塊 Flex 排版 */}
                                <div className="mt-8 flex justify-between items-end pb-4 font-bold text-gray-800 text-sm px-6">
                                    <div className="flex items-end w-[30%]">
                                        <span className="shrink-0 tracking-widest text-gray-600">店長簽名：</span>
                                        <div className="flex-1 border-b border-gray-400 ml-2 relative h-10">
                                            {renderSignBox('', `form4.${periodKey}.sign.mgr`, emp, "border-none bg-transparent !min-h-[25px] pb-1")}
                                        </div>
                                    </div>
                                    <div className="flex items-end w-[30%]">
                                        <span className="shrink-0 tracking-widest text-gray-600">總監簽名：</span>
                                        <div className="flex-1 border-b border-gray-400 ml-2 relative h-10">
                                            {renderSignBox('', `form4.${periodKey}.sign.dir`, emp, "border-none bg-transparent !min-h-[25px] pb-1")}
                                        </div>
                                    </div>
                                    <div className="flex items-end w-[25%] justify-end">
                                        <span className="shrink-0 tracking-widest text-gray-600">評核日期：</span>
                                        <input type="text" className="border-b border-gray-400 ml-2 outline-none text-center bg-transparent font-bold flex-1 w-32 pb-0.5 text-gray-800" placeholder="2026/07/13" value={periodData.sign?.date||''} onChange={e=>chg('sign.date', e.target.value)}/>
                                    </div>
                                </div>
                                <div className="text-center text-[10px] text-gray-500 font-bold mb-6 tracking-wide">
                                    ★ 說明：請<span className="text-red-600">店長每週或每月自評後由總監覆評</span>，針對未達成項目擬定改善計畫並持續追蹤，確保各項管理目標落實執行。
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full bg-gray-50 overflow-hidden relative">
                        <div className="bg-white border-b px-4 py-2 flex justify-between items-center shrink-0 shadow-sm hide-in-fullscreen relative z-20">
                            <div className="flex items-center gap-4">
                                <h2 className="text-blue-800 font-bold flex items-center whitespace-nowrap"><i className="fa-solid fa-user-shield mr-2"></i>人事管理系統</h2>
                                <div className="flex items-center gap-2">
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold bg-blue-50 text-blue-800" value={selectedStore} onChange={(e) => { setSelectedStore(e.target.value); setSelectedEmpId(''); }}>
                                        <option value="">-- 選擇店別 --</option>
                                        {availableStores.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <select className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} disabled={!selectedStore}>
                                        <option value="">-- 選擇員工 --</option>
                                        {empsInStore.map(emp => <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-2 items-center">
                                {currentEmp && (
                                    <>
                                        <button onClick={() => { setEditEmpData({ id: currentEmp.id, name: currentEmp.name, storeName: currentEmp.storeName }); setIsEditMode(true); setShowEmpModal(true); }} className="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700 transition"><i className="fa-solid fa-pen mr-1"></i>編輯</button>
                                        <button onClick={handleDeleteHrEmployee} className="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700 transition"><i className="fa-solid fa-trash-can mr-1"></i>刪除</button>
                                    </>
                                )}
                                <input type="text" placeholder="編號" className="border rounded px-2 py-1 text-sm w-16" value={newEmpId} onChange={e => setNewEmpId(e.target.value)} />
                                <input type="text" placeholder="姓名" className="border rounded px-2 py-1 text-sm w-24" value={newEmpName} onChange={e => setNewEmpName(e.target.value)} />
                                <button onClick={handleAddHrEmployee} className="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition whitespace-nowrap"><i className="fa-solid fa-plus mr-1"></i>快速新增</button>
                            </div>
                        </div>

                        {currentEmp ? (
                            <div className="flex-1 flex flex-col overflow-hidden fullscreen-container">
                                <div className="flex bg-gray-100 border-b shrink-0 text-xs font-bold hide-in-fullscreen">
                                    <button onClick={() => setHrFormTab('form1')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form1' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>領航員輔導</button>
                                    <button onClick={() => setHrFormTab('form2')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form2' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>新人關懷</button>
                                    <button onClick={() => setHrFormTab('form3')} className={`flex-1 py-2 px-1 border-r ${hrFormTab === 'form3' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>績效面談</button>
                                    <button onClick={() => setHrFormTab('form4')} className={`flex-1 py-2 px-1 ${hrFormTab === 'form4' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>12生肖戰報</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 relative z-10 hide-scroll bg-gray-50 fullscreen-container">
                                    <div className="flex justify-end mb-2 hide-in-fullscreen max-w-[1000px] mx-auto">
                                        <button onClick={() => setFullScreenMode(true)} className="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow hover:bg-gray-700 transition font-bold"><i className="fa-regular fa-file-pdf mr-1"></i> 列印預覽 / 截圖</button>
                                    </div>
                                    <div className="w-full max-w-[1000px] mx-auto pb-20">
                                        {hrFormTab === 'form1' && renderHrForm1(currentEmp)}
                                        {hrFormTab === 'form2' && renderHrForm2(currentEmp)}
                                        {hrFormTab === 'form3' && renderHrForm3(currentEmp)}
                                        {hrFormTab === 'form4' && renderHrForm4(currentEmp)}
                                        {fullScreenMode && (
                                            <div className="text-center mt-6 no-print">
                                                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold hover:bg-blue-700 text-lg"><i className="fa-solid fa-print mr-2"></i>直接列印</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-400 flex-col gap-4 hide-in-fullscreen">
                                <i className="fa-solid fa-users text-6xl opacity-20"></i><p className="font-bold">請先選擇「店別」再選擇「員工」，開始進行管理。</p>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`flex flex-col max-w-[1400px] mx-auto bg-gray-100 relative ${fullScreenMode ? 'pdf-mode' : 'h-full'}`}>
                    
                    {/* ALL MODALS */}
                    {showPwdModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
                                <div className="bg-blue-800 text-white p-4 font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-lock"></i> 系統安全驗證</div>
                                <div className="p-6"><p className="text-gray-600 text-sm mb-4 font-bold">請輸入授權密碼以解鎖畫面。</p><input type="password" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handlePwdSubmit()} className="w-full border-2 border-gray-300 rounded-lg p-3 text-center text-2xl tracking-[0.5em] focus:border-blue-500 outline-none font-sans" placeholder="輸入密碼" autoFocus/></div>
                                <div className="bg-gray-50 p-4 flex justify-end gap-3 border-t"><button onClick={() => {setShowPwdModal(false); setPwdInput('');}} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button><button onClick={handlePwdSubmit} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">驗證解鎖</button></div>
                            </div>
                        </div>
                    )}
                    {pwdErrorModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] p-4"><div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full transform transition-all border-l-4 border-red-500"><div className="flex items-center text-red-500 mb-4"><i className="fa-solid fa-triangle-exclamation text-3xl mr-2"></i><h3 className="font-bold text-lg">存取失敗</h3></div><p className="text-gray-600 mb-6 font-bold">密碼錯誤，請重新輸入以驗證您的身份。</p><button onClick={() => setPwdErrorModal(false)} className="w-full bg-gray-900 text-white py-2 rounded-lg font-bold hover:bg-gray-700 transition">我知道了</button></div></div>
                    )}
                    {syncSuccessModal && (
                        <div className="fixed inset-0 bg-black/60 z-[250] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100 border-t-4 border-green-500">
                                <div className="p-6 text-center">
                                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-solid fa-check text-3xl text-green-500"></i></div>
                                    <h3 className="text-lg font-black text-gray-800 mb-2">同步成功</h3><p className="text-sm text-gray-600 font-semibold mb-6">已成功將該區間的營運數據自動帶入，並依據達成率算好分數囉！</p>
                                    <button onClick={() => setSyncSuccessModal(false)} className="w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-green-700 transition">我知道了</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showEmpModal && (
                        <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
                                <div className="bg-blue-600 text-white p-4 font-bold flex justify-between"><span>{isEditMode ? '編輯員工資料' : '新增系統員工'}</span><button onClick={() => setShowEmpModal(false)}><i className="fa-solid fa-xmark text-xl"></i></button></div>
                                <form onSubmit={handleSaveHrEmployee} className="p-6 space-y-4">
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">所屬店別</label><input required value={editEmpData.storeName} onChange={e => setEditEmpData({...editEmpData, storeName: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 中清店" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">員工編號</label><input required value={editEmpData.id} onChange={e => setEditEmpData({...editEmpData, id: e.target.value})} disabled={isEditMode} className="w-full border p-2 rounded outline-none focus:border-blue-500 disabled:bg-gray-100" placeholder="例: E001" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">員工姓名</label><input required value={editEmpData.name} onChange={e => setEditEmpData({...editEmpData, name: e.target.value})} className="w-full border p-2 rounded outline-none focus:border-blue-500" placeholder="例: 王小明" /></div>
                                    <div className="pt-4 flex justify-end gap-3 border-t"><button type="button" onClick={() => setShowEmpModal(false)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition">取消</button><button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認儲存</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                    {sigModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[400px]">
                                <div className="bg-blue-800 text-white p-4 font-bold flex justify-between items-center"><span><i className="fa-solid fa-pen-nib mr-2"></i>電子簽名板</span><button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="text-white/80 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button></div>
                                <div className="flex-1 bg-gray-50 relative m-4 border-2 border-dashed border-gray-300 rounded-lg overflow-hidden cursor-crosshair"><canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} style={{ touchAction: 'none' }} className="w-full h-full"/></div>
                                <div className="p-4 border-t bg-gray-50 flex justify-between gap-3"><button onClick={clearCanvas} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition border border-gray-300">清除重簽</button><div className="flex gap-2"><button onClick={() => setSigModal({ isOpen: false, fieldPath: '' })} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-bold transition">取消</button><button onClick={saveSignature} className="px-6 py-2 bg-blue-600 text-white rounded font-bold shadow hover:bg-blue-700 transition">確認存檔</button></div></div>
                            </div>
                        </div>
                    )}
                    {fullScreenMode && (
                        <button onClick={() => setFullScreenMode(false)} className="fixed bottom-6 right-6 bg-red-600 text-white px-5 py-3 rounded-full shadow-2xl font-bold z-[100] hover:bg-red-700 border-2 border-white flex items-center no-print">
                            <i className="fa-solid fa-compress mr-2"></i>結束預覽模式
                        </button>
                    )}

                    {/* MAIN LAYOUT */}
                    <header className="px-4 py-2 border-b bg-white flex justify-between items-center shrink-0 shadow-sm relative z-10 hide-in-fullscreen">
                        <h1 className="text-xl font-black text-gray-800 tracking-tight"><span className="text-blue-600 mr-1">{loggedInGroup}</span>門店營運數據面板</h1>
                    </header>
                    <nav className="flex overflow-x-auto border-b bg-white shrink-0 hide-scroll text-sm relative z-10 hide-in-fullscreen">
                        <button onClick={() => switchTab('night')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'night' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-moon mr-1 text-gray-700"></i>夜班</button>
                        <button onClick={() => switchTab('morning')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'morning' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-sun mr-1 text-orange-500"></i>早班</button>
                        <button onClick={() => switchTab('evening')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'evening' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-cloud-sun mr-1 text-indigo-500"></i>晚班</button>
                        <button onClick={() => switchTab('summary')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'summary' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-layer-group mr-1 text-green-600"></i>三班累加</button>
                        <button onClick={() => switchTab('audit')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'audit' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-clipboard-check mr-1 text-red-600"></i>稽核</button>
                        <button onClick={() => switchTab('trend')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'trend' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-chart-line mr-1 text-purple-600"></i>趨勢圖表</button>
                        <button onClick={() => switchTab('settings')} className={`flex-1 py-2 px-3 whitespace-nowrap ${activeTab === 'settings' ? 'tab-active' : 'tab-inactive'}`}><i className="fa-solid fa-gear mr-1 text-gray-500"></i>店長設定</button>
                        <button onClick={() => { if(!hrAuthUnlocked) setShowPwdModal(true); else setActiveTab('hr'); }} className={`flex-1 py-2 px-3 whitespace-nowrap border-l-2 border-blue-200 ${activeTab === 'hr' ? 'tab-active !border-b-blue-600 !text-blue-800' : 'text-blue-600 hover:bg-blue-50'}`}><i className="fa-solid fa-user-shield mr-1"></i>人事績效管理</button>
                    </nav>
                    <main className={`flex-1 ${fullScreenMode ? 'print-mode' : 'overflow-hidden'}`}>
                        {activeTab === 'night' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('night', '夜班', 'fa-moon', 'text-gray-800', 'bg-gray-800')}</div>}
                        {activeTab === 'morning' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('morning', '早班', 'fa-sun', 'text-orange-600', 'bg-orange-500')}</div>}
                        {activeTab === 'evening' && <div className="p-2 h-full overflow-hidden">{renderShiftTab('evening', '晚班', 'fa-cloud-sun', 'text-indigo-600', 'bg-indigo-500')}</div>}
                        {activeTab === 'summary' && <div className="p-2 h-full overflow-hidden">{renderSummary()}</div>}
                        {activeTab === 'audit' && <div className="p-2 h-full overflow-hidden">{renderAudit()}</div>}
                        {activeTab === 'trend' && <div className="p-2 h-full overflow-hidden">{renderTrendTab()}</div>}
                        {activeTab === 'settings' && <div className="p-2 h-full overflow-hidden">{renderSettings()}</div>}
                        {activeTab === 'hr' && renderHrTab()}
                    </main>
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Caught unhandled exception:", error, errorInfo); this.setState({ errorInfo }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', fontFamily: 'sans-serif', background: '#fee2e2', color: '#991b1b', height: '100vh', overflow: 'auto' }}>
                            <h2 style={{ fontWeight: 'bold', fontSize: '20px' }}>系統發生未預期錯誤</h2>
                            <p>請截圖交給工程師：</p>
                            <pre style={{ background: '#fff', padding: '10px', marginTop: '10px', border: '1px solid #f87171', borderRadius: '4px', fontSize: '12px', whiteSpace: 'pre-wrap' }}>{this.state.error && this.state.error.toString()}{'\n'}{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '20px', padding: '10px 20px', background: '#dc2626', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}>重新載入</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
